  };

  // 2. บทบาท (Roles)
  const AccessRoles=()=>{
    const [modal4,setModal4]=useState(false);const [ed4,setEd4]=useState(null);const [del4,setDel4]=useState(null);
    const blank={id:`ROLE-${String(roles.length+1).padStart(2,'0')}`,name:'',desc:'',color:'#6b7280'};
    const [f,setF]=useState(blank);
    const memberCount=(roleId)=>{const r=roles.find(x=>x.id===roleId);return r?accounts.filter(a=>a.role===r.name).length:0;};
    const openAdd=()=>{setEd4(null);setF({...blank,id:`ROLE-${String(roles.length+1).padStart(2,'0')}`});setModal4(true)};
    const openEdit=(r)=>{setEd4(r);setF({...r});setModal4(true)};
    const sv=(e)=>{e.preventDefault();
      if(ed4){setRoles(roles.map(r=>r.id===ed4.id?f:r));notify('แก้ไข Role สำเร็จ')}
      else{setRoles([...roles,f]);setPerms(p=>({...p,[f.id]:{dashboard:{v:0,c:0,e:0,d:0},items:{v:0,c:0,e:0,d:0},requisition:{v:0,c:0,e:0,d:0},approvals:{v:0,c:0,e:0,d:0},reports:{v:0,c:0,e:0,d:0},settings:{v:0,c:0,e:0,d:0},steel:{v:0,c:0,e:0,d:0},access:{v:0,c:0,e:0,d:0}}}));notify('เพิ่ม Role สำเร็จ')}
      setModal4(false)};
    const rm=()=>{if(!del4)return;setRoles(roles.filter(r=>r.id!==del4.id));notify('ลบ Role สำเร็จ');setDel4(null)};
    const colors=['#059669','#2563eb','#7c3aed','#f97316','#0891b2','#e11d48','#ca8a04','#6b7280','#dc2626','#0d9488'];
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-violet-50 p-2.5 rounded-xl mr-3"><I d={Ic.shield} size={24} cls="text-violet-600"/></div>จัดการบทบาท (Roles)<span className="ml-3 text-sm font-bold text-slate-400">({roles.length} บทบาท)</span></div>
        <button onClick={openAdd} className="bg-violet-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-violet-700 shadow-sm"><I d={Ic.plus} size={18}/>เพิ่ม Role</button>
      </div>
      <div className="p-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {roles.map(r=><div key={r.id} className="border rounded-xl p-5 hover:shadow-md transition-all group relative">
          <div className="flex items-center gap-3 mb-3"><div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm" style={{background:r.color}}>{r.name.substring(0,2)}</div><div><div className="font-bold text-slate-800">{r.name}</div><div className="text-[10px] text-slate-400 font-mono">{r.id}</div></div></div>
          <p className="text-xs text-slate-500 mb-3 leading-relaxed">{r.desc}</p>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-1 text-xs text-slate-500"><I d={Ic.users} size={14} cls="text-slate-400"/><span className="font-bold">{memberCount(r.id)}</span> สมาชิก</div>
            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={()=>openEdit(r)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={15}/></button><button onClick={()=>setDel4(r)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={15}/></button></div>
          </div>
        </div>)}
      </div>
      {modal4&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-md anim-zoom">
        <div className="border-b p-5 flex justify-between items-center"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-violet-100 p-1.5 rounded-lg"><I d={ed4?Ic.edit:Ic.plus} size={18} cls="text-violet-600"/></div>{ed4?'แก้ไข Role':'เพิ่ม Role ใหม่'}</h3><button onClick={()=>setModal4(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อ Role *</label><input required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="เช่น Supervisor" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-violet-500"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">คำอธิบาย</label><textarea value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} rows={2} placeholder="อธิบายหน้าที่ของ Role นี้" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-violet-500 resize-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">สี</label><div className="flex gap-2 flex-wrap">{colors.map(c=><button type="button" key={c} onClick={()=>setF({...f,color:c})} className={`w-8 h-8 rounded-lg border-2 transition-all ${f.color===c?'border-slate-800 scale-110':'border-transparent hover:scale-105'}`} style={{background:c}}/>)}</div></div>
          <div className="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={()=>setModal4(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-violet-600 rounded-xl hover:bg-violet-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div>
        </form>
      </div></div>}
      <Confirm show={!!del4} title="ยืนยันการลบ" msg={`ลบ Role "${del4?.name}"?`} onOk={rm} onNo={()=>setDel4(null)} danger/>
    </div></div>);
  };

  // 3. กลุ่ม (Teams)
  const AccessTeams=()=>{
    const [modal5,setModal5]=useState(false);const [ed5,setEd5]=useState(null);const [del5,setDel5]=useState(null);
    const blank={id:`TM-${String(teams.length+1).padStart(2,'0')}`,name:'',desc:'',members:[]};
    const [f,setF]=useState(blank);const [memberSearch,setMemberSearch]=useState('');
    const openAdd=()=>{setEd5(null);setF({...blank,id:`TM-${String(teams.length+1).padStart(2,'0')}`});setModal5(true)};
    const openEdit=(t)=>{setEd5(t);setF({...t});setModal5(true)};
    const toggleMember=(uid)=>{setF(prev=>({...prev,members:prev.members.includes(uid)?prev.members.filter(m=>m!==uid):[...prev.members,uid]}))};
    const sv=(e)=>{e.preventDefault();
      if(ed5){setTeams(teams.map(t=>t.id===ed5.id?f:t));notify('แก้ไขกลุ่มสำเร็จ')}
      else{setTeams([...teams,f]);notify('เพิ่มกลุ่มสำเร็จ')}
      setModal5(false)};
    const rm=()=>{if(!del5)return;setTeams(teams.filter(t=>t.id!==del5.id));notify('ลบกลุ่มสำเร็จ');setDel5(null)};
    const getName=(uid)=>{const u=accounts.find(a=>a.id===uid);return u?u.fullName:uid;};
    const getAvatar=(uid)=>{const u=accounts.find(a=>a.id===uid);return u?u.avatar:uid.substring(0,2);};
    const getRole=(uid)=>{const u=accounts.find(a=>a.id===uid);return u?.role||'';};
    const filteredAccounts=accounts.filter(a=>!memberSearch||a.fullName.includes(memberSearch)||a.username.includes(memberSearch));
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-sky-50 p-2.5 rounded-xl mr-3"><I d={Ic.users} size={24} cls="text-sky-600"/></div>จัดการกลุ่ม (Teams)<span className="ml-3 text-sm font-bold text-slate-400">({teams.length} กลุ่ม)</span></div>
        <button onClick={openAdd} className="bg-sky-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-sky-700 shadow-sm"><I d={Ic.plus} size={18}/>สร้างกลุ่มใหม่</button>
      </div>
      <div className="p-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {teams.map(t=><div key={t.id} className="border rounded-xl p-5 hover:shadow-md transition-all group">
          <div className="flex items-center justify-between mb-2"><div><div className="font-bold text-slate-800">{t.name}</div><div className="text-[10px] text-slate-400 font-mono">{t.id}</div></div><div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={()=>openEdit(t)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={15}/></button><button onClick={()=>setDel5(t)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={15}/></button></div></div>
          <p className="text-xs text-slate-500 mb-3">{t.desc||'-'}</p>
          <div className="flex items-center gap-1.5 mb-2"><I d={Ic.users} size={14} cls="text-slate-400"/><span className="text-xs font-bold text-slate-600">{t.members.length} สมาชิก</span></div>
          <div className="flex flex-wrap gap-1.5">{t.members.slice(0,6).map(uid=><div key={uid} className="flex items-center gap-1 bg-slate-50 rounded-lg px-2 py-1 border text-xs"><div className="w-5 h-5 rounded flex items-center justify-center text-[8px] font-bold text-white bg-emerald-500">{getAvatar(uid)}</div><span className="text-slate-600">{getName(uid)}</span></div>)}{t.members.length>6&&<span className="text-[10px] text-slate-400 font-bold self-center">+{t.members.length-6} อื่นๆ</span>}</div>
        </div>)}
      </div>
      {modal5&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg anim-zoom max-h-[90vh] overflow-y-auto sb">
        <div className="border-b p-5 flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-sky-100 p-1.5 rounded-lg"><I d={ed5?Ic.edit:Ic.plus} size={18} cls="text-sky-600"/></div>{ed5?'แก้ไขกลุ่ม':'สร้างกลุ่มใหม่'}</h3><button onClick={()=>setModal5(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อกลุ่ม *</label><input required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="เช่น ฝ่ายควบคุมคุณภาพ (QC)" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-sky-500"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">คำอธิบาย</label><input value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} placeholder="คำอธิบายกลุ่ม" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-sky-500"/></div>
          <div>
            <label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">สมาชิก ({f.members.length} คน)</label>
            <input value={memberSearch} onChange={e=>setMemberSearch(e.target.value)} placeholder="ค้นหาพนักงาน..." className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-sky-500 mb-2"/>
            <div className="max-h-48 overflow-y-auto sb border rounded-lg divide-y">
              {filteredAccounts.map(a=><label key={a.id} className="flex items-center gap-3 px-3 py-2 hover:bg-sky-50/50 cursor-pointer">
                <input type="checkbox" checked={f.members.includes(a.id)} onChange={()=>toggleMember(a.id)} className="w-4 h-4 rounded accent-sky-600"/>
                <div className="w-7 h-7 rounded-lg flex items-center justify-center text-[9px] font-bold text-white bg-slate-400">{a.avatar}</div>
                <div className="flex-1"><div className="text-sm font-medium">{a.fullName}</div><div className="text-[10px] text-slate-400">{a.role} • {a.dept}</div></div>
              </label>)}

          </div>
          <div className="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={()=>{setModal5(false);setMemberSearch('')}} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-sky-600 rounded-xl hover:bg-sky-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div>
        </form>
      </div></div>}
      <Confirm show={!!del5} title="ยืนยันการลบ" msg={`ลบกลุ่ม "${del5?.name}"?`} onOk={rm} onNo={()=>setDel5(null)} danger/>
    </div></div>);
  };

  // 4. กำหนดสิทธิ์ (Permissions Matrix)
  const AccessPerms=()=>{
    const [selRole,setSelRole]=useState(roles[0]?.id||'');
    const togglePerm=(mod,p)=>{
      setPerms(prev=>{const cur={...prev};const rp={...(cur[selRole]||{})};const mp={...(rp[mod]||{v:0,c:0,e:0,d:0})};mp[p]=mp[p]?0:1;rp[mod]=mp;cur[selRole]=rp;return cur});
    };
    const toggleAll=(mod,val)=>{
      setPerms(prev=>{const cur={...prev};const rp={...(cur[selRole]||{})};rp[mod]={v:val,c:val,e:val,d:val};cur[selRole]=rp;return cur});
    };
    const rp=perms[selRole]||{};
    const permLabels=[{k:'v',l:'เข้าถึง',icon:'👁'},{k:'c',l:'สร้าง',icon:'➕'},{k:'e',l:'แก้ไข',icon:'✏️'},{k:'d',l:'ลบ',icon:'🗑'}];
    const allChecked=(mod)=>permLabels.every(p=>(rp[mod]||{})[p.k]);
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b">
        <div className="flex items-center text-xl font-bold text-slate-800 mb-4"><div className="bg-amber-50 p-2.5 rounded-xl mr-3"><I d={Ic.shield} size={24} cls="text-amber-600"/></div>กำหนดสิทธิ์ตาม Role</div>
        <div className="flex flex-wrap gap-2">
          {roles.map(r=><button key={r.id} onClick={()=>setSelRole(r.id)} className={`px-4 py-2 rounded-xl text-sm font-bold transition-all border ${selRole===r.id?'text-white shadow-md':'text-slate-600 bg-white hover:bg-slate-50'}`} style={selRole===r.id?{background:r.color,borderColor:r.color}:{}}>{r.name}<span className="ml-1.5 text-[10px] opacity-70">({accounts.filter(a=>a.role===r.name).length})</span></button>)}
        </div>
      </div>
      <div className="p-6">
        <div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm"><thead className="bg-slate-50"><tr>
          <th className="p-3 text-left font-bold text-slate-600 w-1/3">โมดูล</th>
          {permLabels.map(p=><th key={p.k} className="p-3 text-center font-bold text-slate-600 w-[80px]"><span className="text-base mr-1">{p.icon}</span>{p.l}</th>)}
          <th className="p-3 text-center font-bold text-slate-600 w-[80px]">ทั้งหมด</th>
        </tr></thead>
        <tbody className="divide-y">{MODULES.map(m=>{const mp=rp[m.k]||{v:0,c:0,e:0,d:0};return<tr key={m.k} className="hover:bg-slate-50/50">
          <td className="p-3 font-medium text-slate-700">{m.label}</td>
          {permLabels.map(p=><td key={p.k} className="p-3 text-center"><label className="inline-flex items-center justify-center cursor-pointer"><input type="checkbox" checked={!!mp[p.k]} onChange={()=>togglePerm(m.k,p.k)} className="w-5 h-5 rounded accent-emerald-600 cursor-pointer"/></label></td>)}
          <td className="p-3 text-center"><label className="inline-flex items-center justify-center cursor-pointer"><input type="checkbox" checked={allChecked(m.k)} onChange={()=>toggleAll(m.k,allChecked(m.k)?0:1)} className="w-5 h-5 rounded accent-slate-600 cursor-pointer"/></label></td>
        </tr>})}</tbody></table></div>
        <div className="mt-4 flex justify-end"><button onClick={()=>notify('บันทึกสิทธิ์สำเร็จ')} className="bg-amber-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-amber-700 flex items-center gap-2 shadow-sm"><I d={Ic.save} size={16}/>บันทึกสิทธิ์</button></div>
      </div>
    </div></div>);
  };

  // 5. เวิร์กโฟลว์อนุมัติ (Approval Workflow)
  const AccessWorkflow=()=>{
    const [modal6,setModal6]=useState(false);const [ed6,setEd6]=useState(null);const [del6,setDel6]=useState(null);
    const blank={id:`WF-${String(workflows.length+1).padStart(2,'0')}`,name:'',module:'requisition',steps:[]};
    const [f,setF]=useState(blank);
    const openAdd=()=>{setEd6(null);setF({...blank,id:`WF-${String(workflows.length+1).padStart(2,'0')}`});setModal6(true)};
    const openEdit=(w)=>{setEd6(w);setF({...w,steps:[...w.steps]});setModal6(true)};
    const addStep=()=>{setF(prev=>({...prev,steps:[...prev.steps,{type:'หัวหน้าแผนก',label:'หัวหน้าแผนก',userId:''}]}))};
    const updateStep=(idx,key,val)=>{setF(prev=>{const s=[...prev.steps];s[idx]={...s[idx],[key]:val};if(key==='type'&&val==='หัวหน้าแผนก')s[idx].label='หัวหน้าแผนก';if(key==='userId'&&val){const u=accounts.find(a=>a.id===val);if(u)s[idx].label=u.fullName}return{...prev,steps:s}})};
    const removeStep=(idx)=>{setF(prev=>({...prev,steps:prev.steps.filter((_,i)=>i!==idx)}))};
    const sv=(e)=>{e.preventDefault();
      if(ed6){setWorkflows(workflows.map(w=>w.id===ed6.id?f:w));notify('แก้ไข Workflow สำเร็จ')}
      else{setWorkflows([...workflows,f]);notify('เพิ่ม Workflow สำเร็จ')}
      setModal6(false)};
    const rm=()=>{if(!del6)return;setWorkflows(workflows.filter(w=>w.id!==del6.id));notify('ลบ Workflow สำเร็จ');setDel6(null)};
    const wfModules=[{k:'requisition',l:'ใบเบิกวัสดุ'},{k:'purchasing',l:'ใบสั่งซื้อ (PO)'},{k:'steel_withdraw',l:'เบิกเหล็ก'},{k:'leave',l:'ลางาน'},{k:'overtime',l:'ทำงานล่วงเวลา'}];
    const stepColors={'หัวหน้าแผนก':'bg-blue-50 border-blue-200 text-blue-700','ตามสายบังคับบัญชา':'bg-purple-50 border-purple-200 text-purple-700','บุคคล':'bg-emerald-50 border-emerald-200 text-emerald-700'};
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-indigo-50 p-2.5 rounded-xl mr-3"><I d={Ic.repeat} size={24} cls="text-indigo-600"/></div>เวิร์กโฟลว์อนุมัติ<span className="ml-3 text-sm font-bold text-slate-400">({workflows.length} workflow)</span></div>
        <button onClick={openAdd} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-700 shadow-sm"><I d={Ic.plus} size={18}/>สร้าง Workflow</button>
      </div>
      <div className="p-6 space-y-4">
        {workflows.map(w=><div key={w.id} className="border rounded-xl p-5 hover:shadow-md transition-all group">
          <div className="flex items-center justify-between mb-3">
            <div><div className="font-bold text-slate-800">{w.name}</div><div className="flex items-center gap-2 mt-1"><span className="text-[10px] text-slate-400 font-mono">{w.id}</span><span className="px-2 py-0.5 rounded-full text-[10px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200">{wfModules.find(m=>m.k===w.module)?.l||w.module}</span></div></div>
            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={()=>openEdit(w)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={15}/></button><button onClick={()=>setDel6(w)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={15}/></button></div>
          </div>
          {/* Workflow steps visualization */}
          <div className="flex flex-wrap items-center gap-2">
            <div className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 text-xs font-bold border border-slate-200"><I d={Ic.user} size={13}/>ผู้ขออนุมัติ</div>
            {w.steps.map((s,i)=><React.Fragment key={i}><div className="text-slate-300 font-bold">→</div><div className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold border ${stepColors[s.type]||'bg-slate-50 border-slate-200 text-slate-600'}`}>{s.type==='บุคคล'?<I d={Ic.userCir} size={13}/>:s.type==='หัวหน้าแผนก'?<I d={Ic.brief} size={13}/>:<I d={Ic.users} size={13}/>}{s.label}</div></React.Fragment>)}
            <div className="text-slate-300 font-bold">→</div>
            <div className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-green-50 border border-green-200 text-green-700 text-xs font-bold"><I d={Ic.check} size={13}/>อนุมัติ</div>
          </div>
        </div>)}
      </div>
      {modal6&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl anim-zoom max-h-[90vh] overflow-y-auto sb">
        <div className="border-b p-5 flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-indigo-100 p-1.5 rounded-lg"><I d={ed6?Ic.edit:Ic.plus} size={18} cls="text-indigo-600"/></div>{ed6?'แก้ไข Workflow':'สร้าง Workflow ใหม่'}</h3><button onClick={()=>setModal6(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อ Workflow *</label><input required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="เช่น อนุมัติใบเบิกวัสดุ" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-indigo-500"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">โมดูล *</label><select value={f.module} onChange={e=>setF({...f,module:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{wfModules.map(m=><option key={m.k} value={m.k}>{m.l}</option>)}</select></div>
          <div>
            <div className="flex justify-between items-center mb-2"><label className="text-[10px] font-bold text-slate-500 uppercase">ขั้นตอนอนุมัติ ({f.steps.length} ขั้นตอน)</label><button type="button" onClick={addStep} className="text-xs text-indigo-600 font-bold hover:underline flex items-center gap-1"><I d={Ic.plus} size={13}/>เพิ่มขั้นตอน</button></div>
            <div className="space-y-2">
              <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-50 border text-xs text-slate-500"><div className="w-6 h-6 rounded-full bg-slate-300 text-white flex items-center justify-center text-[10px] font-bold">0</div>ผู้ขออนุมัติ (Requester)</div>
              {f.steps.map((s,i)=><div key={i} className="flex items-center gap-2 border rounded-lg p-2.5 bg-white">
                <div className="w-6 h-6 rounded-full bg-indigo-500 text-white flex items-center justify-center text-[10px] font-bold shrink-0">{i+1}</div>
                <select value={s.type} onChange={e=>updateStep(i,'type',e.target.value)} className="border rounded-lg p-2 text-xs outline-none flex-1 min-w-0"><option value="หัวหน้าแผนก">หัวหน้าแผนก</option><option value="ตามสายบังคับบัญชา">ตามสายบังคับบัญชา</option><option value="บุคคล">ระบุบุคคล</option></select>
                {s.type==='บุคคล'&&<select value={s.userId||''} onChange={e=>updateStep(i,'userId',e.target.value)} className="border rounded-lg p-2 text-xs outline-none flex-1 min-w-0"><option value="">-- เลือกผู้อนุมัติ --</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.fullName} ({a.role})</option>)}</select>}
                <button type="button" onClick={()=>removeStep(i)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg shrink-0"><I d={Ic.xCircle} size={16}/></button>
              </div>)}
              <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-green-50 border border-green-200 text-xs text-green-600"><div className="w-6 h-6 rounded-full bg-green-500 text-white flex items-center justify-center text-[10px]">✓</div>อนุมัติสำเร็จ (Approved)</div>
            </div>
          </div>
          <div className="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={()=>setModal6(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div>
        </form>
      </div></div>}
      <Confirm show={!!del6} title="ยืนยันการลบ" msg={`ลบ Workflow "${del6?.name}"?`} onOk={rm} onNo={()=>setDel6(null)} danger/>
    </div></div>);
  };

  // 6. ตำแหน่ง (Positions)
  const AccessPositions=()=>{
    const [modal7,setModal7]=useState(false);const [ed7,setEd7]=useState(null);const [del7,setDel7]=useState(null);
    const blank={id:`POS-${String(positions.length+1).padStart(2,'0')}`,name:'',level:4,dept:depts[0]?.name||'',abbr:''};
    const [f,setF]=useState(blank);
    const openAdd=()=>{setEd7(null);setF({...blank,id:`POS-${String(positions.length+1).padStart(2,'0')}`});setModal7(true)};
    const openEdit=(p)=>{setEd7(p);setF({...p});setModal7(true)};
    const sv=(e)=>{e.preventDefault();
      if(ed7){setPositions(positions.map(p=>p.id===ed7.id?f:p));notify('แก้ไขตำแหน่งสำเร็จ')}
      else{setPositions([...positions,f]);notify('เพิ่มตำแหน่งสำเร็จ')}
      setModal7(false)};
    const rm=()=>{if(!del7)return;setPositions(positions.filter(p=>p.id!==del7.id));notify('ลบตำแหน่งสำเร็จ');setDel7(null)};
    const levelLabel={1:'ระดับ 1 — ผู้บริหารสูงสุด',2:'ระดับ 2 — ผู้บริหาร',3:'ระดับ 3 — หัวหน้า/ผู้เชี่ยวชาญ',4:'ระดับ 4 — พนักงาน',5:'ระดับ 5 — ฝึกงาน/ชั่วคราว'};
    const levelColor={1:'bg-rose-50 text-rose-600 border-rose-200',2:'bg-purple-50 text-purple-600 border-purple-200',3:'bg-blue-50 text-blue-600 border-blue-200',4:'bg-slate-50 text-slate-600 border-slate-200',5:'bg-gray-50 text-gray-500 border-gray-200'};
    const grouped={};positions.forEach(p=>{if(!grouped[p.level])grouped[p.level]=[];grouped[p.level].push(p)});
    const empCount=(posName)=>accounts.filter(a=>a.position===posName).length;
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-teal-50 p-2.5 rounded-xl mr-3"><I d={Ic.brief} size={24} cls="text-teal-600"/></div>ตำแหน่งงาน<span className="ml-3 text-sm font-bold text-slate-400">({positions.length} ตำแหน่ง)</span></div>
        <button onClick={openAdd} className="bg-teal-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-teal-700 shadow-sm"><I d={Ic.plus} size={18}/>เพิ่มตำแหน่ง</button>
      </div>
      <div className="p-6 space-y-4">
        {Object.keys(grouped).sort().map(lv=><div key={lv}>
          <div className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-lg text-xs font-bold border mb-2 ${levelColor[lv]||'bg-slate-50 text-slate-600'}`}>{levelLabel[lv]||`ระดับ ${lv}`}</div>
          <div className="grid gap-2 sm:grid-cols-2 lg:grid-cols-3 mb-2">
            {grouped[lv].map(p=><div key={p.id} className="border rounded-xl px-4 py-3 hover:shadow-sm transition-all group flex items-center justify-between">
              <div><div className="font-bold text-sm text-slate-800">{p.name}</div><div className="flex items-center gap-2 mt-0.5"><span className="text-[10px] font-mono text-slate-400">{p.id}</span><span className="text-[10px] text-slate-400">•</span><span className="text-[10px] text-slate-500">{p.dept}</span>{p.abbr&&<span className="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500">{p.abbr}</span>}</div><div className="text-[10px] text-slate-400 mt-0.5">{empCount(p.name)} พนักงานในตำแหน่งนี้</div></div>
              <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={()=>openEdit(p)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={15}/></button><button onClick={()=>setDel7(p)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={15}/></button></div>
            </div>)}
          </div>
        </div>)}
      </div>
      {modal7&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-md anim-zoom">
        <div className="border-b p-5 flex justify-between items-center"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-teal-100 p-1.5 rounded-lg"><I d={ed7?Ic.edit:Ic.plus} size={18} cls="text-teal-600"/></div>{ed7?'แก้ไขตำแหน่ง':'เพิ่มตำแหน่งใหม่'}</h3><button onClick={()=>setModal7(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อตำแหน่ง *</label><input required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="เช่น หัวหน้าฝ่ายซ่อมบำรุง (Maintenance Supervisor)" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-teal-500"/></div>
          <div className="grid grid-cols-2 gap-4">
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ตัวย่อ</label><input value={f.abbr} onChange={e=>setF({...f,abbr:e.target.value})} placeholder="เช่น MS" maxLength={5} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-teal-500"/></div>
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ระดับ *</label><select value={f.level} onChange={e=>setF({...f,level:Number(e.target.value)})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{[1,2,3,4,5].map(l=><option key={l} value={l}>{levelLabel[l]}</option>)}</select></div>
          </div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก *</label><select value={f.dept} onChange={e=>setF({...f,dept:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{[...new Set(['ผู้บริหาร','ฝ่ายผลิต','ฝ่ายออกแบบ',...depts.map(d=>d.name)])].map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div className="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={()=>setModal7(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-teal-600 rounded-xl hover:bg-teal-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div>
        </form>
      </div></div>}
      <Confirm show={!!del7} title="ยืนยันการลบ" msg={`ลบตำแหน่ง "${del7?.name}"?`} onOk={rm} onNo={()=>setDel7(null)} danger/>
    </div></div>);
  };

  // ===== Approver Management (linked to accounts + depts + workflows) =====
  const ApproverMgmt=()=>{
    const [modal8,setModal8]=useState(false);const [ed8,setEd8]=useState(null);const [del8,setDel8]=useState(null);
    const blank={id:`APV-${String(apvs.length+1).padStart(2,'0')}`,name:'',role:'',department:'ทุกแผนก',userId:''};
    const [f,setF]=useState(blank);
    const mgmtAccounts=accounts.filter(a=>['Admin','MD','GM','Store'].includes(a.role));
    const openAdd=()=>{setEd8(null);setF({...blank,id:`APV-${String(apvs.length+1).padStart(2,'0')}`});setModal8(true)};
    const openEdit=(a)=>{setEd8(a);setF({...a});setModal8(true)};
    const pickUser=(uid)=>{const u=accounts.find(a=>a.id===uid);if(u)setF({...f,userId:uid,name:u.fullName,role:u.role})};
    const sv=(e)=>{e.preventDefault();
      if(ed8){setApvs(apvs.map(a=>a.id===ed8.id?f:a));notify('แก้ไขผู้อนุมัติสำเร็จ')}
      else{setApvs([...apvs,f]);notify('เพิ่มผู้อนุมัติสำเร็จ')}
      setModal8(false)};
    const rm=()=>{if(!del8)return;setApvs(apvs.filter(a=>a.id!==del8.id));notify('ลบผู้อนุมัติสำเร็จ');setDel8(null)};
    // Find linked workflows for each approver
    const getWfs=(name)=>workflows.filter(w=>w.steps.some(s=>s.label&&s.label.includes(name)));
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border">
      <div className="p-6 border-b flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-emerald-50 p-2.5 rounded-xl mr-3"><I d={Ic.shield} size={24} cls="text-emerald-600"/></div>ผู้อนุมัติ<span className="ml-3 text-sm font-bold text-slate-400">({apvs.length} คน)</span></div>
        <button onClick={openAdd} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 shadow-sm"><I d={Ic.plus} size={18}/>เพิ่มผู้อนุมัติ</button>
      </div>
      <div className="p-6">
        <div className="bg-sky-50 border border-sky-200 rounded-xl p-3 mb-4 text-sm text-sky-700 flex items-start gap-2"><I d={Ic.info} size={16} cls="shrink-0 mt-0.5"/>
          <div>ผู้อนุมัติเชื่อมกับ <b>บัญชีผู้ใช้งาน</b> ในระบบ — เลือกจากรายชื่อ MD, GM, Admin, Store เท่านั้น<br/>ใช้ร่วมกับ <span className="font-bold text-sky-900 cursor-pointer underline" onClick={()=>nav('acc_workflow')}>เวิร์กโฟลว์อนุมัติ</span> เพื่อกำหนดสายอนุมัติ</div>
        </div>

        <tbody className="divide-y">{apvs.map((a,i)=>{
          const linkedUser=accounts.find(u=>u.id===a.userId);
          const wfs=getWfs(a.name);
          return<tr key={a.id} className="hover:bg-slate-50/50">
            <td className="p-3 text-center text-slate-400">{i+1}</td>
            <td className="p-3 font-mono text-xs text-slate-500">{a.id}</td>
            <td className="p-3"><div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg flex items-center justify-center text-[10px] font-bold text-white" style={{background:a.role==='MD'||a.role==='GM'?'#7c3aed':a.role==='Admin'?'#059669':'#2563eb'}}>{a.name.substring(0,2)}</div><span className="font-bold">{a.name}</span></div></td>
            <td className="p-3"><span className={`px-2 py-0.5 rounded-full text-xs font-bold ${a.role==='MD'?'bg-purple-50 text-purple-600 border border-purple-200':a.role==='GM'?'bg-purple-50 text-purple-600 border border-purple-200':'bg-emerald-50 text-emerald-600 border border-emerald-200'}`}>{a.role}</span></td>
            <td className="p-3 text-sm">{a.department}</td>
            <td className="p-3">{linkedUser?<span className="text-xs text-emerald-600 font-bold flex items-center gap-1"><I d={Ic.check2} size={13}/>เชื่อมแล้ว ({linkedUser.username})</span>:<span className="text-xs text-amber-600 font-bold flex items-center gap-1"><I d={Ic.alert} size={13}/>ยังไม่เชื่อม</span>}</td>
            <td className="p-3">{wfs.length>0?wfs.map(w=><span key={w.id} className="inline-block px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-200 mr-1">{w.name}</span>):<span className="text-xs text-slate-400">-</span>}</td>
            <td className="p-3 text-center"><div className="flex justify-center gap-1"><button onClick={()=>openEdit(a)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={16}/></button><button onClick={()=>setDel8(a)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={16}/></button></div></td>
          </tr>})}</tbody></table></div>
      </div>
      {modal8&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg anim-zoom">
        <div className="border-b p-5 flex justify-between items-center"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-emerald-100 p-1.5 rounded-lg"><I d={ed8?Ic.edit:Ic.plus} size={18} cls="text-emerald-600"/></div>{ed8?'แก้ไขผู้อนุมัติ':'เพิ่มผู้อนุมัติ'}</h3><button onClick={()=>setModal8(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เลือกจากบัญชีผู้ใช้ (MD/GM/Admin/Store)</label>
            <select value={f.userId||''} onChange={e=>pickUser(e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500">
              <option value="">-- เลือกผู้ใช้ หรือกรอกเอง --</option>
              {mgmtAccounts.map(a=><option key={a.id} value={a.id}>{a.fullName} ({a.role}) — {a.dept}</option>)}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อผู้อนุมัติ *</label><input required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="ชื่อ-สกุล" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ตำแหน่ง *</label><input required value={f.role} onChange={e=>setF({...f,role:e.target.value})} placeholder="MD, GM, ..." className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
          </div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนกที่ดูแล</label>
            <select value={f.department} onChange={e=>setF({...f,department:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">
              <option value="ทุกแผนก">ทุกแผนก</option>
              {depts.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}
            </select>
          </div>
          {f.userId&&<div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-xs text-emerald-700 flex items-center gap-2"><I d={Ic.check2} size={14}/>เชื่อมกับบัญชี <b>{accounts.find(a=>a.id===f.userId)?.username}</b> — ระบบจะใช้ข้อมูลนี้ในเวิร์กโฟลว์อนุมัติ</div>}
          <div className="flex justify-end gap-3 pt-2 border-t"><button type="button" onClick={()=>setModal8(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-emerald-600 rounded-xl hover:bg-emerald-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div>
        </form>
      </div></div>}
      <Confirm show={!!del8} title="ยืนยันการลบ" msg={`ลบผู้อนุมัติ "${del8?.name}"?`} onOk={rm} onNo={()=>setDel8(null)} danger/>
    </div></div>);
  };

  // ===== Access denied component =====
  const AccessDenied=()=>(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border p-12 text-center"><I d={Ic.shield} size={48} cls="text-rose-300 mx-auto mb-4"/><h2 className="text-xl font-bold text-slate-800 mb-2">ไม่มีสิทธิ์เข้าถึง</h2><p className="text-slate-500 text-sm mb-4">คุณไม่มีสิทธิ์ในการเข้าถึงหน้านี้ กรุณาติดต่อ Admin</p><button onClick={()=>nav('dashboard')} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-emerald-700">กลับหน้าหลัก</button></div></div>);

  // ==================== ROUTER (with access control) ====================
  const R=()=>{
    // Settings & Access pages: Admin only
    const adminOnly=['set_cat','set_dept','set_loc','set_sup','set_apv','set_usr','set_import','set_backup','acc_users','acc_roles','acc_teams','acc_perms','acc_workflow','acc_positions'];
    if(adminOnly.includes(view)&&!isAdmin)return<AccessDenied/>;
    // Reports: Admin, Store, MD, GM only
    const reportViews=['rpt_summary','rpt_receive','rpt_pay','rpt_in_out','rpt_by_dept','rpt_cancel','rpt_qty_dept','rpt_val_dept','rpt_val_cat','rpt_low','rpt_high','rpt_oos','rpt_no_move','rpt_inactive'];
    if(reportViews.includes(view)&&!(isAdmin||isStore||isMgmt||isFM))return<AccessDenied/>;
    // Steel pages: Admin, Store, Design, Mgmt
    const steelViews=['steel_dash','steel_inv','steel_withdraw','steel_return','steel_scrap','steel_log'];
    if(steelViews.includes(view)&&!canSteel)return<AccessDenied/>;
    // Items management: Admin, Store only
    if(view==='items'&&!(isAdmin||isStore))return<AccessDenied/>;
    // Receive: Admin, Store only
    if(view==='receive'&&!(isAdmin||isStore))return<AccessDenied/>;

    switch(view){
    case 'dashboard':return<Dashboard/>;case 'items':return<ItemsView/>;case 'receive':return<ReceiveView/>;case 'requisition':return<ReqView/>;case 'approvals':return<ApprovalView/>;case 'pr_list':return<PRView/>;
    case 'steel_dash':return<SteelDash/>;case 'steel_inv':return<SteelInv/>;case 'steel_withdraw':return<SteelWithdraw/>;case 'steel_return':return<SteelReturn/>;case 'steel_scrap':return<SteelScrap/>;case 'steel_log':return<SteelLog/>;
    case 'rpt_summary':return<RptSummary/>;case 'rpt_receive':return<RptReceive/>;case 'rpt_pay':return<RptPay/>;case 'rpt_in_out':return<RptInOut/>;case 'rpt_by_dept':return<RptByDept/>;case 'rpt_cancel':return<RptCancel/>;case 'rpt_qty_dept':return<RptByDept/>;case 'rpt_val_dept':return<RptValDept/>;case 'rpt_val_cat':return<RptValCat/>;case 'rpt_low':return<RptLow/>;case 'rpt_high':return<RptHigh/>;case 'rpt_oos':return<RptOOS/>;case 'rpt_no_move':return<RptNoMove/>;case 'rpt_inactive':return<RptInactive/>;
    case 'set_cat':return<SetCRUD title="หมวดหมู่ วัสดุ-อุปกรณ์" icon={Ic.tag} data={cats} setData={setCats} pfx="CAT" cols={[{h:'รหัส',k:'id'},{h:'ชื่อ',k:'name'},{h:'คำอธิบาย',k:'desc'}]} fields={[{k:'id',l:'รหัส'},{k:'name',l:'ชื่อ'},{k:'desc',l:'คำอธิบาย',req:false}]}/>;
    case 'set_dept':return<SetCRUD title="หน่วยงาน / แผนก" icon={Ic.brief} data={depts} setData={setDepts} pfx="DPT" cols={[{h:'รหัส',k:'id'},{h:'ชื่อ',k:'name'}]} fields={[{k:'id',l:'รหัส'},{k:'name',l:'ชื่อ'}]}/>;
    case 'set_loc':return<SetCRUD title="สถานที่จัดเก็บ" icon={Ic.map} data={locs} setData={setLocs} pfx="LOC" cols={[{h:'รหัส',k:'id'},{h:'ชื่อ',k:'name'}]} fields={[{k:'id',l:'รหัส'},{k:'name',l:'ชื่อ'}]}/>;
    case 'set_sup':return<SetCRUD title="ผู้จำหน่าย (Supplier)" icon={Ic.truck} data={sups} setData={setSups} pfx="SUP" cols={[{h:'รหัส',k:'id'},{h:'ชื่อ',k:'name'},{h:'เบอร์',k:'contact'},{h:'หมายเหตุ',k:'note'}]} fields={[{k:'id',l:'รหัส'},{k:'name',l:'ชื่อ'},{k:'contact',l:'เบอร์',req:false},{k:'note',l:'หมายเหตุ',req:false}]}/>;
    case 'set_apv':return<ApproverMgmt/>;
    case 'set_usr':return<UserMgmt/>;
    case 'set_import':return<SetImport/>;case 'set_backup':return<SetBackup/>;
    case 'acc_users':return<AccessUsers/>;case 'acc_roles':return<AccessRoles/>;case 'acc_teams':return<AccessTeams/>;case 'acc_perms':return<AccessPerms/>;case 'acc_workflow':return<AccessWorkflow/>;case 'acc_positions':return<AccessPositions/>;
    case 'profile':return<ProfileView/>;
    default:return<Dashboard/>;
  }};

  // ===== Profile View (controlled, saves properly) =====
  const ProfileView=()=>{
    const [pf,setPf]=useState({fullName:user.fullName,newPw:'',confirmPw:''});
    const savePf=()=>{
      if(pf.newPw&&pf.newPw!==pf.confirmPw){notify('รหัสผ่านไม่ตรงกัน','err');return}
      const updatedUser={...user,fullName:pf.fullName||user.fullName};
      if(pf.newPw)updatedUser.password=pf.newPw;
      setUser(updatedUser);
      setAccounts(accounts.map(a=>a.id===user.id?{...a,fullName:updatedUser.fullName,password:updatedUser.password,avatar:updatedUser.fullName.substring(0,2)}:a));
      notify('บันทึกข้อมูลส่วนตัวสำเร็จ');setPf({...pf,newPw:'',confirmPw:''});
    };
    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border p-6 max-w-2xl">
      <div className="flex items-center gap-5 mb-6 pb-6 border-b"><div className="w-20 h-20 rounded-2xl bg-emerald-100 flex items-center justify-center text-2xl font-black text-emerald-600">{user.avatar}</div><div><h2 className="text-xl font-bold text-slate-800">{user.fullName}</h2><p className="text-slate-500 text-sm">{user.role} • {user.dept}</p><p className="text-slate-400 text-xs mt-1">Username: {user.username} • ID: {user.id}</p></div></div>
      <div className="grid grid-cols-2 gap-4 mb-6">
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อ-สกุล</label><input value={pf.fullName} onChange={e=>setPf({...pf,fullName:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ตำแหน่ง / Role</label><input value={user.role} disabled className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก</label><input value={user.dept} disabled className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Username</label><input value={user.username} disabled className="w-full border rounded-lg p-2.5 text-sm outline-none bg-slate-50"/></div>
      </div>
      <div className="mb-6"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เปลี่ยนรหัสผ่าน</label><div className="grid grid-cols-2 gap-4"><input type="password" placeholder="รหัสผ่านใหม่" value={pf.newPw} onChange={e=>setPf({...pf,newPw:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/><input type="password" placeholder="ยืนยันรหัสผ่านใหม่" value={pf.confirmPw} onChange={e=>setPf({...pf,confirmPw:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div></div>
      <div className="flex justify-between items-center"><button onClick={logout} className="text-rose-500 hover:bg-rose-50 px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 border border-rose-200"><I d={Ic.logout} size={16}/>ออกจากระบบ</button><button onClick={savePf} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-bold hover:bg-emerald-700 flex items-center gap-2"><I d={Ic.save} size={16}/>บันทึก</button></div>
    </div></div>);
  };

  // ==================== LAYOUT ====================
  // Workers & Designers: always mobile
  if(isMobile || isWorker || isDesign) return(<div className="h-screen overflow-hidden text-slate-800">
    {toast.show&&<div className={`fixed top-5 right-5 z-[200] px-5 py-3.5 rounded-xl shadow-2xl flex items-center font-bold anim-slide text-white text-sm ${toast.type==='err'?'bg-rose-500':'bg-emerald-600'}`}><I d={toast.type==='err'?Ic.alert:Ic.check2} size={18} cls="mr-2.5"/>{toast.msg}</div>}
    <MobileView/>
  </div>);

  return(<div className="flex h-screen overflow-hidden text-slate-800">
    {/* Toast */}
    {toast.show&&<div className={`fixed top-5 right-5 z-[60] px-5 py-3.5 rounded-xl shadow-2xl flex items-center font-bold anim-slide text-white text-sm ${toast.type==='err'?'bg-rose-500':'bg-emerald-600'}`}><I d={toast.type==='err'?Ic.alert:Ic.check2} size={18} cls="mr-2.5"/>{toast.msg}</div>}
    {mob&&<div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-20 md:hidden" onClick={()=>setMob(false)}/>}

    {/* Sidebar */}

              {notifs.filter(n=>!n.read&&(n.targetUser===user.fullName||n.targetRoles.includes(user.role))).length>0&&<button onClick={()=>{setNotifs(notifs.map(n=>(n.targetUser===user.fullName||n.targetRoles.includes(user.role))?{...n,read:true}:n))}} className="text-[10px] text-emerald-600 font-bold hover:underline">อ่านทั้งหมด</button>}</div>
              <div className="overflow-y-auto" style={{maxHeight:'55vh'}}>
              {(()=>{const myNotifs=notifs.filter(n=>n.targetUser===user.fullName||n.targetRoles.includes(user.role));
                return myNotifs.length?myNotifs.slice(0,20).map(n=><div key={n.id} className={`p-3.5 border-b hover:bg-slate-50 cursor-pointer ${n.read?'opacity-60':''}`} onClick={()=>{if(!n.read)setNotifs(notifs.map(x=>x.id===n.id?{...x,read:true}:x));if(n.link==='pr_list'||n.link==='pr')nav('pr_list');else if(n.link==='requisition')nav('approvals');setView(n.link==='pr_list'||n.link==='pr'?'pr_list':n.link==='requisition'?'approvals':'dashboard');}}>
                  <div className="flex justify-between items-start mb-1"><span className="font-bold text-sm text-slate-800">{n.title}</span>{!n.read&&<div className="w-2 h-2 bg-emerald-500 rounded-full mt-1.5 shrink-0"/>}</div>
                  <div className="text-xs text-slate-600 mb-1">{n.msg}</div>
                  <div className="text-[10px] text-slate-400">จาก {n.from} • {n.date} {n.time}</div>
                </div>):<div className="p-8 text-center text-slate-400 text-sm">ไม่มีแจ้งเตือน</div>})()}
              </div>
            </div>}
          </div>
          <div className="flex items-center text-sm text-slate-700 cursor-pointer hover:bg-slate-50 p-2 rounded-xl border border-transparent hover:border-slate-200">
            <div className="bg-emerald-100 p-1.5 rounded-lg mr-2.5"><I d={Ic.userCir} size={18} cls="text-emerald-600"/></div>
            <div className="hidden sm:flex flex-col"><span className="font-bold text-xs">{user.fullName}</span><span className="text-[10px] text-slate-400 font-bold">{user.role} • TGT Metalworks</span></div>
          </div>
          <button onClick={logout} className="text-slate-400 hover:text-rose-500 p-2 hover:bg-rose-50 rounded-xl" title="ออกจากระบบ"><I d={Ic.logout} size={18}/></button>
        </div>
      </header>
      <main className="flex-1 overflow-y-auto bg-[#F8FAFC]">{R()}</main>
    </div>
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
