<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGT Metalworks — รายการสินค้าทั้งหมด 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f5f2; --surface: #ffffff; --surface2: #e8f0ec; --surface3: #dce8e2;
  --border: #c0d4c8; --text: #1e2b24; --text2: #506058; --text3: #7f9b8c;
  --accent: #2d7a50; --accent-dim: rgba(45,122,80,.10);
  --accent2: #1b5e3b; --green: #2d7a50; --green-dim: rgba(45,122,80,.08);
  --red: #c25a5a; --red-dim: rgba(194,90,90,.08);
  --blue: #3a7a8a; --blue-dim: rgba(58,122,138,.08);
  --amber: #b08930; --amber-dim: rgba(176,137,48,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh;}
.mono{font-family:'JetBrains Mono',monospace;}

.header{
  background:var(--surface);padding:24px 36px 20px;
  border-bottom:2px solid var(--accent);
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;
}
.header h1{font-size:21px;font-weight:700;color:var(--accent2);}
.header .sub{font-size:12px;color:var(--text2);margin-top:3px;}
.header-right{text-align:right;font-size:12px;color:var(--text3);}

/* Status tabs */
.tab-bar{
  display:flex;padding:0 36px;background:var(--surface);border-bottom:1px solid var(--border);
}
.tab-btn{
  padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;
  border:none;background:none;color:var(--text3);font-family:inherit;
  border-bottom:3px solid transparent;transition:all .15s;
  display:flex;align-items:center;gap:8px;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active-all{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn.active-approved{color:var(--green);border-bottom-color:var(--green);}
.tab-btn.active-awaiting{color:var(--amber);border-bottom-color:var(--amber);}
.tab-count{
  display:inline-flex;align-items:center;justify-content:center;
  padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;
}
.tc-all{background:var(--accent-dim);color:var(--accent);}
.tc-approved{background:var(--green-dim);color:var(--green);}
.tc-awaiting{background:var(--amber-dim);color:var(--amber);}

/* Summary */
.summary-strip{display:flex;gap:10px;padding:16px 36px;flex-wrap:wrap;}
.sum-card{
  background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:14px 18px;flex:1;min-width:140px;box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.sum-card .sc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;font-weight:500;}
.sum-card .sc-value{font-size:19px;font-weight:700;}
.sum-card .sc-sub{font-size:10px;color:var(--text2);margin-top:3px;}

/* Category chips */
.cat-section{padding:4px 36px 10px;}
.cat-section h2{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.cat-grid{display:flex;gap:6px;flex-wrap:wrap;}
.cat-chip{
  display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  transition:all .15s;user-select:none;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.02);
}
.cat-chip:hover{border-color:var(--accent);color:var(--text);}
.cat-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600;}
.cat-chip .cc-count{display:inline-block;background:var(--surface2);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:600;color:var(--text3);}
.cat-chip.active .cc-count{background:rgba(45,122,80,.15);color:var(--accent);}

/* Controls */
.controls{
  padding:10px 36px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.search-box{flex:1;min-width:180px;max-width:320px;position:relative;}
.search-box input{
  width:100%;padding:8px 12px 8px 34px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;
}
.search-box input:focus{border-color:var(--accent);background:var(--surface);}
.search-box .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;}
.sort-btn{
  padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface);
  color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer;transition:all .15s;font-weight:500;
}
.sort-btn:hover,.sort-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.result-count{font-size:11px;color:var(--text3);margin-left:auto;}

/* Table */
.table-wrap{padding:0 36px 16px;overflow-x:auto;}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;}
thead th{
  background:var(--surface2);text-align:left;font-weight:600;font-size:10px;color:var(--text2);
  text-transform:uppercase;letter-spacing:.3px;padding:9px 10px;border-bottom:2px solid var(--border);
  position:sticky;top:44px;z-index:5;white-space:nowrap;
}
tbody tr{transition:background .1s;cursor:pointer;}
tbody tr:hover{background:rgba(45,122,80,.04);}
tbody td{padding:8px 10px;border-bottom:1px solid var(--surface2);vertical-align:middle;}

.po-detail-row td{padding:0 !important;border-bottom:1px solid var(--surface2);}
.po-detail{background:var(--surface2);overflow:hidden;max-height:0;transition:max-height .3s ease;}
.po-detail.open{max-height:600px;overflow-y:auto;}
.po-detail-inner{padding:8px 14px 8px 50px;}
.po-detail-inner table{font-size:11.5px;margin:0;}
.po-detail-inner th{background:transparent;border-bottom:1px solid var(--border);padding:5px 8px;position:static;font-size:10px;}
.po-detail-inner td{padding:5px 8px;border-bottom:1px solid rgba(0,0,0,.04);}
.po-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;}
.po-badge.a{background:var(--green-dim);color:var(--green);}
.po-badge.w{background:var(--amber-dim);color:var(--amber);}
.expand-icon{display:inline-block;transition:transform .2s;font-size:10px;color:var(--text3);margin-right:3px;}
.expand-icon.open{transform:rotate(90deg);}

.rank-num{
  display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;
  border-radius:6px;font-size:10px;font-weight:700;
}
.rk1{background:#e0f2e8;color:#2d7a50;}
.rk2{background:#e2eef5;color:#3a7a8a;}
.rk3{background:#f0ece2;color:#b08930;}
.rkn{background:var(--surface2);color:var(--text3);}

.item-name-cell{max-width:260px;font-weight:500;line-height:1.3;}
.item-name-text{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tbody tr:hover .item-name-text{white-space:normal;}
.val-bar-track{width:60px;height:4px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.val-bar-fill{height:100%;border-radius:3px;}
.cat-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;white-space:nowrap;}

.pagination{display:flex;justify-content:center;align-items:center;gap:4px;padding:14px 36px 36px;flex-wrap:wrap;}
.page-btn{
  min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;border:1px solid var(--border);background:var(--surface);
  color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .12s;font-weight:500;
}
.page-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.page-btn.disabled{opacity:.3;pointer-events:none;}
.page-info{font-size:10px;color:var(--text3);margin:0 5px;}

@media(max-width:768px){
  .header,.tab-bar,.summary-strip,.cat-section,.controls,.table-wrap,.pagination{padding-left:12px;padding-right:12px;}
  .item-name-cell{max-width:160px;} .po-detail-inner{padding-left:12px;}
  .tab-btn{padding:10px 14px;font-size:13px;}
}
</style>
</head>

const CAT_CONFIG = {"เหล็ก / สแตนเลส / โลหะ": {"icon": "🔩", "color": "#3a7a5c"}, "เครื่องจักร / อุปกรณ์หลัก": {"icon": "⚙️", "color": "#c27a4a"}, "สี / เคมี / สารเคลือบ": {"icon": "🎨", "color": "#b89040"}, "น็อต / สกรู / ข้อต่อ": {"icon": "🔧", "color": "#6b8a9b"}, "แก๊สอุตสาหกรรม": {"icon": "🧪", "color": "#4a9b80"}, "วัสดุสิ้นเปลือง / บรรจุภัณฑ์": {"icon": "📦", "color": "#8a7baa"}, "งานจ้าง / บริการ": {"icon": "🏗️", "color": "#a07050"}, "อะไหล่ / ชิ้นส่วน": {"icon": "🔗", "color": "#4a88a0"}, "เครื่องมือ / ใบตัด / ดอกสว่าน": {"icon": "🛠️", "color": "#7a9a5a"}, "ไฟฟ้า / อิเล็กทรอนิกส์": {"icon": "⚡", "color": "#b0a040"}, "กระจก": {"icon": "🪟", "color": "#5aabb8"}, "PPE / สำนักงาน / ทั่วไป": {"icon": "🦺", "color": "#b06060"}, "ชิ้นส่วนจ้างผลิต (Subcon)": {"icon": "🏭", "color": "#8070a0"}, "วัสดุงานเชื่อม": {"icon": "🔥", "color": "#c09040"}, "ส่วนลด / มัดจำ": {"icon": "💳", "color": "#888"}, "อื่นๆ": {"icon": "📋", "color": "#708878"}};

const PER_PAGE = 50;
let filtered = [];
let currentPage = 1, currentSort = 'value', activeCat = null, activeTab = 'all';
let expandedIdx = null;

// Pre-compute status-filtered item sets
function getItemsForTab(tab) {
  return ALL_ITEMS.map(item => {
    if (tab === 'all') return item;
    const statusCode = tab === 'approved' ? 'a' : 'w';
    const matchRefs = item.r.filter(r => r.st === statusCode);
    if (matchRefs.length === 0) return null;
    return {
      ...item,
      r: matchRefs,
      v: matchRefs.reduce((a, r) => a + r.val, 0),
      q: matchRefs.reduce((a, r) => a + r.qty, 0),
      o: new Set(matchRefs.map(r => r.po)).size,
      d: matchRefs.sort((a,b) => b.dt.localeCompare(a.dt))[0].dt,
    };
  }).filter(Boolean);
}

const fmt = n=>n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?new Intl.NumberFormat('th-TH').format(Math.round(n)):n.toFixed(n%1?2:0);
const fmtFull = n=>new Intl.NumberFormat('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}).format(n);

// Tab counts
const approvedItems = getItemsForTab('approved');
const awaitingItems = getItemsForTab('awaiting');
document.getElementById('tcAll').textContent = ALL_ITEMS.length;
document.getElementById('tcApproved').textContent = approvedItems.length;
document.getElementById('tcAwaiting').textContent = awaitingItems.length;

// Tab buttons
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active-all','active-approved','active-awaiting');
    });
    const tab = btn.dataset.tab;
    btn.classList.add('active-' + tab);
    activeTab = tab;
    currentPage = 1; expandedIdx = null;
    rebuildAll();
  });
});

function rebuildAll() {
  const baseItems = getItemsForTab(activeTab);
  buildSummary(baseItems);
  buildCatChips(baseItems);
  applyFilters(baseItems);
}

function buildSummary(items) {
  const ss = document.getElementById('summaryStrip');
  const totalVal = items.reduce((a,i) => a+i.v, 0);
  const totalQty = items.reduce((a,i) => a+i.q, 0);
  const cats = [...new Set(items.map(i => i.c))];
  const tabLabel = activeTab === 'all' ? 'ทั้งหมด' : activeTab === 'approved' ? 'อนุมัติแล้ว' : 'รออนุมัติ';
  const accentColor = activeTab === 'awaiting' ? 'var(--amber)' : 'var(--accent)';
  ss.innerHTML = [
    {l:'รายการสินค้า ('+tabLabel+')', v:items.length.toLocaleString(), s:'รายการ', c:accentColor},
    {l:'มูลค่ารวม', v:'฿'+fmt(totalVal), s:'บาท', c:accentColor},
    {l:'จำนวนรวม', v:fmtFull(totalQty), s:'ชิ้น/หน่วย', c:'var(--blue)'},
    {l:'หมวดหมู่', v:cats.length, s:'กลุ่ม', c:'var(--text2)'},
  ].map(s => `<div class="sum-card"><div class="sc-label">${s.l}</div><div class="sc-value mono" style="color:${s.c}">${s.v}</div><div class="sc-sub">${s.s}</div></div>`).join('');
}

function buildCatChips(items) {
  const catGrid = document.getElementById('catGrid');
  const catStats = {};
  items.forEach(i => { if(!catStats[i.c]) catStats[i.c]={count:0,total:0}; catStats[i.c].count++; catStats[i.c].total+=i.v; });
  const sorted = Object.keys(catStats).sort((a,b) => catStats[b].total - catStats[a].total);
  
  catGrid.innerHTML = `<div class="cat-chip active" data-cat="all">📊 ทั้งหมด<span class="cc-count">${items.length}</span></div>`;
  sorted.forEach(cat => {
    const cfg = CAT_CONFIG[cat] || {icon:'📋',color:'#888'};
    catGrid.innerHTML += `<div class="cat-chip" data-cat="${cat}">${cfg.icon} ${cat}<span class="cc-count">${catStats[cat].count}</span></div>`;
  });
  
  document.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.dataset.cat === 'all' ? null : chip.dataset.cat;
      currentPage = 1; expandedIdx = null;
      applyFilters(getItemsForTab(activeTab));
    });
  });
}

document.getElementById('searchInput').addEventListener('input', () => {
  currentPage = 1; expandedIdx = null;
  applyFilters(getItemsForTab(activeTab));
});
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentSort = btn.dataset.sort;
    currentPage = 1; expandedIdx = null;
    applyFilters(getItemsForTab(activeTab));
  });
});

function applyFilters(baseItems) {
  if (!baseItems) baseItems = getItemsForTab(activeTab);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = baseItems.filter(item => {
    if (q && !item.n.toLowerCase().includes(q)) return false;
    if (activeCat && item.c !== activeCat) return false;
    return true;
  });
  if (currentSort === 'value') filtered.sort((a,b) => b.v - a.v);
  else if (currentSort === 'qty') filtered.sort((a,b) => b.q - a.q);
  else if (currentSort === 'orders') filtered.sort((a,b) => b.o - a.o || b.v - a.v);
  else if (currentSort === 'name') filtered.sort((a,b) => a.n.localeCompare(b.n, 'th'));
  render();
}

function toggleRow(idx) { expandedIdx = expandedIdx === idx ? null : idx; render(); }

function render() {
  const maxVal = filtered.length > 0 ? filtered[0].v : 1;
  const tp = Math.ceil(filtered.length / PER_PAGE);
  if (currentPage > tp) currentPage = tp || 1;
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);
  document.getElementById('resultCount').textContent = filtered.length > 0 
    ? `${start+1}-${Math.min(start+PER_PAGE,filtered.length)} จาก ${filtered.length} รายการ`
    : 'ไม่พบรายการ';
  
  const tbody = document.getElementById('tableBody');
  let rows = '';
  page.forEach((item, i) => {
    const gi = start + i;
    const pct = Math.max((item.v / maxVal) * 100, 0.4);
    const cfg = CAT_CONFIG[item.c] || {icon:'📋', color:'#888'};
    const rkCls = gi===0?'rk1':gi===1?'rk2':gi===2?'rk3':'rkn';
    const isOpen = expandedIdx === gi;
    
    rows += `<tr onclick="toggleRow(${gi})">
      <td><span class="expand-icon ${isOpen?'open':''}">▶</span><span class="rank-num ${rkCls}">${gi+1}</span></td>
      <td class="item-name-cell"><span class="item-name-text" title="${item.n}">${item.n}</span></td>
      <td><span class="cat-badge" style="background:${cfg.color}12;color:${cfg.color}">${cfg.icon} ${item.c}</span></td>
      <td class="mono" style="font-weight:600;color:var(--accent);white-space:nowrap;">฿${fmtFull(item.v)}</td>
      <td><div class="val-bar-track"><div class="val-bar-fill" style="width:${pct}%;background:${cfg.color}"></div></div></td>
      <td class="mono" style="white-space:nowrap;">${fmtFull(item.q)}</td>
      <td class="mono" style="color:var(--text2);white-space:nowrap;">฿${fmtFull(item.p)}</td>
      <td class="mono" style="text-align:center">${item.o}</td>
      <td style="color:var(--text2);font-size:11px;white-space:nowrap;">${item.d}</td>
    </tr>`;
    
    rows += `<tr class="po-detail-row"><td colspan="9"><div class="po-detail ${isOpen?'open':''}"><div class="po-detail-inner">`;
    if (isOpen && item.r && item.r.length > 0) {
      rows += `<table><thead><tr><th>เลขที่ PO</th><th>วันที่</th><th>ผู้จำหน่าย</th><th>จำนวน</th><th>มูลค่า (฿)</th><th>สถานะ</th></tr></thead><tbody>`;
      item.r.forEach(ref => {
        rows += `<tr>
          <td class="mono" style="font-weight:600;color:var(--accent)">${ref.po}</td>
          <td>${ref.dt}</td>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${ref.sup}">${ref.sup}</td>
          <td class="mono">${fmtFull(ref.qty)}</td>
          <td class="mono" style="font-weight:600">฿${fmtFull(ref.val)}</td>
          <td><span class="po-badge ${ref.st}">${ref.st==='a'?'อนุมัติ':'รอ'}</span></td>
        </tr>`;
      });
      rows += `</tbody></table>`;
    }
    rows += `</div></div></td></tr>`;
  });
  tbody.innerHTML = rows;
  
  // Pagination
  const pag = document.getElementById('pagination');
  if (tp <= 1) { pag.innerHTML = ''; return; }
  let h = `<button class="page-btn ${currentPage===1?'disabled':''}" onclick="goPage(${currentPage-1})">◀</button>`;
  const range = [];
  if (tp <= 7) { for (let i=1;i<=tp;i++) range.push(i); }
  else {
    range.push(1); if(currentPage>3) range.push('...');
    for (let i=Math.max(2,currentPage-1);i<=Math.min(tp-1,currentPage+1);i++) range.push(i);
    if (currentPage<tp-2) range.push('...'); range.push(tp);
  }
  range.forEach(p => {
    if (p==='...') h += `<span class="page-info">…</span>`;
    else h += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  h += `<button class="page-btn ${currentPage===tp?'disabled':''}" onclick="goPage(${currentPage+1})">▶</button>`;
  h += `<span class="page-info">· ${tp} หน้า</span>`;
  pag.innerHTML = h;
}

window.goPage = function(p) {
  const tp = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>tp) return;
  currentPage = p; expandedIdx = null; render();
  window.scrollTo({top:document.querySelector('.controls').offsetTop-10,behavior:'smooth'});
};
window.toggleRow = toggleRow;

rebuildAll();
</script>
</body>
</html>
