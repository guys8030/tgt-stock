  const RptOOS=()=>{const os=items.filter(i=>i.balance===0);return(<Wrap title="วัสดุหมดจากคลัง" icon={Ic.xCircle} onExport={()=>toExcel(['#','รหัส','รายการ','หมวดหมู่','คงเหลือ'],os.map((it,i)=>[i+1,it.id,it.name,catName(it.category),0]),'วัสดุหมดสต๊อก')}><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">รหัส</th><th className="p-3">รายการ</th><th className="p-3">หมวด</th><th className="p-3 text-center">คงเหลือ</th></tr></thead><tbody className="divide-y">{os.length?os.map((it,i)=><tr key={it.id} className="bg-rose-50/30"><td className="p-3 text-center">{i+1}</td><td className="p-3 font-mono">{it.id}</td><td className="p-3 font-bold">{it.name}</td><td className="p-3 text-xs">{catName(it.category)}</td><td className="p-3 text-center font-black text-rose-600">0</td></tr>):<tr><td colSpan="5" className="p-10 text-center text-slate-400">ไม่มีรายการหมดสต๊อก</td></tr>}</tbody></table></div></Wrap>);};

  const RptNoMove=()=>{const nm=items.filter(i=>i.pay===0);return(<Wrap title="วัสดุไม่มีการเบิก" icon={Ic.archive} onExport={()=>toExcel(['#','รหัส','รายการ','หมวดหมู่','คงเหลือ'],nm.map((it,i)=>[i+1,it.id,it.name,catName(it.category),it.balance]),'วัสดุไม่มีการเบิก')}><Fil month cat/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">รหัส</th><th className="p-3">รายการ</th><th className="p-3">หมวด</th><th className="p-3 text-center">คงเหลือ</th></tr></thead><tbody className="divide-y">{nm.length?nm.map((it,i)=><tr key={it.id}><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3 font-mono">{it.id}</td><td className="p-3 font-bold">{it.name}</td><td className="p-3 text-xs">{catName(it.category)}</td><td className="p-3 text-center font-bold">{it.balance}</td></tr>):<tr><td colSpan="5" className="p-10 text-center text-slate-400">ทุกรายการมีการเคลื่อนไหว</td></tr>}</tbody></table></div></Wrap>);};

  const RptInactive=()=>{const ia=items.filter(i=>i.status==='เลิกใช้งาน');return(<Wrap title="วัสดุเลิกใช้งาน" icon={Ic.archive} onExport={()=>toExcel(['#','รหัส','รายการ','สถานะ','คงเหลือ'],ia.map((it,i)=>[i+1,it.id,it.name,it.status,it.balance]),'วัสดุเลิกใช้งาน')}><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">รหัส</th><th className="p-3">รายการ</th><th className="p-3 text-center">สถานะ</th><th className="p-3 text-center">คงเหลือ</th></tr></thead><tbody className="divide-y">{ia.length?ia.map((it,i)=><tr key={it.id}><td className="p-3 text-center">{i+1}</td><td className="p-3 font-mono">{it.id}</td><td className="p-3 font-bold">{it.name}</td><td className="p-3 text-center"><Badge s="เลิกใช้งาน"/></td><td className="p-3 text-center font-bold">{it.balance}</td></tr>):<tr><td colSpan="5" className="p-10 text-center text-slate-400">ไม่มีรายการเลิกใช้</td></tr>}</tbody></table></div></Wrap>);};

  // ==================== GENERIC SETTINGS CRUD ====================
  const SetCRUD=({title,icon,data,setData,cols,fields,pfx})=>{
    const [q,setQ2]=useState('');const [modal,setModal]=useState(false);const [ed,setEd]=useState(null);const [form,setForm]=useState({});const [del,setDel]=useState(null);
    const blank={};fields.forEach(f=>{blank[f.k]=f.def||'';});
    const openA=()=>{setEd(null);setForm({...blank,id:`${pfx}-${String(data.length+1).padStart(2,'0')}`});setModal(true);};
    const openE=it=>{setEd(it);setForm({...it});setModal(true);};
    const sv=e=>{e.preventDefault();if(ed){setData(data.map(i=>i.id===ed.id?{...i,...form}:i));notify('แก้ไขสำเร็จ');}else{setData([...data,form]);notify('เพิ่มสำเร็จ');}setModal(false);};
    const rm=()=>{if(!del)return;setData(data.filter(i=>i.id!==del.id));notify('ลบสำเร็จ');setDel(null);};
    const fil=data.filter(i=>Object.values(i).join(' ').toLowerCase().includes(q.toLowerCase()));
    return(<Wrap title={title} icon={icon}>
      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
        <button onClick={openA} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700"><I d={Ic.plus} size={18}/>เพิ่มข้อมูลใหม่</button>
        <div className="relative w-full sm:w-72"><input placeholder="ค้นหา..." className="w-full bg-slate-50 border rounded-xl py-2.5 pl-10 pr-4 text-sm outline-none focus:ring-1 focus:ring-emerald-500" value={q} onChange={e=>setQ2(e.target.value)}/><I d={Ic.search} size={16} cls="absolute left-3.5 top-3 text-slate-400"/></div>
      </div>
      <div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th>{cols.map((c,i)=><th key={i} className="p-3 font-bold">{c.h}</th>)}<th className="p-3 text-center w-28">จัดการ</th></tr></thead>

    </Wrap>);
  };

  // ==================== STEEL STOCK MODULE ====================

  const gradeInfo=gid=>STEEL_GRADES.find(g=>g.id===gid)||{name:gid,color:'#94a3b8'};
  const typeInfo=tid=>STEEL_TYPES.find(t=>t.id===tid)||{name:tid};
  const sizeStr=(s)=>s.type==='SHEET'?`${s.width}×${s.length} mm`:`OD${s.width}mm × L${s.length}mm`;
  const areaCalc=(s)=>s.type==='SHEET'?((s.width*s.length)/1e6).toFixed(2)+' m²':s.length+'mm';

  // ========== STEEL PRICING & WEIGHT SYSTEM ==========
  const STEEL_DENSITY={SS400:7.85,SUS304:7.93,SUS316:7.93,SPHC:7.85,SGCC:7.85,ALU:2.71}; // kg/dm³
  const calcSteelWeight=(s)=>{
    const d=STEEL_DENSITY[s.grade]||7.85;
    if(s.type==='SHEET'){
      // Volume in dm³: (width_mm/100)*(length_mm/100)*(thickness_mm/100) = mm³/1e6 = dm³? No.
      // 1 dm = 100mm, so vol in dm³ = (w/100)*(l/100)*(t/100)
      return (s.width/100)*(s.length/100)*(s.thickness/100)*d; // kg per sheet
    } else {
      // PIPE: approximate as hollow cylinder — use OD and thickness
      // OD = s.width (mm), wall = s.thickness (mm), L = s.length (mm)
      const od=s.width, wt=s.thickness, L=s.length;
      const id=od-2*wt;
      // vol = π/4*(OD²-ID²)*L in mm³, convert to dm³ (/1e6)
      return (Math.PI/4*(od*od-id*id)*L/1e6)*d; // kg per piece
    }
  };
  const calcSteelWeightTotal=(s)=>calcSteelWeight(s)*s.qty;
  const steelPricePerKg=(s)=>{if(!s.unitPrice||calcSteelWeight(s)===0)return 0;return s.unitPrice/calcSteelWeight(s);};
  const steelTotalValue=(s)=>(s.unitPrice||0)*s.qty;
  const totalSteelStockValue=steels.filter(s=>s.status!=='Scrap').reduce((sum,s)=>sum+(s.unitPrice||0)*s.qty,0);

  // ==================== PURCHASE REQUEST (PR) MANAGEMENT — Desktop ====================
  const PRView=()=>{
    const [selPR,setSelPR]=useState(null);const [noteText,setNoteText]=useState('');const [filterSt,setFilterSt]=useState('all');
    const PR_STATUSES=['รอ Store ตรวจสอบ','มีในสต๊อก','กำลังจัดซื้อ','รับของแล้ว','เสร็จสิ้น','ปฏิเสธ'];
    const stColor={'รอ Store ตรวจสอบ':'text-amber-700 bg-amber-100','กำลังจัดซื้อ':'text-blue-700 bg-blue-100','มีในสต๊อก':'text-emerald-700 bg-emerald-100','รับของแล้ว':'text-emerald-700 bg-emerald-100','ปฏิเสธ':'text-rose-700 bg-rose-100','เสร็จสิ้น':'text-emerald-800 bg-emerald-200'};
    const filtered=filterSt==='all'?prs:prs.filter(p=>p.status===filterSt);
    const pendingCount=prs.filter(p=>p.status==='รอ Store ตรวจสอบ').length;
    const updatePR=(id,updates)=>{
      const pr=prs.find(p=>p.id===id);
      setPrs(prs.map(p=>p.id===id?{...p,...updates}:p));
      // Send notification to employee who created the PR
      if(pr&&updates.status){
        const msgMap={
          'มีในสต๊อก':{title:'มีของในสต๊อกแล้ว',msg:`PR ของคุณ (${pr.items.map(i=>i.name).join(', ')}) — มีในสต๊อกเพียงพอ ติดต่อ Store เพื่อรับของได้เลย`},
          'กำลังจัดซื้อ':{title:'กำลังจัดซื้อให้',msg:`PR ของคุณ (${pr.items.map(i=>i.name).join(', ')}) — Store กำลังดำเนินการจัดซื้อ จะแจ้งเมื่อของมาถึง`},
          'รับของแล้ว':{title:'ของมาถึงแล้ว!',msg:`PR ของคุณ (${pr.items.map(i=>i.name).join(', ')}) — ของมาถึงคลังแล้ว รอ Store รับเข้าสต๊อกและนัดรับของ`},
          'เสร็จสิ้น':{title:'PR เสร็จสิ้น — รับของได้',msg:`PR ของคุณ (${pr.items.map(i=>i.name).join(', ')}) — เสร็จสิ้นแล้ว ติดต่อ Store เพื่อรับของ`},
          'ปฏิเสธ':{title:'PR ถูกปฏิเสธ',msg:`PR ของคุณ (${pr.items.map(i=>i.name).join(', ')}) — ถูกปฏิเสธ เหตุผล: ${updates.storeNote||'-'}`},
        };
        const m=msgMap[updates.status];
        if(m)addNotif(pr.requestedBy,[],m.title,m.msg,'pr',id);
      }
      setSelPR(null);setNoteText('');
    };
    const detail=selPR?prs.find(p=>p.id===selPR):null;
    return(<Wrap title="ใบขอซื้อ — Purchase Requests (PR)" icon={Ic.file}>
      {/* Summary cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        {[{l:'ทั้งหมด',n:prs.length,c:'bg-slate-50 text-slate-600'},{l:'รอตรวจสอบ',n:pendingCount,c:'bg-amber-50 text-amber-700'},{l:'กำลังจัดซื้อ',n:prs.filter(p=>p.status==='กำลังจัดซื้อ').length,c:'bg-blue-50 text-blue-700'},{l:'เสร็จสิ้น',n:prs.filter(p=>p.status==='เสร็จสิ้น'||p.status==='รับของแล้ว').length,c:'bg-emerald-50 text-emerald-700'}].map((c,i)=>
        <div key={i} className={`p-4 rounded-xl border ${c.c}`}><div className="text-2xl font-black">{c.n}</div><div className="text-xs font-bold">{c.l}</div></div>)}
      </div>
      {/* Filter */}
      <div className="flex flex-wrap gap-2 mb-5">
        <button onClick={()=>setFilterSt('all')} className={`px-4 py-1.5 rounded-full text-xs font-bold border ${filterSt==='all'?'bg-emerald-600 text-white border-emerald-600':'bg-white text-slate-600 border-slate-200'}`}>ทั้งหมด ({prs.length})</button>
        {PR_STATUSES.map(s=>{const cnt=prs.filter(p=>p.status===s).length;return cnt>0&&<button key={s} onClick={()=>setFilterSt(s)} className={`px-4 py-1.5 rounded-full text-xs font-bold border ${filterSt===s?'bg-emerald-600 text-white border-emerald-600':'bg-white text-slate-600 border-slate-200'}`}>{s} ({cnt})</button>})}
      </div>
      {/* Table */}
      {filtered.length?<div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 font-bold">เลขที่</th><th className="p-3 font-bold">วันที่</th><th className="p-3 font-bold">ผู้ขอ</th><th className="p-3 font-bold">แผนก</th><th className="p-3 font-bold">รายการ</th><th className="p-3 font-bold text-center">จำนวนรวม</th><th className="p-3 font-bold">ต้องใช้</th><th className="p-3 font-bold text-center">สถานะ</th><th className="p-3 font-bold text-center">จัดการ</th></tr></thead>
      <tbody className="divide-y">{filtered.map(p=><tr key={p.id} className={`hover:bg-slate-50/50 ${p.status==='รอ Store ตรวจสอบ'?'bg-amber-50/30':''}`}>
        <td className="p-3 font-mono text-xs text-indigo-600">{p.id.substring(0,18)}</td>
        <td className="p-3 text-slate-600 text-xs">{p.date}</td>
        <td className="p-3 font-bold text-slate-800">{p.requestedBy}</td>
        <td className="p-3 text-xs">{p.department}</td>
        <td className="p-3 text-xs">{p.items.map(i=>i.name).join(', ').substring(0,40)}{p.items.map(i=>i.name).join(', ').length>40?'...':''}</td>
        <td className="p-3 text-center font-black">{p.totalQty}</td>
        <td className="p-3 text-xs text-slate-500">{p.needBy}</td>
        <td className="p-3 text-center"><span className={`px-2.5 py-0.5 rounded-full text-[10px] font-bold ${stColor[p.status]||'bg-slate-100 text-slate-500'}`}>{p.status}</span></td>
        <td className="p-3 text-center"><button onClick={()=>{setSelPR(p.id);setNoteText(p.storeNote||'')}} className="bg-sky-50 text-sky-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-sky-100"><I d={Ic.edit} size={13}/></button></td>
      </tr>)}</tbody></table></div>
      :<div className="text-center py-12 text-slate-400 border rounded-xl bg-slate-50">ไม่มีใบขอซื้อ{filterSt!=='all'?' (ตาม filter ที่เลือก)':' — รอพนักงานสร้าง PR จาก Mobile'}</div>}
      {/* Detail Modal */}
      {detail&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl anim-zoom max-h-[90vh] overflow-y-auto">
        <div className="border-b p-5 flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-blue-100 p-1.5 rounded-lg"><I d={Ic.file} size={18} cls="text-blue-600"/></div>รายละเอียด PR</h3><button onClick={()=>setSelPR(null)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <div className="p-5">
          {/* PR Info */}
          <div className="grid grid-cols-2 gap-4 mb-5 text-sm">
            <div><span className="text-xs text-slate-400 font-bold">เลขที่</span><div className="font-mono text-indigo-600">{detail.id}</div></div>
            <div><span className="text-xs text-slate-400 font-bold">วันที่</span><div>{detail.date}</div></div>
            <div><span className="text-xs text-slate-400 font-bold">ผู้ขอ</span><div className="font-bold">{detail.requestedBy}</div></div>
            <div><span className="text-xs text-slate-400 font-bold">แผนก</span><div>{detail.department}</div></div>
            <div><span className="text-xs text-slate-400 font-bold">ต้องใช้วันที่</span><div>{detail.needBy}</div></div>
            <div><span className="text-xs text-slate-400 font-bold">เหตุผล / Job</span><div>{detail.reason}</div></div>
          </div>
          {/* Items table */}
          <div className="mb-5"><div className="text-xs font-bold text-slate-500 mb-2 uppercase">รายการวัสดุที่ขอซื้อ</div>
          <div className="border rounded-xl overflow-hidden"><table className="w-full text-sm"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2.5 text-left font-bold text-xs">#</th><th className="p-2.5 text-left font-bold text-xs">รายการ</th><th className="p-2.5 text-center font-bold text-xs">จำนวน</th><th className="p-2.5 text-left font-bold text-xs">หน่วย</th><th className="p-2.5 text-left font-bold text-xs">หมวด</th></tr></thead>
          <tbody className="divide-y">{detail.items.map((it,i)=><tr key={i}><td className="p-2.5 text-xs text-slate-400">{i+1}</td><td className="p-2.5 font-bold">{it.name}</td><td className="p-2.5 text-center font-black">{it.qty}</td><td className="p-2.5 text-xs">{it.unit}</td><td className="p-2.5 text-xs">{it.cat}</td></tr>)}</tbody></table></div></div>
          {/* Current status */}
          <div className="mb-5"><div className="text-xs font-bold text-slate-500 mb-2 uppercase">สถานะปัจจุบัน</div>
          <span className={`px-3 py-1 rounded-full text-xs font-bold ${stColor[detail.status]||'bg-slate-100 text-slate-500'}`}>{detail.status}</span></div>
          {/* Store note */}
          <div className="mb-5"><div className="text-xs font-bold text-slate-500 mb-2 uppercase">หมายเหตุจาก Store</div>
          <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} rows="2" placeholder="เช่น: มีในสต๊อก 3 ชิ้น ขาดอีก 2 ชิ้น สั่งซื้อให้แล้ว" className="w-full border rounded-xl p-3 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
          {/* Action buttons */}
          {(isAdmin||isStore)&&<div className="space-y-2">
            <div className="text-xs font-bold text-slate-500 mb-2 uppercase">เปลี่ยนสถานะ</div>
            <div className="flex flex-wrap gap-2">
              {detail.status==='รอ Store ตรวจสอบ'&&<>
                <button onClick={()=>updatePR(detail.id,{status:'มีในสต๊อก',storeNote:noteText||'มีในสต๊อกเพียงพอ เบิกได้เลย'})} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-700">มีในสต๊อก (ไม่ต้องซื้อ)</button>
                <button onClick={()=>updatePR(detail.id,{status:'กำลังจัดซื้อ',storeNote:noteText||'กำลังดำเนินการจัดซื้อ'})} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700">ไม่มี — สร้างใบสั่งซื้อ</button>
                <button onClick={()=>{if(!noteText.trim()){notify('กรุณาระบุเหตุผล','err');return}updatePR(detail.id,{status:'ปฏิเสธ',storeNote:noteText})}} className="bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-rose-600">ปฏิเสธ</button>
              </>}
              {detail.status==='กำลังจัดซื้อ'&&<>
                <button onClick={()=>updatePR(detail.id,{status:'รับของแล้ว',storeNote:noteText||'ของมาถึงแล้ว — กรุณาไปรับเข้าสต๊อก ตรวจนับจำนวนจริง',receivedDate:new Date().toLocaleDateString('th-TH')})} className="bg-amber-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-amber-700">ของมาถึงแล้ว (ยังไม่เข้าสต๊อก)</button>
              </>}
              {detail.status==='รับของแล้ว'&&<>
                <div className="w-full bg-amber-50 border border-amber-200 rounded-xl p-4 mb-2">
                  <div className="flex items-center gap-2 mb-2"><I d={Ic.alert} size={16} cls="text-amber-600"/><span className="text-amber-800 font-bold text-xs">ของมาถึงแล้ว แต่ยังไม่ได้รับเข้าสต๊อก</span></div>
                  <div className="text-xs text-amber-700 mb-3">กรุณาไปหน้า "รับเข้าสต๊อก" เพื่อตรวจนับจำนวนจริงและเพิ่มเข้าคลัง จากนั้นกลับมากดปุ่ม "เสร็จสิ้น" ที่นี่</div>
                  <div className="text-xs text-slate-500 mb-2">รายการที่ต้องรับเข้า:</div>
                  <div className="space-y-1 mb-3">{detail.items.map((it,idx)=><div key={idx} className="flex items-center justify-between bg-white rounded-lg px-3 py-2 text-xs border"><span className="font-bold text-slate-800">{it.name}</span><span className="text-slate-600">{it.qty} {it.unit}</span></div>)}</div>
                  <button onClick={()=>{setSelPR(null);nav('receive')}} className="w-full bg-emerald-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-emerald-700 flex items-center justify-center gap-2"><I d={Ic.download} size={16}/>ไปหน้ารับเข้าสต๊อก</button>
                </div>
                <button onClick={()=>updatePR(detail.id,{status:'เสร็จสิ้น',storeNote:noteText||'รับเข้าสต๊อกและจ่ายของให้พนักงานแล้ว'})} className="bg-emerald-700 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-800">รับเข้าสต๊อกแล้ว — เสร็จสิ้น</button>
              </>}
              {detail.status==='มีในสต๊อก'&&<>
                <button onClick={()=>updatePR(detail.id,{status:'เสร็จสิ้น',storeNote:noteText||'จ่ายของให้พนักงานแล้ว'})} className="bg-emerald-700 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-800">เสร็จสิ้น — จ่ายของแล้ว</button>
              </>}
              {detail.status!=='เสร็จสิ้น'&&detail.status!=='ปฏิเสธ'&&<button onClick={()=>updatePR(detail.id,{storeNote:noteText})} className="bg-white border text-slate-600 px-4 py-2 rounded-xl text-xs font-bold">บันทึกหมายเหตุ</button>}
            </div>
          </div>}
        </div>
      </div></div>}
    </Wrap>);
  };

  // Steel Dashboard
  const SteelDash=()=>{
    const full=steels.filter(s=>s.status==='พร้อมใช้');
    const remnant=steels.filter(s=>s.status==='เศษเหลือ');
    const scrap=steels.filter(s=>s.status==='Scrap');
    const byGrade={};steels.filter(s=>s.status!=='Scrap').forEach(s=>{byGrade[s.grade]=(byGrade[s.grade]||0)+s.qty;});
    const byThk={};steels.filter(s=>s.type==='SHEET'&&s.status!=='Scrap').forEach(s=>{const k=s.thickness+'mm';byThk[k]=(byThk[k]||0)+s.qty;});

    return(<div className="p-4 md:p-8 anim-fade">
      <div className="mb-6"><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-3"><I d={Ic.layers} size={28} cls="text-sky-600"/>คลังเหล็ก — Steel Stock</h1><p className="text-slate-500 text-sm">จัดการแผ่นเหล็ก, ท่อเหล็ก, เศษเหลือ และ Scrap</p></div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
        {[{t:'แผ่น/ท่อพร้อมใช้',n:full.reduce((s,x)=>s+x.qty,0),c:'text-sky-600 bg-sky-50',ic:Ic.layers},{t:'เศษเหลือ (Remnant)',n:remnant.reduce((s,x)=>s+x.qty,0),c:'text-amber-600 bg-amber-50',ic:Ic.scissors},{t:'Scrap (ทิ้ง)',n:scrap.reduce((s,x)=>s+x.qty,0),c:'text-slate-500 bg-slate-100',ic:Ic.trash},{t:'มูลค่ารวม (฿)',n:'฿'+totalSteelStockValue.toLocaleString(),c:'text-emerald-600 bg-emerald-50',ic:Ic.tag},{t:'น้ำหนักรวม (kg)',n:steels.filter(s=>s.status!=='Scrap').reduce((s,x)=>s+calcSteelWeightTotal(x),0).toFixed(1)+' kg',c:'text-indigo-600 bg-indigo-50',ic:Ic.box}].map((c,i)=>
        <div key={i} className="bg-white p-5 rounded-2xl shadow-sm border hover:shadow-md transition-shadow"><div className={`w-11 h-11 rounded-xl flex items-center justify-center mb-3 ${c.c}`}><I d={c.ic} size={22}/></div><div className="text-2xl font-black text-slate-800">{c.n}</div><div className="text-sm font-bold text-slate-500">{c.t}</div></div>)}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className="bg-white rounded-2xl shadow-sm border p-5"><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.hash} size={18} cls="text-sky-500"/>สต๊อก แยกตามเกรด</h3><div className="space-y-2">{Object.entries(byGrade).map(([g,n])=>{const gi=gradeInfo(g);const gVal=steels.filter(s=>s.grade===g&&s.status!=='Scrap').reduce((s,x)=>s+(x.unitPrice||0)*x.qty,0);return<div key={g} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-sky-50" onClick={()=>nav('steel_inv')}><div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full" style={{background:gi.color}}/><span className="font-bold text-sm">{gi.name}</span></div><div className="text-right"><span className="font-black text-slate-800">{n} ชิ้น</span>{gVal>0&&<div className="text-[10px] text-emerald-600 font-bold">฿{gVal.toLocaleString()}</div>}</div></div>})}{Object.keys(byGrade).length===0&&<p className="text-center py-4 text-slate-400 text-sm">ไม่มีข้อมูล</p>}</div></div>
        <div className="bg-white rounded-2xl shadow-sm border p-5"><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.layers} size={18} cls="text-sky-500"/>แผ่นเหล็ก แยกตามความหนา</h3><div className="space-y-2">{Object.entries(byThk).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0])).map(([t,n])=><div key={t} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl"><span className="font-bold text-sm">{t}</span><span className="font-black text-slate-800">{n} แผ่น</span></div>)}{Object.keys(byThk).length===0&&<p className="text-center py-4 text-slate-400 text-sm">ไม่มีข้อมูล</p>}</div></div>
      </div>

      {/* ===== VALUE & WEIGHT BY GRADE ===== */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className="bg-white rounded-2xl shadow-sm border p-5"><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.tag} size={18} cls="text-emerald-500"/>มูลค่าเหล็ก แยกตามเกรด (฿)</h3><div className="space-y-2">{(()=>{const byVal={};steels.filter(s=>s.status!=='Scrap').forEach(s=>{byVal[s.grade]=(byVal[s.grade]||0)+(s.unitPrice||0)*s.qty});const arr=Object.entries(byVal).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...arr.map(([,v])=>v),1);return arr.length?arr.map(([g,v])=>{const gi=gradeInfo(g);return<div key={g} className="flex items-center gap-2"><div className="text-xs font-bold w-20 text-right truncate">{g}</div><div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden"><div className="h-full rounded-full flex items-center pl-2" style={{width:Math.max(v/mx*100,10)+'%',background:gi.color}}><span className="text-[10px] font-bold text-white">฿{v.toLocaleString()}</span></div></div></div>}):<p className="text-center py-4 text-slate-400 text-sm">ไม่มีข้อมูลราคา</p>})()}</div></div>
        <div className="bg-white rounded-2xl shadow-sm border p-5"><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.box} size={18} cls="text-indigo-500"/>น้ำหนักเหล็ก แยกตามเกรด (kg)</h3><div className="space-y-2">{(()=>{const byWt={};steels.filter(s=>s.status!=='Scrap').forEach(s=>{byWt[s.grade]=(byWt[s.grade]||0)+calcSteelWeightTotal(s)});const arr=Object.entries(byWt).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...arr.map(([,v])=>v),1);return arr.length?arr.map(([g,v])=>{const gi=gradeInfo(g);return<div key={g} className="flex items-center gap-2"><div className="text-xs font-bold w-20 text-right truncate">{g}</div><div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden"><div className="h-full rounded-full flex items-center pl-2" style={{width:Math.max(v/mx*100,10)+'%',background:gi.color}}><span className="text-[10px] font-bold text-white">{v.toFixed(1)} kg</span></div></div></div>}):<p className="text-center py-4 text-slate-400 text-sm">ไม่มีข้อมูล</p>})()}</div></div>
      </div>

      {/* ===== DETAIL: แยกตามเกรด แต่ละเกรดแสดงตามความหนา ===== */}
      <div className="mb-6"><h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><I d={Ic.database} size={22} cls="text-sky-500"/>รายละเอียดสต๊อกเหล็ก แยกตามเกรด</h2>
      <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
      {STEEL_GRADES.map(grade=>{
        const gradeItems=steels.filter(s=>s.grade===grade.id&&s.status!=='Scrap');
        if(gradeItems.length===0)return null;
        const gi=gradeInfo(grade.id);
        const totalQty=gradeItems.reduce((s,x)=>s+x.qty,0);
        const sheets=gradeItems.filter(s=>s.type==='SHEET');
        const pipes=gradeItems.filter(s=>s.type==='PIPE');
        const byThkGrade={};gradeItems.forEach(s=>{const k=s.thickness+'mm';if(!byThkGrade[k])byThkGrade[k]=[];byThkGrade[k].push(s);});
        const sortedThk=Object.entries(byThkGrade).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0]));
        return<div key={grade.id} className="bg-white rounded-2xl shadow-sm border overflow-hidden">
          {/* Grade header */}
          <div className="p-4 border-b flex items-center justify-between" style={{background:gi.color+'12'}}>
            <div className="flex items-center gap-2"><div className="w-4 h-4 rounded-full" style={{background:gi.color}}/><span className="font-bold text-slate-800">{gi.name}</span></div>
            <div className="flex items-center gap-3"><span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:gi.color+'22',color:gi.color}}>รวม {totalQty} ชิ้น</span><span className="text-xs font-bold px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700">฿{gradeItems.reduce((s,x)=>s+(x.unitPrice||0)*x.qty,0).toLocaleString()}</span></div>
          </div>
          {/* Type summary */}
          <div className="flex border-b text-xs">
            {sheets.length>0&&<div className="flex-1 p-2.5 text-center border-r bg-blue-50/50"><span className="text-blue-600 font-bold">แผ่น {sheets.reduce((s,x)=>s+x.qty,0)}</span></div>}
            {pipes.length>0&&<div className="flex-1 p-2.5 text-center bg-purple-50/50"><span className="text-purple-600 font-bold">ท่อ {pipes.reduce((s,x)=>s+x.qty,0)}</span></div>}
          </div>
          {/* Thickness breakdown */}
          <div className="divide-y">{sortedThk.map(([thk,items2])=>{
            const thkQty=items2.reduce((s,x)=>s+x.qty,0);
            return<div key={thk} className="p-3 hover:bg-slate-50/50">
              <div className="flex items-center justify-between mb-1"><span className="font-bold text-sm text-slate-800">หนา {thk}</span><span className="font-black text-sm" style={{color:gi.color}}>{thkQty} ชิ้น</span></div>
              <div className="space-y-1">{items2.map(s=><div key={s.id} className="flex items-center justify-between text-xs text-slate-500 pl-2">
                <div className="flex items-center gap-1.5">
                  <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold ${s.type==='SHEET'?'bg-blue-50 text-blue-500':'bg-purple-50 text-purple-500'}`}>{s.type==='SHEET'?'แผ่น':'ท่อ'}</span>
                  <span>{sizeStr(s)}</span>
                  {s.status==='เศษเหลือ'&&<span className="px-1.5 py-0.5 rounded text-[9px] font-bold bg-amber-50 text-amber-600">เศษ</span>}
                </div>
                <div className="flex items-center gap-2">
                  {s.unitPrice>0&&<span className="text-[9px] text-emerald-600 font-bold">฿{s.unitPrice.toLocaleString()}</span>}
                  <span className="text-[9px] text-slate-400">{calcSteelWeight(s).toFixed(1)}kg</span>
                  <span className="font-bold text-slate-700">{s.qty}</span>
                </div>
              </div>)}</div>
            </div>})}</div>
        </div>}).filter(Boolean)}
      </div>
      {steels.filter(s=>s.status!=='Scrap').length===0&&<div className="text-center py-12 text-slate-400 border rounded-xl bg-slate-50">ไม่มีเหล็กในคลัง</div>}
      </div>

      {remnant.length>0&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-5"><h3 className="font-bold text-amber-800 mb-3 flex items-center gap-2"><I d={Ic.scissors} size={18}/>เศษเหลือพร้อมใช้ (Remnant) — ออกแบบเช็คก่อนสั่งซื้อใหม่!</h3><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">{remnant.map(s=>{const gi=gradeInfo(s.grade);return<div key={s.id} className="bg-white p-4 rounded-xl border border-amber-100 shadow-sm"><div className="flex items-center gap-2 mb-2"><div className="w-2.5 h-2.5 rounded-full" style={{background:gi.color}}/><span className="font-bold text-sm">{gi.name}</span><span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-bold">{s.type==='SHEET'?'แผ่น':'ท่อ'}</span></div><div className="text-slate-700 text-sm">หนา <b>{s.thickness}mm</b> • {sizeStr(s)}</div><div className="text-xs text-slate-500 mt-1">{s.note}</div><div className="text-xs text-slate-400 mt-1">จำนวน: <b className="text-slate-700">{s.qty}</b> • {areaCalc(s)} • <span className="text-indigo-500">{calcSteelWeight(s).toFixed(1)}kg/ชิ้น</span>{s.unitPrice>0&&<span className="text-emerald-600 ml-1">฿{s.unitPrice.toLocaleString()}</span>}</div></div>})}</div></div>}
    </div>);
  };

  // Steel Inventory (CRUD)
  const SteelInv=()=>{
    const [q,setQ2]=useState('');const [fGrade,setFGrade]=useState('');const [fType,setFType]=useState('');const [fStatus,setFStatus]=useState('');
    const [modal,setModal]=useState(false);const [ed,setEd]=useState(null);const [form,setForm]=useState({});const [del,setDel]=useState(null);
    const blank={id:'',type:'SHEET',grade:'SS400',thickness:'',width:'',length:'',qty:1,status:'พร้อมใช้',note:'',minScrap:200,unitPrice:0};
    const openA=()=>{setEd(null);setForm({...blank,id:`STL-${String(steels.length+1).padStart(3,'0')}`});setModal(true);};
    const openE=s=>{setEd(s);setForm({...s});setModal(true);};
    const sv=e=>{e.preventDefault();const d={...form,thickness:Number(form.thickness),width:Number(form.width),length:Number(form.length),qty:Number(form.qty),minScrap:Number(form.minScrap),unitPrice:Number(form.unitPrice)||0};if(ed){setSteels(steels.map(s=>s.id===ed.id?{...s,...d}:s));notify('แก้ไขสำเร็จ');}else{setSteels([...steels,d]);notify('เพิ่มสำเร็จ');}setModal(false);};
    const rm=()=>{if(!del)return;setSteels(steels.filter(s=>s.id!==del.id));notify('ลบสำเร็จ');setDel(null);};
    const fil=steels.filter(s=>{let ok=true;if(q)ok=ok&&(s.id.includes(q)||s.note.includes(q)||gradeInfo(s.grade).name.includes(q));if(fGrade)ok=ok&&s.grade===fGrade;if(fType)ok=ok&&s.type===fType;if(fStatus)ok=ok&&s.status===fStatus;return ok;});
    const stColor={'พร้อมใช้':'bg-sky-50 text-sky-600','เศษเหลือ':'bg-amber-50 text-amber-700','Scrap':'bg-slate-100 text-slate-500'};

    return(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border p-6">
      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b pb-5"><div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-sky-50 p-2.5 rounded-xl mr-3"><I d={Ic.layers} size={24} cls="text-sky-600"/></div>รายการเหล็ก — Steel Inventory</div><button onClick={openA} className="bg-sky-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-sky-700 shadow-sm"><I d={Ic.plus} size={18}/>เพิ่มเหล็กใหม่</button></div>

      <div className="flex flex-wrap gap-3 mb-5">
        <div className="relative flex-1 min-w-[180px]"><input placeholder="ค้นหา..." className="w-full bg-slate-50 border rounded-xl py-2.5 pl-10 pr-4 text-sm outline-none focus:ring-1 focus:ring-sky-500" value={q} onChange={e=>setQ2(e.target.value)}/><I d={Ic.search} size={16} cls="absolute left-3.5 top-3 text-slate-400"/></div>
        <select value={fGrade} onChange={e=>setFGrade(e.target.value)} className="border rounded-xl py-2.5 px-3 text-sm bg-white min-w-[140px]"><option value="">ทุกเกรด</option>{STEEL_GRADES.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select>
        <select value={fType} onChange={e=>setFType(e.target.value)} className="border rounded-xl py-2.5 px-3 text-sm bg-white min-w-[120px]"><option value="">ทุกประเภท</option>{STEEL_TYPES.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} className="border rounded-xl py-2.5 px-3 text-sm bg-white min-w-[120px]"><option value="">ทุกสถานะ</option><option>พร้อมใช้</option><option>เศษเหลือ</option><option>Scrap</option></select>
      </div>

      <div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 font-bold">รหัส</th><th className="p-3 font-bold">ประเภท</th><th className="p-3 font-bold">เกรด</th><th className="p-3 font-bold text-center">หนา (mm)</th><th className="p-3 font-bold">ขนาด</th><th className="p-3 font-bold text-center">จำนวน</th><th className="p-3 font-bold text-right">ราคา/แผ่น (฿)</th><th className="p-3 font-bold text-right">฿/kg</th><th className="p-3 font-bold text-center">น้ำหนัก (kg)</th><th className="p-3 font-bold text-center">สถานะ</th><th className="p-3 font-bold">หมายเหตุ</th><th className="p-3 font-bold text-center">จัดการ</th></tr></thead>
      <tbody className="divide-y">{fil.map(s=>{const gi=gradeInfo(s.grade);return<tr key={s.id} className="hover:bg-slate-50/50">
        <td className="p-3 font-mono text-xs text-slate-500">{s.id}</td>
        <td className="p-3"><span className={`px-2 py-0.5 rounded text-xs font-bold ${s.type==='SHEET'?'bg-blue-50 text-blue-600':'bg-purple-50 text-purple-600'}`}>{s.type==='SHEET'?'แผ่น':'ท่อ'}</span></td>
        <td className="p-3"><div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full shrink-0" style={{background:gi.color}}/><span className="font-bold">{s.grade}</span></div></td>
        <td className="p-3 text-center font-black text-lg text-slate-800">{s.thickness}</td>
        <td className="p-3 text-slate-700">{sizeStr(s)}<div className="text-xs text-slate-400">{areaCalc(s)}</div></td>
        <td className="p-3 text-center font-black text-lg">{s.qty}</td>
        <td className="p-3 text-right font-bold text-emerald-700">{s.unitPrice?'฿'+s.unitPrice.toLocaleString():'-'}</td>
        <td className="p-3 text-right text-xs text-slate-500">{s.unitPrice?steelPricePerKg(s).toFixed(1):'-'}</td>
        <td className="p-3 text-center text-xs"><span className="font-bold text-indigo-600">{calcSteelWeight(s).toFixed(1)}</span><span className="text-slate-400 ml-0.5">kg</span></td>
        <td className="p-3 text-center"><span className={`px-2.5 py-0.5 rounded-full text-xs font-bold ${stColor[s.status]||'bg-slate-100 text-slate-500'}`}>{s.status}</span></td>
        <td className="p-3 text-xs text-slate-500 max-w-[160px] truncate">{s.note}</td>
        <td className="p-3 text-center"><div className="flex justify-center gap-1"><button onClick={()=>openE(s)} className="p-1.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-lg"><I d={Ic.edit} size={16}/></button><button onClick={()=>setDel(s)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg"><I d={Ic.trash} size={16}/></button></div></td>
      </tr>})}</tbody></table></div>
      <div className="mt-3 flex flex-wrap items-center justify-between gap-2">
        <span className="text-xs text-slate-400">แสดง {fil.length} จาก {steels.length} รายการ</span>
        <div className="flex items-center gap-4 text-xs">
          <span className="text-indigo-600 font-bold">น้ำหนักรวม: {fil.filter(s=>s.status!=='Scrap').reduce((s,x)=>s+calcSteelWeightTotal(x),0).toFixed(1)} kg</span>
          <span className="text-emerald-700 font-bold bg-emerald-50 px-2 py-0.5 rounded-full">มูลค่ารวม: ฿{fil.filter(s=>s.status!=='Scrap').reduce((s,x)=>s+(x.unitPrice||0)*x.qty,0).toLocaleString()}</span>
        </div>
      </div>

      {/* Modal */}
      {modal&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl anim-zoom max-h-[90vh] flex flex-col">
        <div className="border-b p-5 flex justify-between items-center shrink-0"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-sky-100 p-1.5 rounded-lg"><I d={ed?Ic.edit:Ic.plus} size={18} cls="text-sky-600"/></div>{ed?'แก้ไขเหล็ก':'เพิ่มเหล็กใหม่'}</h3><button onClick={()=>setModal(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={sv} className="p-6 space-y-4 bg-slate-50/30 overflow-y-auto"><div className="grid grid-cols-2 gap-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">รหัส</label><input required disabled={!!ed} value={form.id||''} onChange={e=>setForm({...form,id:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none disabled:bg-slate-100"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ประเภท</label><select value={form.type||'SHEET'} onChange={e=>setForm({...form,type:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{STEEL_TYPES.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เกรดเหล็ก</label><select value={form.grade||'SS400'} onChange={e=>setForm({...form,grade:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{STEEL_GRADES.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ความหนา (mm) *</label><input required type="number" step="0.1" min="0.1" value={form.thickness||''} onChange={e=>setForm({...form,thickness:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">{form.type==='PIPE'?'OD เส้นผ่าศูนย์กลาง (mm)':'กว้าง (mm)'} *</label><input required type="number" min="1" value={form.width||''} onChange={e=>setForm({...form,width:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ยาว (mm) *</label><input required type="number" min="1" value={form.length||''} onChange={e=>setForm({...form,length:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">จำนวน *</label><input required type="number" min="1" value={form.qty||1} onChange={e=>setForm({...form,qty:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">สถานะ</label><select value={form.status||'พร้อมใช้'} onChange={e=>setForm({...form,status:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"><option>พร้อมใช้</option><option>เศษเหลือ</option><option>Scrap</option></select></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ขนาดต่ำสุดก่อนทิ้ง Scrap (mm)</label><input type="number" value={form.minScrap||200} onChange={e=>setForm({...form,minScrap:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ราคา/แผ่น (฿) — Unit Price</label><input type="number" min="0" step="0.01" value={form.unitPrice||''} onChange={e=>setForm({...form,unitPrice:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none" placeholder="0"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมายเหตุ / Job</label><input value={form.note||''} onChange={e=>setForm({...form,note:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
        </div>
        <ImgUpload value={form.image||''} onChange={v=>setForm({...form,image:v})} label="รูปเหล็ก / เศษ"/>
        {/* Weight & Price Preview */}
        {form.thickness>0&&form.width>0&&form.length>0&&(()=>{
          const preview={type:form.type||'SHEET',grade:form.grade||'SS400',thickness:Number(form.thickness),width:Number(form.width),length:Number(form.length),unitPrice:Number(form.unitPrice)||0};
          const wt=calcSteelWeight(preview);const density=STEEL_DENSITY[preview.grade]||7.85;
          const pKg=preview.unitPrice>0&&wt>0?(preview.unitPrice/wt):0;
          return<div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 text-xs text-indigo-800 mt-1">
            <div className="flex items-center gap-1 mb-1 font-bold text-indigo-700"><I d={Ic.box} size={14}/>คำนวณอัตโนมัติ (Density: {density} kg/dm³)</div>
            <div className="grid grid-cols-3 gap-3 mt-2">
              <div className="bg-white rounded-lg p-2 text-center"><div className="text-[9px] text-indigo-500 font-bold">น้ำหนัก/ชิ้น</div><div className="text-sm font-black text-indigo-800">{wt.toFixed(2)} kg</div></div>
              <div className="bg-white rounded-lg p-2 text-center"><div className="text-[9px] text-indigo-500 font-bold">น้ำหนักรวม</div><div className="text-sm font-black text-indigo-800">{(wt*(Number(form.qty)||1)).toFixed(2)} kg</div></div>
              <div className="bg-white rounded-lg p-2 text-center"><div className="text-[9px] text-emerald-600 font-bold">ราคา/kg</div><div className="text-sm font-black text-emerald-700">{pKg>0?'฿'+pKg.toFixed(2):'-'}</div></div>
            </div>
            {Number(form.unitPrice)>0&&<div className="mt-2 text-center font-bold text-emerald-700">มูลค่ารวม: ฿{(Number(form.unitPrice)*(Number(form.qty)||1)).toLocaleString()}</div>}
          </div>})()}
        <div className="pt-4 flex justify-end gap-3 border-t"><button type="button" onClick={()=>setModal(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-sky-600 rounded-xl hover:bg-sky-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div></form>
      </div></div>}
      <Confirm show={!!del} title="ยืนยันการลบ" msg={`ลบ ${del?.id} (${del?.grade} ${del?.thickness}mm)?`} onOk={rm} onNo={()=>setDel(null)} danger/>
    </div></div>);
  };

  // Steel Withdraw (เบิกเหล็กไปตัด)
  const SteelWithdraw=()=>{
    const [sel,setSel]=useState('');const [qty,setQty2]=useState(1);const [job,setJob]=useState('');const [dp,setDp]=useState(depts[0]?.id||'');
    const avail=steels.filter(s=>s.status!=='Scrap'&&s.qty>0);
    const go=e=>{e.preventDefault();const s=steels.find(x=>x.id===sel);if(!s)return;if(Number(qty)<=0){notify('จำนวนต้องมากกว่า 0','err');return;}if(s.qty<Number(qty)){notify('จำนวนไม่พอ','err');return;}
      const newQty=s.qty-Number(qty);
      setSteels(steels.map(x=>x.id===sel?{...x,qty:newQty}:x).filter(x=>!(x.id===sel&&newQty<=0)));
      setSteelTxns([{id:`SWD-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),type:'เบิก',steelId:s.id,grade:s.grade,thickness:s.thickness,size:sizeStr(s),qty:Number(qty),job:job||'-',dept:deptName(dp),user:user.fullName,unitPrice:s.unitPrice||0},...steelTxns]);
      notify(`เบิกเหล็ก ${s.grade} ${s.thickness}mm จำนวน ${qty} สำเร็จ`);setSel('');setQty2(1);setJob('');};
    return(<Wrap title="เบิกเหล็กไปตัด / ใช้งาน" icon={Ic.scissors}>
      <form onSubmit={go} className="bg-slate-50 p-6 rounded-xl border max-w-4xl"><div className="grid grid-cols-1 md:grid-cols-2 gap-5 items-end">
        <SearchSelect label="เลือกเหล็ก" value={sel} onChange={v=>setSel(v)} required options={avail.map(s=>({value:s.id,label:`[${s.id}] ${s.grade} ${s.thickness}mm ${sizeStr(s)} (${s.status}) — คงเหลือ:${s.qty}`}))} placeholder="-- พิมพ์ค้นหาหรือเลือกเหล็ก --" cls="md:col-span-2"/>

        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก</label><select value={dp} onChange={e=>setDp(e.target.value)} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none">{depts.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
      </div><div className="mt-6 flex justify-end"><button type="submit" disabled={!sel} className="bg-sky-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-sky-700"><I d={Ic.scissors} size={16}/>ยืนยันการเบิก</button></div></form>
    </Wrap>);
  };

  // Steel Return Remnant (คืนเศษเหลือ)
  const SteelReturn=()=>{
    const [form,setForm]=useState({grade:'SS400',type:'SHEET',thickness:'',width:'',length:'',qty:1,job:'',note:''});
    const go=e=>{e.preventDefault();const nw={id:`STL-${String(steels.length+1).padStart(3,'0')}`,type:form.type,grade:form.grade,thickness:Number(form.thickness),width:Number(form.width),length:Number(form.length),qty:Number(form.qty),status:'เศษเหลือ',note:`เศษจาก ${form.job||'ไม่ระบุ Job'} — ${form.note}`,minScrap:form.type==='SHEET'?200:300};
      // Check if too small → auto Scrap
      const tooSmall=form.type==='SHEET'?(Number(form.width)<nw.minScrap||Number(form.length)<nw.minScrap):(Number(form.length)<nw.minScrap);
      if(tooSmall){nw.status='Scrap';nw.note+=' [ขนาดเล็กเกิน → Scrap อัตโนมัติ]';}
      setSteels([...steels,nw]);
      setSteelTxns([{id:`SRT-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),type:tooSmall?'Scrap(อัตโนมัติ)':'คืนเศษ',steelId:nw.id,grade:nw.grade,thickness:nw.thickness,size:`${form.width}×${form.length}mm`,qty:Number(form.qty),job:form.job||'-',dept:'-',user:user.fullName,unitPrice:0},...steelTxns]);
      notify(tooSmall?`เศษเล็กเกินไป → บันทึกเป็น Scrap อัตโนมัติ`:`คืนเศษเหลือ ${form.grade} ${form.thickness}mm สำเร็จ`);
      setForm({grade:'SS400',type:'SHEET',thickness:'',width:'',length:'',qty:1,job:'',note:''});};
    return(<Wrap title="คืนเศษเหลือจากการตัด (Return Remnant)" icon={Ic.repeat}>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-5 flex items-center gap-2 text-sm text-amber-700"><I d={Ic.info} size={16}/>ถ้าเศษเล็กกว่าขนาดต่ำสุด (กว้างหรือยาว &lt; 200mm สำหรับแผ่น, ยาว &lt; 300mm สำหรับท่อ) จะถูกบันทึกเป็น Scrap อัตโนมัติ</div>
      <form onSubmit={go} className="bg-slate-50 p-6 rounded-xl border max-w-4xl"><div className="grid grid-cols-2 md:grid-cols-3 gap-5">
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ประเภท</label><select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none">{STEEL_TYPES.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เกรด</label><select value={form.grade} onChange={e=>setForm({...form,grade:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none">{STEEL_GRADES.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หนา (mm) *</label><input required type="number" step="0.1" min="0.1" value={form.thickness} onChange={e=>setForm({...form,thickness:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">{form.type==='PIPE'?'OD (mm)':'กว้าง (mm)'} *</label><input required type="number" min="1" value={form.width} onChange={e=>setForm({...form,width:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ยาว (mm) *</label><input required type="number" min="1" value={form.length} onChange={e=>setForm({...form,length:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">จำนวน</label><input type="number" min="1" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Job / เลขที่งาน</label><input value={form.job} onChange={e=>setForm({...form,job:e.target.value})} placeholder="Job #2568-035" className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div className="col-span-2"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมายเหตุ</label><input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
      </div><div className="mt-6 flex justify-end"><button type="submit" className="bg-amber-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-amber-700"><I d={Ic.repeat} size={16}/>บันทึกเศษคืน</button></div></form>
    </Wrap>);
  };

  // Steel Mark as Scrap
  const SteelScrap=()=>{
    const [sortBy,setSortBy]=useState('thickness');const [sortDir,setSortDir]=useState('asc');
    const [filterGrade,setFilterGrade]=useState('');const [filterType,setFilterType]=useState('');
    let remnants=steels.filter(s=>s.status==='เศษเหลือ');
    if(filterGrade)remnants=remnants.filter(s=>s.grade===filterGrade);
    if(filterType)remnants=remnants.filter(s=>s.type===filterType);
    const sortFn=(a,b)=>{let va,vb;
      if(sortBy==='thickness'){va=a.thickness;vb=b.thickness}
      else if(sortBy==='grade'){va=a.grade;vb=b.grade;return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
      else if(sortBy==='qty'){va=a.qty;vb=b.qty}
      else if(sortBy==='size'){va=a.width*a.length;vb=b.width*b.length}
      else{va=a.id;vb=b.id;return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
      return sortDir==='asc'?va-vb:vb-va};
    remnants=remnants.sort(sortFn);
    const toggleSort=(col)=>{if(sortBy===col)setSortDir(sortDir==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('asc')}};
    const SortIcon=({col})=><span className="ml-1 text-[10px]">{sortBy===col?(sortDir==='asc'?'▲':'▼'):'↕'}</span>;
    const usedGrades=[...new Set(steels.filter(s=>s.status==='เศษเหลือ').map(s=>s.grade))];
    const markScrap=s=>{setSteels(steels.map(x=>x.id===s.id?{...x,status:'Scrap',note:x.note+' [ทิ้ง Scrap]'}:x));setSteelTxns([{id:`SSC-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),type:'ทิ้ง Scrap',steelId:s.id,grade:s.grade,thickness:s.thickness,size:sizeStr(s),qty:s.qty,job:'-',dept:'-',user:user.fullName,unitPrice:s.unitPrice||0},...steelTxns]);notify(`ทิ้ง ${s.id} เป็น Scrap แล้ว`);};
    return(<Wrap title="จัดการ Scrap (ทิ้งเศษเหล็ก)" icon={Ic.trash}>
      <h3 className="font-bold text-slate-800 mb-3">เศษเหลือ (Remnant) ที่สามารถทิ้งเป็น Scrap ได้</h3>
      {/* Filter & Sort Bar */}
      <div className="flex flex-wrap gap-3 mb-4 bg-slate-50 p-3 rounded-xl border items-end">
        <div className="min-w-[130px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เกรด</label><select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:ring-1 focus:ring-emerald-500"><option value="">-- ทั้งหมด --</option>{usedGrades.map(g=><option key={g} value={g}>{g}</option>)}</select></div>
        <div className="min-w-[130px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ประเภท</label><select value={filterType} onChange={e=>setFilterType(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:ring-1 focus:ring-emerald-500"><option value="">-- ทั้งหมด --</option><option value="SHEET">แผ่นเหล็ก</option><option value="PIPE">ท่อเหล็ก</option></select></div>
        <div className="min-w-[130px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เรียงตาม</label><select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:ring-1 focus:ring-emerald-500"><option value="thickness">ความหนา</option><option value="grade">เกรด</option><option value="qty">จำนวน</option><option value="size">ขนาด</option><option value="id">รหัส</option></select></div>
        <button onClick={()=>setSortDir(sortDir==='asc'?'desc':'asc')} className="bg-white border text-slate-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 h-[38px]">{sortDir==='asc'?'น้อย→มาก ▲':'มาก→น้อย ▼'}</button>
        <div className="text-xs text-slate-400 self-center">พบ {remnants.length} รายการ</div>
      </div>
      {remnants.length?<><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 cursor-pointer hover:text-emerald-600" onClick={()=>toggleSort('id')}>รหัส<SortIcon col="id"/></th><th className="p-3 cursor-pointer hover:text-emerald-600" onClick={()=>toggleSort('grade')}>เกรด<SortIcon col="grade"/></th><th className="p-3 text-center cursor-pointer hover:text-emerald-600" onClick={()=>toggleSort('thickness')}>หนา<SortIcon col="thickness"/></th><th className="p-3 cursor-pointer hover:text-emerald-600" onClick={()=>toggleSort('size')}>ขนาด<SortIcon col="size"/></th><th className="p-3 text-center cursor-pointer hover:text-emerald-600" onClick={()=>toggleSort('qty')}>จำนวน<SortIcon col="qty"/></th><th className="p-3 text-right font-bold">kg/ชิ้น</th><th className="p-3 text-right font-bold">น้ำหนักรวม (kg)</th><th className="p-3">หมายเหตุ</th><th className="p-3 text-center">ดำเนินการ</th></tr></thead>
      <tbody className="divide-y">{remnants.map(s=>{const wPc=calcSteelWeight(s);return<tr key={s.id} className="hover:bg-rose-50/30"><td className="p-3 font-mono text-xs">{s.id}</td><td className="p-3 font-bold">{s.grade}</td><td className="p-3 text-center font-bold">{s.thickness}mm</td><td className="p-3">{sizeStr(s)}</td><td className="p-3 text-center font-bold">{s.qty}</td><td className="p-3 text-right text-indigo-600 font-bold">{wPc.toFixed(2)}</td><td className="p-3 text-right font-black text-indigo-700 bg-indigo-50/40">{(wPc*s.qty).toFixed(2)}</td><td className="p-3 text-xs text-slate-500">{s.note}</td><td className="p-3 text-center"><button onClick={()=>markScrap(s)} className="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-rose-600 flex items-center gap-1 mx-auto"><I d={Ic.trash} size={13}/>ทิ้ง Scrap</button></td></tr>})}</tbody>
      <tfoot><tr className="bg-indigo-50 font-bold border-t-2 border-indigo-200"><td colSpan="4" className="p-3 text-indigo-800">รวมเศษเหลือ</td><td className="p-3 text-center text-indigo-800">{remnants.reduce((s,x)=>s+x.qty,0)}</td><td className="p-3"></td><td className="p-3 text-right text-indigo-800 font-black text-base">{remnants.reduce((s,x)=>s+calcSteelWeightTotal(x),0).toFixed(2)} kg</td><td colSpan="2" className="p-3"></td></tr></tfoot></table></div></>
      :<div className="text-center py-12 text-slate-400 border rounded-xl bg-slate-50">ไม่มีเศษเหลือ{(filterGrade||filterType)?' (ตาม filter ที่เลือก)':''}</div>}

      {steels.filter(s=>s.status==='Scrap').length>0&&<>{(()=>{const scraps=steels.filter(s=>s.status==='Scrap');const totalScrapWt=scraps.reduce((s,x)=>s+calcSteelWeightTotal(x),0);return<><h3 className="font-bold text-slate-800 mb-3 mt-8 flex items-center gap-2"><I d={Ic.archive} size={18} cls="text-slate-400"/>ประวัติ Scrap <span className="bg-slate-200 text-slate-600 text-xs px-2 py-0.5 rounded-full ml-2">{scraps.length} รายการ</span><span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full">รวม {totalScrapWt.toFixed(2)} kg</span></h3><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3">รหัส</th><th className="p-3">เกรด</th><th className="p-3 text-center">หนา</th><th className="p-3">ขนาด</th><th className="p-3 text-center">จำนวน</th><th className="p-3 text-right">kg/ชิ้น</th><th className="p-3 text-right font-bold">น้ำหนักรวม (kg)</th><th className="p-3">หมายเหตุ</th></tr></thead><tbody className="divide-y">{scraps.map(s=>{const wPc=calcSteelWeight(s);return<tr key={s.id} className="bg-slate-50/50"><td className="p-3 font-mono text-xs text-slate-400">{s.id}</td><td className="p-3 font-bold">{s.grade}</td><td className="p-3 text-center">{s.thickness}mm</td><td className="p-3">{sizeStr(s)}</td><td className="p-3 text-center font-bold">{s.qty}</td><td className="p-3 text-right text-slate-500">{wPc.toFixed(2)}</td><td className="p-3 text-right font-bold text-slate-700">{(wPc*s.qty).toFixed(2)}</td><td className="p-3 text-xs text-slate-500">{s.note}</td></tr>})}</tbody>
      <tfoot><tr className="bg-slate-100 font-bold border-t-2 border-slate-300"><td colSpan="4" className="p-3 text-slate-700">รวม Scrap ทั้งหมด</td><td className="p-3 text-center text-slate-700">{scraps.reduce((s,x)=>s+x.qty,0)}</td><td className="p-3"></td><td className="p-3 text-right text-slate-800 font-black text-base">{totalScrapWt.toFixed(2)} kg</td><td className="p-3"></td></tr></tfoot></table></div></>})()}</>}
    </Wrap>);
  };

  // Steel Transaction Log
  const SteelLog=()=>(<Wrap title="ประวัติธุรกรรมเหล็ก (Steel Log)" icon={Ic.repeat}>
    <div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3">วันที่</th><th className="p-3">ประเภท</th><th className="p-3">รหัส</th><th className="p-3">เกรด</th><th className="p-3 text-center">หนา</th><th className="p-3">ขนาด</th><th className="p-3 text-center">จำนวน</th><th className="p-3 text-right">ราคา/ชิ้น</th><th className="p-3">Job</th><th className="p-3">ผู้ทำ</th></tr></thead>
    <tbody className="divide-y">{steelTxns.length?steelTxns.map((t,i)=>{const tc={'เบิก':'text-rose-600 bg-rose-50','คืนเศษ':'text-amber-600 bg-amber-50','ทิ้ง Scrap':'text-slate-500 bg-slate-100','Scrap(อัตโนมัติ)':'text-slate-500 bg-slate-100','รับเข้า':'text-sky-600 bg-sky-50'};return<tr key={i} className="hover:bg-slate-50/50"><td className="p-3 text-slate-600">{t.date}</td><td className="p-3"><span className={`px-2 py-0.5 rounded text-xs font-bold ${tc[t.type]||'bg-slate-100 text-slate-500'}`}>{t.type}</span></td><td className="p-3 font-mono text-xs">{t.steelId}</td><td className="p-3 font-bold">{t.grade}</td><td className="p-3 text-center font-bold">{t.thickness}mm</td><td className="p-3 text-xs">{t.size}</td><td className="p-3 text-center font-bold">{t.qty}</td><td className="p-3 text-right text-emerald-700 font-bold">{t.unitPrice?'฿'+t.unitPrice.toLocaleString():'-'}</td><td className="p-3 text-xs">{t.job}</td><td className="p-3 text-xs">{t.user}</td></tr>}):<tr><td colSpan="10" className="p-10 text-center text-slate-400">ไม่มีประวัติ</td></tr>}</tbody></table></div>
  </Wrap>);

  // ==================== SIDEBAR SUB-ITEM ====================
  const Sub=({label,v})=>{const a=view===v;return<button onClick={()=>nav(v)} className={`w-full text-left pl-11 py-2 rounded-lg text-[13px] border-l-2 transition-all ${a?'bg-emerald-600 text-white font-bold border-emerald-400':'text-emerald-100/70 hover:text-white hover:bg-emerald-800/50 border-transparent hover:border-emerald-400'}`}>{label}</button>;};
  const SbBtn=({icon,label,v,badge})=>{const a=view===v;return<button onClick={()=>nav(v)} className={`w-full flex items-center justify-between px-4 py-2.5 rounded-lg transition-all mt-1 text-sm font-medium ${a?'bg-emerald-600 text-white shadow-sm':'text-emerald-50/80 hover:bg-emerald-800/50 hover:text-white'}`}><div className="flex items-center gap-3"><I d={icon} size={20} cls={a?'text-white':'text-emerald-400/80'}/><span>{label}</span></div>{badge>0&&<span className="bg-rose-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">{badge}</span>}</button>;};
  const Grp=({icon,label,open,toggle,children})=>(<div><button onClick={toggle} className={`w-full flex items-center justify-between px-4 py-2.5 rounded-lg transition-all mt-1 text-sm font-medium ${open?'bg-emerald-900 text-white':'hover:bg-emerald-800/50 text-emerald-100/80 hover:text-white'}`}><div className="flex items-center gap-3"><I d={icon} size={20} cls={open?'text-emerald-400':''}/><span>{label}</span></div><I d={Ic.chevDown} size={16} cls={`transition-transform duration-300 ${open?'rotate-180':''}`}/></button><div className={`overflow-hidden transition-all duration-300 ${open?'max-h-[800px] opacity-100 mt-1':'max-h-0 opacity-0'}`}><div className="flex flex-col gap-0.5">{children}</div></div></div>);

  // ==================== MOBILE VIEW ====================
  const gradeColor=(g)=>({SS400:'#475569',SUS304:'#6366f1',ALU:'#0ea5e9',SGCC:'#22c55e',SPHC:'#f59e0b',SUS316:'#8b5cf6'}[g]||'#475569');
  const gradeBg=(g)=>({SS400:'#f1f5f9',SUS304:'#ede9fe',ALU:'#ecfeff',SGCC:'#f0fdf4',SPHC:'#fffbeb',SUS316:'#f5f3ff'}[g]||'#f1f5f9');
  const sizeStr2=(s)=>s.type==='PIPE'?`OD${s.width}mm × ${s.length}mm`:`${s.width}×${s.length}mm`;
  const MobileView=()=>{
    const [mp,setMp]=useState('home');const [mData,setMData]=useState(null);
    const [stFilter2,setStFilter2]=useState('all');const [stQ,setStQ]=useState('');
    const low=items.filter(i=>i.balance<=i.min&&i.balance>0);
    const remnants=steels.filter(s=>s.status==='เศษเหลือ');
    const recentTxns=txns.slice(0,5);
    // Filtered steels
    const fSteels=steels.filter(s=>{if(s.status==='Scrap')return false;let ok=true;if(stFilter2==='SHEET')ok=s.type==='SHEET';else if(stFilter2==='PIPE')ok=s.type==='PIPE';else if(stFilter2==='REM')ok=s.status==='เศษเหลือ'||s.status==='จองแล้ว';if(stQ){const txt=(s.grade+' '+s.thickness+' '+sizeStr2(s)+' '+s.note+' '+s.status).toLowerCase();ok=ok&&txt.includes(stQ.toLowerCase())}return ok;});

    // ===== Mobile Requisition =====
    const MReq=()=>{
      const [sel,setSel2]=useState('');const [qty2,setQty3]=useState(1);const [dept2,setDept2]=useState(depts[0]?.id||'');const [jobM,setJobM]=useState('');
      const avail=items.filter(i=>i.status==='เบิกได้');
      const selItem=items.find(i=>i.id===sel);
      const [showShortage,setShowShortage]=useState(false);
      const doReq=()=>{if(!sel){notify('กรุณาเลือกรายการ','err');return}
        const it=items.find(i=>i.id===sel);if(!it)return;const nQty=Number(qty2);
        if(!Number.isInteger(nQty)||nQty<=0){notify('จำนวนต้องเป็นจำนวนเต็มมากกว่า 0','err');return;}
        if(it.balance<nQty){setShowShortage(true);return;}
        setReqs([{id:`REQ-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),itemId:it.id,itemName:it.name,qty:nQty,department:deptName(dept2),departmentId:dept2,requestedBy:user.fullName,job:jobM||'-',status:'รอดำเนินการ',approvedBy:null,approvedDate:null,rejectReason:null},...reqs]);
        notify(`สร้างรายการเบิก "${it.name}" × ${qty2} — รอดำเนินการ`);setSel2('');setQty3(1);setJobM('');};
      const doMPartial=()=>{const it=items.find(i=>i.id===sel);if(!it)return;const nQty=Number(qty2);const avl=it.balance;const shortage=nQty-avl;
        if(avl>0)setReqs(prev=>[{id:`REQ-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),itemId:it.id,itemName:it.name,qty:avl,department:deptName(dept2),departmentId:dept2,requestedBy:user.fullName,job:jobM||'-',status:'รอดำเนินการ',approvedBy:null,approvedDate:null,rejectReason:null},...prev]);
        setPrs(prev=>[{id:`PR-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),items:[{name:it.name,qty:shortage,unit:it.unit||'ชิ้น',cat:'อะไหล่',note:''}],totalQty:shortage,department:deptName(dept2),departmentId:dept2,requestedBy:user.fullName,needBy:'-',reason:`สต๊อกไม่พอ ขาด ${shortage}`,status:'รอ Store ตรวจสอบ',storeNote:'',receivedDate:''},...prev]);
        addNotif('',['Admin','Store'],`PR อัตโนมัติ: ${it.name}`,`สต๊อกไม่พอ — ${user.fullName} ขอเบิก ${nQty} มี ${avl} → PR ขอซื้อเพิ่ม ${shortage}`,'pr_list','');

      </tr>)}</tbody></table></div>
      {modal3&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg anim-zoom max-h-[90vh] overflow-y-auto sb">
        <div className="border-b p-5 flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-emerald-100 p-1.5 rounded-lg"><I d={ed3?Ic.edit:Ic.plus} size={18} cls="text-emerald-600"/></div>{ed3?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้ใหม่'}</h3><button onClick={()=>setModal3(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>

            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">รหัสผ่าน *</label><input required value={f.password} onChange={e=>setF({...f,password:e.target.value})} placeholder="1234" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
            <div className="col-span-2"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อ-สกุล *</label><input required value={f.fullName} onChange={e=>setF({...f,fullName:e.target.value})} placeholder="ชื่อ นามสกุล" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>

            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก *</label><select value={f.dept} onChange={e=>setF({...f,dept:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none">{depts.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}</select></div>
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ตำแหน่ง</label><select value={f.position||''} onChange={e=>setF({...f,position:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none"><option value="">-- เลือก --</option>{positions.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}</select></div>

            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เบอร์โทร</label><input value={f.phone||''} onChange={e=>setF({...f,phone:e.target.value})} placeholder="08x-xxx-xxxx" className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
            <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">วันที่เริ่มงาน</label><input type="date" value={f.hireDate||''} onChange={e=>setF({...f,hireDate:e.target.value})} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>

        </form>
      </div></div>}
      <Confirm show={!!del3} title="ยืนยันการลบ" msg={`ลบผู้ใช้ ${del3?.fullName} (${del3?.username})?`} onOk={rm} onNo={()=>setDel3(null)} danger/>
