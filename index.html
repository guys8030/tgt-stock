const LS_KEY='tgt-stock-v9';
const lsLoad=(key,fallback)=>{try{const d=localStorage.getItem(LS_KEY+'-'+key);return d?JSON.parse(d):fallback;}catch(e){return fallback;}};
const lsSave=(key,val)=>{try{localStorage.setItem(LS_KEY+'-'+key,JSON.stringify(val));}catch(e){console.error('localStorage save failed:',e);}};
const lsClear=()=>{Object.keys(localStorage).filter(k=>k.startsWith(LS_KEY)).forEach(k=>localStorage.removeItem(k));};

// ========== IMAGE UPLOAD UTILITY ==========
const resizeImage=(file,maxPx=400)=>new Promise((resolve,reject)=>{
  const reader=new FileReader();
  reader.onload=e=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    resolve(c.toDataURL('image/jpeg',0.8));
  };img.onerror=reject;img.src=e.target.result;};
  reader.onerror=reject;reader.readAsDataURL(file);
});

              <div style={{width:32,height:32,borderRadius:8,background:a.role==='Admin'?'#059669':a.role==='Store'?'#2563eb':a.role==='MD'||a.role==='GM'?'#7c3aed':a.role==='FM'?'#dc2626':a.role==='ออกแบบ'?'#0891b2':'#f97316',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{a.avatar}</div>
              <div><div style={{fontSize:12,fontWeight:700,color:'#1e293b'}}>{a.fullName}</div><div style={{fontSize:10,color:'#94a3b8'}}>{a.role} • {a.username}</div></div>
            </button>)}
          </div>
        </div>}
        <div style={{textAlign:'center',marginTop:12,cursor:'pointer'}} onClick={()=>{setDevClicks(c=>c+1);if(devClicks>=4)setDevMode(true);}}><span style={{fontSize:10,color:'#cbd5e1'}}>TGT Store V9.0</span></div>
        <div style={{textAlign:'center',marginTop:4}}><span style={{fontSize:10,color:'#cbd5e1'}}>พัฒนาโดย นายธนชาต กนกโชติวรกิจ</span></div>
      </div>
    </div>);
  };

  if(!user) return <LoginScreen/>;
  const role=user.role;
  const isAdmin=role==='Admin';
  const isStore=role==='Store';
  const isMgmt=role==='MD'||role==='GM';
  const isFM=role==='FM';
  const isDesign=role==='ออกแบบ';
  const isWorker=role==='พนักงาน';
  const canDesktop=isAdmin||isStore||isMgmt||isFM;
  const canApprove=isAdmin||isMgmt||isFM;
  const canSteel=isAdmin||isStore||isDesign||isMgmt||isFM;
  const canReturnSteel=isAdmin||isStore||isFM;
  const logout=()=>{setUser(null);};

  const notify=(msg,type='ok')=>{setToast({show:true,msg,type});setTimeout(()=>setToast({show:false,msg:'',type:'ok'}),3000);};
  const addNotif=(targetUser,targetRoles,title,msg,link,prId)=>{setNotifs(prev=>[{id:`NTF-${Date.now()}-${Math.random().toString(36).substr(2,4)}`,date:new Date().toLocaleDateString('th-TH'),time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),targetUser,targetRoles:targetRoles||[],title,msg,link:link||'',prId:prId||'',read:false,from:user?.fullName||'ระบบ'},...prev]);};
  const pending=reqs.filter(r=>r.status==='รอดำเนินการ').length;
  const waitDispatch=reqs.filter(r=>r.status==='อนุมัติ — รอรับของ').length;
  const catName=id=>cats.find(c=>c.id===id)?.name||id;
  const deptName=id=>depts.find(d=>d.id===id)?.name||id;
  const locName=id=>locs.find(l=>l.id===id)?.name||id;
  const supName=id=>sups.find(s=>s.id===id)?.name||(id||'-');
  const nav=v=>{setView(v);setMob(false);};

  // ===== Confirm Dialog =====
  const Confirm=({show,title,msg,onOk,onNo,danger})=>{
    if(!show)return null;
    return(<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-md anim-zoom">
      <div className="p-6"><div className="flex items-center gap-3 mb-3"><div className={`p-2.5 rounded-xl ${danger?'bg-rose-50':'bg-amber-50'}`}><I d={Ic.alert} size={24} cls={danger?'text-rose-500':'text-amber-500'}/></div><h3 className="font-bold text-lg text-slate-800">{title}</h3></div><p className="text-slate-600 text-sm">{msg}</p></div>
      <div className="flex justify-end gap-3 p-4 border-t bg-slate-50/50 rounded-b-2xl"><button onClick={onNo} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl hover:bg-slate-50">ยกเลิก</button><button onClick={onOk} className={`px-5 py-2 text-sm font-bold text-white rounded-xl ${danger?'bg-rose-500 hover:bg-rose-600':'bg-emerald-600 hover:bg-emerald-700'}`}>{danger?'ยืนยันการลบ':'ยืนยัน'}</button></div>
    </div></div>);
  };

  // ===== Status Badge =====
  const Badge=({s})=>{
    const st={'เบิกได้':'bg-emerald-50 text-emerald-600','งดการเบิก':'bg-amber-50 text-amber-600','เลิกใช้งาน':'bg-slate-100 text-slate-500','รอดำเนินการ':'bg-indigo-50 text-indigo-600','อนุมัติ':'bg-emerald-50 text-emerald-600','อนุมัติ — รอรับของ':'bg-amber-50 text-amber-700','จ่ายของแล้ว':'bg-emerald-100 text-emerald-700','ไม่อนุมัติ':'bg-rose-50 text-rose-600','ยกเลิกโดยผู้ขอ':'bg-slate-100 text-slate-500'};
    return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ${st[s]||'bg-slate-100 text-slate-500'}`}>{s}</span>;
  };

  // ===== Searchable Select Component =====
  const SearchSelect=({label,value,onChange,options,placeholder='-- เลือก --',required,cls=''})=>{
    const [open,setOpen]=useState(false);const [q,setQ]=useState('');const ref=React.useRef(null);
    const filtered=options.filter(o=>!q||o.label.toLowerCase().includes(q.toLowerCase()));
    const selected=options.find(o=>o.value===value);
    React.useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
    return(<div ref={ref} className={`relative ${cls}`}>
      {label&&<label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">{label}</label>}
      <button type="button" onClick={()=>{setOpen(!open);setQ('')}} className={`w-full border rounded-lg p-2.5 text-sm bg-white outline-none text-left flex items-center justify-between ${open?'ring-1 ring-emerald-500 border-emerald-500':''}`}>
        <span className={selected?'text-slate-800':'text-slate-400'}>{selected?selected.label:placeholder}</span>
        <I d={Ic.chevDown} size={16} cls={`text-slate-400 transition-transform ${open?'rotate-180':''}`}/>
      </button>
      {required&&!value&&<input tabIndex={-1} autoComplete="off" style={{position:'absolute',opacity:0,width:0,height:0}} required value="" onChange={()=>{}}/>}
      {open&&<div className="absolute z-50 mt-1 w-full bg-white border rounded-xl shadow-xl max-h-64 overflow-hidden anim-slide" style={{minWidth:'100%'}}>
        <div className="sticky top-0 bg-white p-2 border-b"><div className="relative"><I d={Ic.search} size={16} cls="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"/><input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="พิมพ์ค้นหา..." className="w-full pl-8 pr-3 py-2 border rounded-lg text-sm outline-none focus:ring-1 focus:ring-emerald-500" onClick={e=>e.stopPropagation()}/></div></div>
        <div className="overflow-y-auto max-h-48 sb">
          {value&&<button type="button" onClick={()=>{onChange('');setOpen(false)}} className="w-full text-left px-3 py-2 text-xs text-rose-500 hover:bg-rose-50 font-bold border-b">✕ ล้างการเลือก</button>}
          {filtered.length?filtered.map(o=><button type="button" key={o.value} onClick={()=>{onChange(o.value);setOpen(false)}} className={`w-full text-left px-3 py-2.5 text-sm hover:bg-emerald-50 transition-colors border-b border-slate-50 ${value===o.value?'bg-emerald-50 text-emerald-700 font-bold':'text-slate-700'}`}>{o.label}</button>):<div className="p-4 text-center text-slate-400 text-sm">ไม่พบรายการที่ค้นหา</div>}
        </div>
      </div>}
    </div>);
  };

  // ===== Excel Export Utility =====
  const toExcel=(headers,rows,filename)=>{
    const esc=(v)=>{let s=String(v==null?'':v);if(s.length>0&&(s[0]==='='||s[0]==='+'||s[0]==='-'||s[0]==='@'))s="'"+s;return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
    const bom='\uFEFF';
    const csv=bom+[headers.map(esc).join(','),...rows.map(r=>r.map(esc).join(','))].join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=(filename||'report')+'.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    notify('ส่งออก Excel สำเร็จ — '+filename+'.csv');
  };

  // ===== Simple Layout Wrapper =====
  const Wrap=({title,icon,children,onExport})=>(<div className="p-4 md:p-8 anim-fade"><div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 min-h-[400px]"><div className="flex items-center justify-between text-xl md:text-2xl font-bold text-slate-800 border-b pb-5 mb-6"><div className="flex items-center"><div className="bg-emerald-50 p-2.5 rounded-xl mr-4"><I d={icon} size={26} cls="text-emerald-600"/></div>{title}</div>{onExport&&<button onClick={onExport} className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-emerald-700 shadow-sm transition-all"><I d={Ic.download} size={16}/>Export Excel</button>}</div>{children}</div></div>);

  // ===== Filter Bar =====
  const Fil=({dept,cat,month,date,onFilter})=>{
    const [fCat,setFCat]=useState('');const [fDept,setFDept]=useState('');const [fMonth,setFMonth]=useState('2026-03');const [fStart,setFStart]=useState('');const [fEnd,setFEnd]=useState('');
    const doFilter=()=>{if(onFilter)onFilter({cat:fCat,dept:fDept,month:fMonth,start:fStart,end:fEnd})};
    return(<div className="flex flex-wrap gap-3 mb-6 bg-slate-50 p-4 rounded-xl border items-end">
    {cat&&<div className="flex-1 min-w-[140px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมวดหมู่</label><select value={fCat} onChange={e=>setFCat(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white focus:ring-1 focus:ring-emerald-500 outline-none"><option value="">-- ทั้งหมด --</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>}
    {dept&&<div className="flex-1 min-w-[140px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก</label><select value={fDept} onChange={e=>setFDept(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white focus:ring-1 focus:ring-emerald-500 outline-none"><option value="">-- ทุกแผนก --</option>{depts.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>}
    {month&&<div className="flex-1 min-w-[130px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เดือน</label><input type="month" value={fMonth} onChange={e=>setFMonth(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white focus:ring-1 focus:ring-emerald-500 outline-none"/></div>}
    {date&&<><div className="flex-1 min-w-[120px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เริ่ม</label><input type="date" value={fStart} onChange={e=>setFStart(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white"/></div><div className="flex-1 min-w-[120px]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">สิ้นสุด</label><input type="date" value={fEnd} onChange={e=>setFEnd(e.target.value)} className="w-full border rounded-lg p-2 text-sm bg-white"/></div></>}
    <button onClick={doFilter} className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 h-[38px]"><I d={Ic.search} size={15}/>ค้นหา</button>
    <button onClick={()=>window.print()} className="bg-white border text-slate-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1 h-[38px]"><I d={Ic.print} size={15}/>พิมพ์</button>
  </div>)};

  // ==================== DASHBOARD ====================
  const Dashboard=()=>{
    // ===== SUMMARY CALCULATIONS =====
    const avail=items.filter(i=>i.status==='เบิกได้'&&i.balance>0).length;
    const unav=items.filter(i=>i.status!=='เบิกได้').length;
    const low=items.filter(i=>i.balance<=i.min&&i.balance>0);
    const oos=items.filter(i=>i.balance===0);
    const totalStockVal=items.reduce((s,i)=>s+(i.balance||0)*(i.price||0),0);
    const thisMonthTxnsOut=txns.filter(t=>t.type==='OUT');
    const thisMonthTxnsIn=txns.filter(t=>t.type==='IN');
    const payoutVal=thisMonthTxnsOut.reduce((s,t)=>{const it=items.find(i=>i.id===t.itemCode);return s+(t.qty||0)*(it?.price||0)},0);
    const receiveVal=thisMonthTxnsIn.reduce((s,t)=>{const it=items.find(i=>i.id===t.itemCode);return s+(t.qty||0)*(it?.price||0)},0);
    const totalSteels=steels.filter(s=>s.status!=='Scrap').reduce((s,x)=>s+x.qty,0);
    const steelTypes=steels.filter(s=>s.status!=='Scrap').length;

    // ===== CHART DATA: Top 5 Most Withdrawn =====
    const itemPayMap={};txns.filter(t=>t.type==='OUT').forEach(t=>{itemPayMap[t.itemCode]=(itemPayMap[t.itemCode]||0)+t.qty});
    const top5=Object.entries(itemPayMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,qty])=>({name:items.find(i=>i.id===id)?.name||id,qty}));

    // ===== CHART DATA: Stock Value by Category =====
    const catValMap={};items.forEach(i=>{const cn=catName(i.category);catValMap[cn]=(catValMap[cn]||0)+(i.balance||0)*(i.price||0)});
    const catValArr=Object.entries(catValMap).map(([name,val])=>({name:name.split('(')[0].trim(),val})).sort((a,b)=>b.val-a.val);
    const pieColors=['#059669','#2563eb','#7c3aed','#f59e0b','#ef4444','#0891b2'];

    // ===== CHART DATA: Payout by Department =====
    const deptPayMap={};txns.filter(t=>t.type==='OUT'&&t.department).forEach(t=>{deptPayMap[t.department]=(deptPayMap[t.department]||0)+t.qty});
    const deptPayArr=Object.entries(deptPayMap).map(([d,q])=>({dept:d.length>12?d.substring(0,12)+'…':d,qty:q})).sort((a,b)=>b.qty-a.qty);

    // ===== RECENT REQS & TXN =====
    const recentReqs=reqs.slice(0,5);
    const recentTxns=[...txns.map(t=>({...t,src:'mat'})),...steelTxns.map(t=>({...t,src:'stl'}))].slice(0,5);
    const steelLow=steels.filter(s=>s.qty<=2&&s.qty>0&&s.status!=='Scrap');

    // ===== PIE CHART via SVG =====
    const PieChart=({data,colors})=>{
      const total=data.reduce((s,d)=>s+d.val,0);if(total===0)return<div className="text-center text-slate-400 text-sm py-8">ไม่มีข้อมูล</div>;
      let cum=0;const slices=data.map((d,i)=>{const pct=d.val/total;const startAngle=cum*2*Math.PI;cum+=pct;const endAngle=cum*2*Math.PI;
        const x1=Math.cos(startAngle-Math.PI/2)*80;const y1=Math.sin(startAngle-Math.PI/2)*80;
        const x2=Math.cos(endAngle-Math.PI/2)*80;const y2=Math.sin(endAngle-Math.PI/2)*80;
        const large=pct>0.5?1:0;
        const path=pct>=0.999?`M0,-80A80,80,0,1,1,-0.01,-80A80,80,0,1,1,0,-80`:`M0,0L${x1},${y1}A80,80,0,${large},1,${x2},${y2}Z`;
        return<path key={i} d={path} fill={colors[i%colors.length]} opacity="0.85"/>;
      });
      return<svg viewBox="-100 -100 200 200" style={{width:'100%',maxWidth:180,margin:'0 auto',display:'block'}}>{slices}<circle cx="0" cy="0" r="45" fill="white"/><text x="0" y="-4" textAnchor="middle" style={{fontSize:10,fontWeight:700,fill:'#1e293b'}}>{(total/1000).toFixed(0)}K</text><text x="0" y="10" textAnchor="middle" style={{fontSize:7,fill:'#94a3b8'}}>บาท</text></svg>;
    };

    // ===== BAR CHART via SVG =====
    const BarChart=({data,labelKey,valueKey,color='#059669'})=>{
      if(!data.length)return<div className="text-center text-slate-400 text-sm py-8">ไม่มีข้อมูล</div>;
      const maxVal=Math.max(...data.map(d=>d[valueKey]),1);
      return<div>{data.map((d,i)=><div key={i} className="flex items-center gap-2 mb-2"><div className="text-[10px] text-slate-500 font-bold w-24 text-right truncate" title={d[labelKey]}>{d[labelKey]}</div><div className="flex-1 bg-slate-100 rounded-full h-5 overflow-hidden"><div className="h-full rounded-full flex items-center pl-2" style={{width:Math.max(d[valueKey]/maxVal*100,8)+'%',background:color}}><span className="text-[10px] font-bold text-white">{d[valueKey]}</span></div></div></div>)}</div>;
    };

    // ===== STATUS BADGE =====
    const Stb=({s})=>{const m={'รอดำเนินการ':'bg-amber-100 text-amber-700','อนุมัติ':'bg-emerald-100 text-emerald-700','ไม่อนุมัติ':'bg-rose-100 text-rose-700'};return<span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${m[s]||'bg-slate-100 text-slate-500'}`}>{s}</span>};

    // ===== SECTION CARD WRAPPER =====
    const Sec=({title,icon,badge,children,action})=><div className="bg-white rounded-2xl shadow-sm border overflow-hidden"><div className="p-4 border-b bg-slate-50 flex items-center justify-between"><div className="font-bold text-slate-800 flex items-center gap-2"><I d={icon} size={18} cls="text-emerald-600"/>{title}{badge!=null&&<span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full">{badge}</span>}</div>{action}</div><div className="p-4">{children}</div></div>;

    return(<div className="p-4 md:p-8 anim-fade">
      {/* ===== HEADER ===== */}
      <div className="mb-6 flex flex-col md:flex-row md:items-end md:justify-between gap-2">
        <div><h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><I d={Ic.bar} size={24} cls="text-emerald-600"/>ภาพรวมระบบ (Dashboard)</h1><p className="text-slate-500 text-sm">TGT Metalworks Co., Ltd. — ข้อมูล ณ ปัจจุบัน</p></div>
        <div className="text-xs text-slate-400">{new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      </div>

      {/* ===== ROW 1: 8 SUMMARY CARDS ===== */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        {[
          {t:'มูลค่าสต๊อกรวม',n:'฿'+totalStockVal.toLocaleString(),c:'text-emerald-600 bg-emerald-50',ic:Ic.bar,sub:'ทุกหมวดหมู่'},
          {t:'เบิกจ่ายเดือนนี้',n:thisMonthTxnsOut.length+' ครั้ง',c:'text-sky-600 bg-sky-50',ic:Ic.cart,sub:'฿'+payoutVal.toLocaleString()},
          {t:'รับเข้าเดือนนี้',n:thisMonthTxnsIn.length+' ครั้ง',c:'text-violet-600 bg-violet-50',ic:Ic.download,sub:'฿'+receiveVal.toLocaleString()},
          {t:'เหล็กในคลัง',n:totalSteels+' ชิ้น',c:'text-amber-600 bg-amber-50',ic:Ic.layers,sub:'฿'+totalSteelStockValue.toLocaleString()},
          {t:'เบิกได้',n:avail,c:'text-emerald-600 bg-emerald-50',ic:Ic.check2,sub:'พร้อมเบิก'},
          {t:'งดการเบิก',n:unav,c:'text-orange-600 bg-orange-50',ic:Ic.eyeOff,sub:'ระงับชั่วคราว'},
          {t:'ใกล้หมด (< Min)',n:low.length,c:'text-indigo-600 bg-indigo-50',ic:Ic.arrowDn,sub:'ควรสั่งซื้อ'},
          {t:'หมดสต๊อก',n:oos.length,c:'text-rose-600 bg-rose-50',ic:Ic.xCircle,sub:'ต้องดำเนินการ'},
        ].map((c,i)=><div key={i} className="bg-white p-4 rounded-2xl shadow-sm border hover:shadow-md transition-shadow cursor-pointer" onClick={()=>{if(c.t==='หมดสต๊อก')nav('rpt_oos');if(c.t.includes('ใกล้หมด'))nav('rpt_low')}}>
          <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-2 ${c.c}`}><I d={c.ic} size={20}/></div>
          <div className="text-xl font-black text-slate-800">{c.n}</div>
          <div className="text-xs font-bold text-slate-500">{c.t}</div>
          <div className="text-[10px] text-slate-400 mt-0.5">{c.sub}</div>
        </div>)}
      </div>

      {/* ===== PENDING APPROVAL BANNER ===== */}
      {pending>0&&<div className="mb-6 bg-indigo-50 border border-indigo-200 rounded-2xl p-4 flex items-center justify-between"><div className="flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-xl"><I d={Ic.clock} size={22} cls="text-indigo-600"/></div><div><p className="font-bold text-indigo-800">มีใบเบิกรออนุมัติ {pending} รายการ</p><p className="text-xs text-indigo-500">คลิกเพื่อตรวจสอบและดำเนินการ</p></div></div><button onClick={()=>nav('approvals')} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-700 flex items-center gap-1"><I d={Ic.thumbUp} size={16}/>ดูรายการ</button></div>}

          </div>
        </Sec>

        {/* Chart 3: เบิกจ่ายรายแผนก */}
        <Sec title="เบิกจ่ายรายแผนก" icon={Ic.brief} badge={deptPayArr.length}>
          <BarChart data={deptPayArr} labelKey="dept" valueKey="qty" color="#2563eb"/>
          {!deptPayArr.length&&<div className="text-center text-slate-400 text-sm py-4">ยังไม่มีข้อมูล</div>}
        </Sec>

        {/* Chart 4: รับเข้า vs เบิกจ่าย Summary */}

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-emerald-50 rounded-xl p-4 text-center"><div className="text-2xl font-black text-emerald-700">{thisMonthTxnsIn.length}</div><div className="text-xs text-emerald-600 font-bold">รับเข้า (ครั้ง)</div><div className="text-lg font-bold text-emerald-800 mt-1">฿{receiveVal.toLocaleString()}</div></div>
            <div className="bg-sky-50 rounded-xl p-4 text-center"><div className="text-2xl font-black text-sky-700">{thisMonthTxnsOut.length}</div><div className="text-xs text-sky-600 font-bold">เบิกจ่าย (ครั้ง)</div><div className="text-lg font-bold text-sky-800 mt-1">฿{payoutVal.toLocaleString()}</div></div>
          </div>
          <div className="mt-3 bg-slate-50 rounded-xl p-3 text-center">
            <div className="text-xs text-slate-500">ผลต่าง (รับเข้า - เบิกจ่าย)</div>
            <div className={`text-xl font-black ${receiveVal-payoutVal>=0?'text-emerald-600':'text-rose-600'}`}>{receiveVal-payoutVal>=0?'+':''}฿{(receiveVal-payoutVal).toLocaleString()}</div>
          </div>

      </div>

      {/* ===== ROW 3: TABLES ===== */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        {/* Table 1: ใบเบิกล่าสุด + Quick Actions */}
        <Sec title="ใบเบิกล่าสุด" icon={Ic.file} badge={recentReqs.length} action={canApprove&&pending>0&&<button onClick={()=>nav('approvals')} className="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-bold">อนุมัติ ({pending})</button>}>
          {recentReqs.length?<div className="space-y-2">{recentReqs.map(r=><div key={r.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors">
            <div className="flex-1 min-w-0"><div className="text-sm font-bold text-slate-800 truncate">{r.itemName}</div><div className="text-[10px] text-slate-400">{r.id} • {r.date} • {r.department}</div></div>
            <div className="flex items-center gap-2 ml-2"><span className="text-sm font-black text-slate-700">{r.qty}</span><Stb s={r.status}/></div>
          </div>)}</div>:<div className="text-center text-slate-400 text-sm py-6">ยังไม่มีใบเบิก</div>}
        </Sec>

        {/* Table 2: Transaction ล่าสุด */}
        <Sec title="Transaction ล่าสุด" icon={Ic.clock} badge={recentTxns.length}>
          {recentTxns.length?<div className="space-y-2">{recentTxns.map((t,i)=><div key={i} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
            <div className="flex items-center gap-2"><div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white text-[10px] font-bold ${t.type==='IN'||t.type==='คืนเศษ'?'bg-emerald-500':t.type==='เบิก'||t.type==='OUT'?'bg-sky-500':'bg-amber-500'}`}>{t.type==='IN'?'IN':t.type==='OUT'?'OUT':t.type?.substring(0,2)}</div>

            <span className={`text-sm font-black ${t.type==='IN'||t.type==='คืนเศษ'?'text-emerald-600':'text-sky-600'}`}>{t.type==='IN'?'+':t.type==='OUT'?'-':''}{t.qty}</span>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Table 3: รายการใกล้หมด + หมดสต๊อก */}

            {oos.map(it=><div key={it.id} className="flex items-center justify-between p-2.5 bg-rose-50 rounded-xl"><div className="flex items-center gap-2"><img src={it.image} className="w-8 h-8 rounded-lg border"/><div><span className="text-sm font-bold text-slate-800">{it.name}</span><div className="text-[10px] text-slate-400">{catName(it.category)}</div></div></div><span className="text-rose-600 font-black bg-rose-100 px-2 py-0.5 rounded-lg text-xs">หมด!</span></div>)}

          {steelLow.length?<div className="space-y-1.5">{steelLow.map(s=><div key={s.id} className="flex items-center justify-between p-2.5 bg-amber-50 rounded-xl"><div><span className="text-sm font-bold text-slate-800">{s.grade} {s.thickness}mm</span><div className="text-[10px] text-slate-400">{s.type==='SHEET'?'แผ่น':'ท่อ'} {s.width}×{s.length}mm • {s.status}</div></div><span className="text-amber-700 font-black bg-amber-100 px-2 py-0.5 rounded-lg text-xs">{s.qty}</span></div>)}</div>:<div className="text-center text-emerald-500 py-6 text-sm font-bold">เหล็กในคลังเพียงพอ</div>}
        </Sec>
      </div>
    </div>);
  };

  // ==================== ITEMS LIST (FULL CRUD) ====================
  const ItemsView=()=>{
    const [modal,setModal]=useState(false);
    const [editing,setEditing]=useState(null);
    const [form,setForm]=useState({});
    const [q,setQ]=useState('');
    const [del,setDel]=useState(null);
    const nextId=()=>{const nums=items.map(i=>parseInt(i.id)||0);return String(Math.max(...nums,10000)+1)};
    const blank={id:'',name:'',category:cats[0]?.id||'',min:10,max:100,price:0,unit:'ชิ้น',status:'เบิกได้',location:locs[0]?.id||'',supplier:'',image:''};
    const openAdd=()=>{setEditing(null);setForm({...blank,id:nextId()});setModal(true);};
    const openEdit=it=>{setEditing(it);setForm({...it});setModal(true);};
    const save=e=>{e.preventDefault();if(editing){setItems(items.map(i=>i.id===editing.id?{...i,...form}:i));notify('แก้ไขรายการสำเร็จ');}else{setItems([{...form,prevBalance:0,receive:0,pay:0,balance:0,image:form.image||`https://placehold.co/80x80/10b981/fff?text=${encodeURIComponent(form.name.charAt(0))}`},...items]);notify('เพิ่มรายการสำเร็จ');}setModal(false);};
    const doDelete=()=>{if(!del)return;setItems(items.filter(i=>i.id!==del.id));notify('ลบรายการสำเร็จ');setDel(null);};
    const toggle=it=>{let nx;if(it.status==='เบิกได้')nx='งดการเบิก';else if(it.status==='งดการเบิก')nx='เบิกได้';else{notify('รายการที่ "เลิกใช้งาน" ไม่สามารถเปลี่ยนสถานะได้','err');return;}setItems(items.map(i=>i.id===it.id?{...i,status:nx}:i));notify(`เปลี่ยนสถานะเป็น "${nx}"`);};
    const deactivate=it=>{if(it.status==='เลิกใช้งาน'){notify('รายการนี้เลิกใช้งานอยู่แล้ว','err');return;}if(!window.confirm(`ยืนยันเลิกใช้งาน "${it.name}"?\nการดำเนินการนี้ไม่สามารถย้อนกลับได้`))return;setItems(items.map(i=>i.id===it.id?{...i,status:'เลิกใช้งาน'}:i));notify(`"${it.name}" เลิกใช้งานแล้ว`);};
    const fil=items.filter(i=>i.name.includes(q)||i.id.includes(q));
    const f=(k,v)=>setForm({...form,[k]:v});
    return(<div className="p-4 md:p-8 anim-fade relative">
      <div className="bg-white rounded-2xl shadow-sm border p-6">
        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b pb-5">
          <div className="flex items-center text-xl font-bold text-slate-800"><div className="bg-emerald-50 p-2.5 rounded-xl mr-3"><I d={Ic.folder} size={24} cls="text-emerald-600"/></div>รายการวัสดุ - อุปกรณ์</div>
          <button onClick={openAdd} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-emerald-700 shadow-sm"><I d={Ic.plus} size={18}/>เพิ่มรายการใหม่</button>
        </div>
        <div className="mb-5 relative w-full md:w-80"><input placeholder="ค้นหาด้วยรหัส หรือ ชื่อ..." className="w-full bg-slate-50 border rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-1 focus:ring-emerald-500 outline-none" value={q} onChange={e=>setQ(e.target.value)}/><I d={Ic.search} size={16} cls="absolute left-3.5 top-3 text-slate-400"/></div>
        <div className="overflow-x-auto border rounded-xl"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3.5 font-bold text-center">รหัส</th><th className="p-3.5 font-bold">รายการ</th><th className="p-3.5 font-bold text-center">ยกมา</th><th className="p-3.5 font-bold text-center">รับเข้า</th><th className="p-3.5 font-bold text-center">เบิก</th><th className="p-3.5 font-bold text-center">คงเหลือ</th><th className="p-3.5 font-bold text-center">ราคา</th><th className="p-3.5 font-bold text-center">จัดการ</th></tr></thead>
        <tbody className="divide-y divide-slate-50">{fil.map(it=><tr key={it.id} className="hover:bg-slate-50/50">
          <td className="p-3.5 text-center text-slate-500 font-mono"><img src={it.image} className="w-12 h-12 rounded-lg mx-auto mb-1 border shadow-sm"/>{it.id}</td>
          <td className="p-3.5"><div className="font-bold text-slate-800">{it.name}</div><div className="text-xs text-slate-400">หมวด: {catName(it.category)} • {it.unit} • {locName(it.location)}</div><div className="text-xs text-slate-400 mb-1">Min:{it.min} / Max:{it.max}</div><button onClick={()=>toggle(it)}><Badge s={it.status}/></button></td>
          <td className="p-3.5 text-center text-slate-500">{it.prevBalance}</td>
          <td className="p-3.5 text-center text-emerald-600 font-bold bg-emerald-50/30">+{it.receive}</td>
          <td className="p-3.5 text-center text-rose-500 font-bold bg-rose-50/30">-{it.pay}</td>
          <td className="p-3.5 text-center text-slate-800 font-black text-lg">{it.balance}</td>
          <td className="p-3.5 text-center text-slate-600">{(it.price||0).toLocaleString('th-TH',{minimumFractionDigits:2})}</td>
          <td className="p-3.5 text-center"><div className="flex justify-center gap-1"><button onClick={()=>openEdit(it)} className="p-1.5 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg" title="แก้ไข"><I d={Ic.edit} size={16}/></button><button onClick={()=>setDel(it)} className="p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg" title="ลบ"><I d={Ic.trash} size={16}/></button></div></td>
        </tr>)}</tbody></table></div>
      </div>
      {/* Modal Add/Edit */}
      {modal&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl anim-zoom max-h-[90vh] flex flex-col">
        <div className="border-b p-5 flex justify-between items-center shrink-0"><h3 className="font-bold text-lg flex items-center gap-2"><div className="bg-emerald-100 p-1.5 rounded-lg"><I d={editing?Ic.edit:Ic.plus} size={18} cls="text-emerald-600"/></div>{editing?'แก้ไขรายการวัสดุ':'เพิ่มรายการใหม่'}</h3><button onClick={()=>setModal(false)} className="p-2 hover:bg-slate-100 rounded-lg"><I d={Ic.x} size={18} cls="text-slate-400"/></button></div>
        <form onSubmit={save} className="p-6 space-y-4 bg-slate-50/30 overflow-y-auto"><div className="grid grid-cols-2 gap-4">
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">รหัส *</label><input required disabled={!!editing} value={form.id||''} onChange={e=>f('id',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500 disabled:bg-slate-100"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ชื่อ *</label><input required value={form.name||''} onChange={e=>f('name',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมวดหมู่</label><select value={form.category||''} onChange={e=>f('category',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none">{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หน่วยนับ *</label><input required value={form.unit||''} onChange={e=>f('unit',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none focus:ring-1 focus:ring-emerald-500"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Min</label><input type="number" value={form.min||0} onChange={e=>f('min',+e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Max</label><input type="number" value={form.max||0} onChange={e=>f('max',+e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ราคา/หน่วย</label><input type="number" step="0.01" value={form.price||0} onChange={e=>f('price',+e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">สถานที่</label><select value={form.location||''} onChange={e=>f('location',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none"><option value="">-</option>{locs.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}</select></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ผู้จำหน่าย</label><select value={form.supplier||''} onChange={e=>f('supplier',e.target.value)} className="w-full border rounded-lg p-2.5 text-sm outline-none"><option value="">-</option>{sups.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
          <ImgUpload value={form.image||''} onChange={v=>f('image',v)} label="รูปภาพ"/>
        </div><div className="pt-4 flex justify-end gap-3 border-t"><button type="button" onClick={()=>setModal(false)} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl hover:bg-slate-50">ยกเลิก</button><button type="submit" className="px-5 py-2 text-sm font-bold text-white bg-emerald-600 rounded-xl hover:bg-emerald-700 flex items-center gap-1"><I d={Ic.save} size={16}/>บันทึก</button></div></form>
      </div></div>}
      <Confirm show={!!del} title="ยืนยันการลบ" msg={`ลบ "${del?.name}" (${del?.id}) ออกจากระบบ?`} onOk={doDelete} onNo={()=>setDel(null)} danger/>
    </div>);
  };

  // ==================== RECEIVE ITEMS ====================
  const ReceiveView=()=>{
    const [tab,setTab]=useState('pr');
    const [sel,setSel]=useState('');const [qty,setQty]=useState(1);const [unitPrice,setUnitPrice]=useState(0);const [lastReceive,setLastReceive]=useState(null);
    const [selPR,setSelPR]=useState('');const [prQtys,setPrQtys]=useState({});const [prPrices,setPrPrices]=useState({});const [rcvNote,setRcvNote]=useState('');
    const recentIn=txns.filter(t=>t.type==='IN').slice(0,10);
    const pendingPRs=prs.filter(p=>p.status==='รับของแล้ว');
    // Weighted Average calculator
    const calcAvg=(oldBal,oldAvg,newQty,newPrice)=>{
      if(oldBal+newQty===0)return newPrice;
      return Math.round(((oldBal*(oldAvg||0))+(newQty*newPrice))/(oldBal+newQty)*100)/100;
    };

    // ===== Tab 1: รับจาก PR =====
    const selectedPR=prs.find(p=>p.id===selPR);
    const initPrQtys=(pr)=>{const q={};const p={};pr.items.forEach((it,i)=>{q[i]=it.qty;p[i]=0;});setPrQtys(q);setPrPrices(p);};
    const goPR=()=>{
      if(!selectedPR){notify('กรุณาเลือก PR','err');return;}
      let anyReceived=false;const newItems=[];
      selectedPR.items.forEach((prItem,i)=>{
        const rcvQty=Number(prQtys[i])||0;if(rcvQty<=0)return;
        const rcvPrice=Number(prPrices[i])||0;
        const matchItem=items.find(it=>it.name.trim()===prItem.name.trim());
        if(matchItem){
          const newAvg=rcvPrice>0?calcAvg(matchItem.balance,matchItem.price,rcvQty,rcvPrice):matchItem.price;
          setItems(prev=>prev.map(it=>it.id===matchItem.id?{...it,receive:it.receive+rcvQty,balance:it.balance+rcvQty,price:newAvg,lastPrice:rcvPrice>0?rcvPrice:it.lastPrice||0}:it));
          setTxns(prev=>[{id:`RX-${Date.now()}-${i}`,date:new Date().toLocaleDateString('th-TH'),type:'IN',itemCode:matchItem.id,itemName:matchItem.name,qty:rcvQty,unitPrice:rcvPrice,user:user.fullName,note:`จาก PR: ${selectedPR.id}${rcvPrice>0?' @'+rcvPrice.toLocaleString()+'฿':''}`,prRef:selectedPR.id},...prev]);
          anyReceived=true;
        }else{
          const nums=items.map(x=>parseInt(x.id)||0);
          const newId=String(Math.max(...nums,...newItems.map(x=>parseInt(x.id)||0),10000)+1+i);
          const catMap={'อะไหล่':'CAT-03','สิ้นเปลือง':'CAT-01','PPE':'CAT-02','เครื่องมือ':'CAT-05','สำนักงาน':'CAT-04'};
          const newItem={id:newId,name:prItem.name,category:catMap[prItem.cat]||cats[0]?.id||'CAT-01',min:5,max:50,price:rcvPrice||0,lastPrice:rcvPrice||0,status:'เบิกได้',prevBalance:0,receive:rcvQty,pay:0,balance:rcvQty,unit:prItem.unit||'ชิ้น',location:locs[0]?.id||'LOC-A1',supplier:'',image:`https://placehold.co/80x80/2563eb/fff?text=${encodeURIComponent(prItem.name.charAt(0))}`};
          newItems.push(newItem);
          setItems(prev=>[...prev,newItem]);
          setTxns(prev=>[{id:`RX-${Date.now()}-${i}`,date:new Date().toLocaleDateString('th-TH'),type:'IN',itemCode:newId,itemName:prItem.name,qty:rcvQty,unitPrice:rcvPrice,user:user.fullName,note:`จาก PR: ${selectedPR.id} (ใหม่)${rcvPrice>0?' @'+rcvPrice.toLocaleString()+'฿':''}`,prRef:selectedPR.id},...prev]);
          anyReceived=true;
        }
      });
      if(anyReceived){
        setPrs(prev=>prev.map(p=>p.id===selPR?{...p,status:'เสร็จสิ้น',storeNote:(p.storeNote?p.storeNote+' | ':'')+'รับเข้าสต๊อกแล้ว '+new Date().toLocaleDateString('th-TH')}:p));
        addNotif(selectedPR.requestedBy,[],'รับเข้าสต๊อกจาก PR แล้ว',`วัสดุจาก PR ของคุณ (${selectedPR.items.map(it=>it.name).join(', ')}) ได้รับเข้าสต๊อกเรียบร้อยแล้ว — ติดต่อ Store เพื่อรับของ`,'pr',selPR);
        notify(`รับเข้าสต๊อกจาก ${selPR} สำเร็จ — PR เสร็จสิ้น`);
        setSelPR('');setPrQtys({});setPrPrices({});setRcvNote('');
      }else{notify('ไม่มีรายการที่จำนวน > 0','err');}
    };

    // ===== Tab 2: รับทั่วไป =====
    const go=e=>{e.preventDefault();if(!sel||Number(qty)<=0)return;const it=items.find(i=>i.id===sel);if(!it)return;
      const beforeBal=it.balance;const nQty=Number(qty);const nPrice=Number(unitPrice)||0;const afterBal=beforeBal+nQty;
      const newAvg=nPrice>0?calcAvg(beforeBal,it.price,nQty,nPrice):it.price;
      setItems(items.map(i=>i.id===sel?{...i,receive:i.receive+nQty,balance:afterBal,price:newAvg,lastPrice:nPrice>0?nPrice:i.lastPrice||0}:i));
      setTxns([{id:`RX-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),type:'IN',itemCode:it.id,itemName:it.name,qty:nQty,unitPrice:nPrice,user:user.fullName,note:rcvNote||'',prRef:''},...txns]);
      setLastReceive({name:it.name,id:it.id,qty:nQty,before:beforeBal,after:afterBal,time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),oldAvg:it.price,newAvg,purchasePrice:nPrice});
      notify(`รับเข้า ${it.name} จำนวน ${qty}${nPrice>0?' @'+nPrice.toLocaleString()+'฿':''} สำเร็จ`);setSel('');setQty(1);setUnitPrice(0);setRcvNote('');};

    return(<Wrap title="เพิ่มจำนวน / รับเข้าสต๊อก" icon={Ic.download}>
      {/* Tab switcher */}
      <div className="flex gap-2 mb-6">
        <button onClick={()=>setTab('pr')} className={`flex-1 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 border-2 transition-all ${tab==='pr'?'bg-blue-600 text-white border-blue-600 shadow-sm':'bg-white text-slate-600 border-slate-200 hover:border-blue-300'}`}>
          <I d={Ic.file} size={18}/>รับจาก PR {pendingPRs.length>0&&<span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${tab==='pr'?'bg-white/25 text-white':'bg-amber-100 text-amber-700'}`}>{pendingPRs.length}</span>}
        </button>
        <button onClick={()=>setTab('general')} className={`flex-1 py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 border-2 transition-all ${tab==='general'?'bg-emerald-600 text-white border-emerald-600 shadow-sm':'bg-white text-slate-600 border-slate-200 hover:border-emerald-300'}`}>
          <I d={Ic.download} size={18}/>รับทั่วไป
        </button>
      </div>

      {/* ===== TAB: รับจาก PR ===== */}
      {tab==='pr'&&<div>
        {pendingPRs.length===0?<div className="text-center py-16 border rounded-2xl bg-slate-50"><I d={Ic.check2} size={48} cls="mx-auto mb-4 text-emerald-200"/><p className="text-slate-500 font-bold mb-1">ไม่มี PR ที่รอรับเข้าสต๊อก</p><p className="text-xs text-slate-400">PR ที่สถานะ "รับของแล้ว" จะแสดงที่นี่</p></div>:<>
        {/* Select PR */}
        <div className="mb-5"><SearchSelect label="เลือก PR ที่ต้องการรับเข้าสต๊อก" value={selPR} onChange={v=>{setSelPR(v);const pr=prs.find(p=>p.id===v);if(pr)initPrQtys(pr);}} options={pendingPRs.map(p=>({value:p.id,label:`${p.id.substring(0,20)} — ${p.requestedBy} — ${p.items.map(i=>i.name).join(', ').substring(0,40)}`}))} placeholder="-- เลือก PR --"/></div>

        {/* PR Detail + Qty input */}
        {selectedPR&&<div className="bg-blue-50 border border-blue-200 rounded-2xl p-5 mb-5">
          <div className="flex justify-between items-start mb-4"><div><h3 className="font-bold text-blue-900">{selectedPR.id}</h3><p className="text-xs text-blue-600">ผู้ขอ: {selectedPR.requestedBy} • {selectedPR.department} • ต้องใช้: {selectedPR.needBy}</p></div><span className="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full">{selectedPR.status}</span></div>
          <div className="text-xs font-bold text-blue-700 mb-3 uppercase">รายการวัสดุ — กรอกจำนวนจริงที่ได้รับ</div>
          <div className="space-y-3">{selectedPR.items.map((it,i)=><div key={i} className="bg-white rounded-xl border p-4">
            <div className="flex justify-between items-center mb-2"><div><span className="font-bold text-slate-800">{it.name}</span><span className="text-xs text-slate-400 ml-2">({it.cat})</span></div><span className="text-xs text-slate-500">สั่ง: <b className="text-blue-700">{it.qty} {it.unit}</b></span></div>
            <div className="grid grid-cols-2 gap-3">
              <div className="flex items-center gap-2">
                <label className="text-xs font-bold text-slate-500 whitespace-nowrap">จำนวน:</label>
                <input type="number" min="0" max={it.qty*2} value={prQtys[i]||0} onChange={e=>setPrQtys({...prQtys,[i]:Number(e.target.value)||0})} className="flex-1 border rounded-lg p-2.5 text-sm bg-white outline-none focus:ring-1 focus:ring-blue-500 font-bold text-center"/>
                <span className="text-xs text-slate-400">{it.unit}</span>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs font-bold text-slate-500 whitespace-nowrap">ราคา/หน่วย:</label>
                <input type="number" min="0" step="0.01" value={prPrices[i]||''} onChange={e=>setPrPrices({...prPrices,[i]:Number(e.target.value)||0})} placeholder="0" className="flex-1 border rounded-lg p-2.5 text-sm bg-white outline-none focus:ring-1 focus:ring-blue-500 text-center"/>
                <span className="text-xs text-slate-400">฿</span>
              </div>
            </div>
            {Number(prQtys[i]||0)!==it.qty&&<div className="mt-2"><span className="text-xs font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded">{Number(prQtys[i]||0)<it.qty?`ขาด ${it.qty-Number(prQtys[i]||0)}`:`เกิน +${Number(prQtys[i]||0)-it.qty}`}</span></div>}
          </div>)}</div>
          {/* Summary */}
          <div className="mt-4 bg-white rounded-xl border p-3 flex justify-between items-center">
            <span className="text-xs text-slate-500">รวมจำนวนที่จะรับ: <b className="text-lg text-blue-800">{Object.values(prQtys).reduce((s,v)=>s+Number(v||0),0)}</b> ชิ้น (สั่ง {selectedPR.totalQty})</span>
          </div>
          <div className="mt-4"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมายเหตุ (ถ้ามี)</label><input value={rcvNote} onChange={e=>setRcvNote(e.target.value)} placeholder="เช่น: ได้รับครบตาม PO / ขาด 2 ชิ้น รอรอบถัดไป" className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none focus:ring-1 focus:ring-blue-500"/></div>
          <button onClick={goPR} className="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-blue-700 flex items-center justify-center gap-2"><I d={Ic.save} size={16}/>ยืนยันรับเข้าสต๊อกจาก PR</button>
        </div>}
        </>}
      </div>}

      {/* ===== TAB: รับทั่วไป ===== */}
      {tab==='general'&&<div>
        <form onSubmit={go} className="bg-slate-50 p-6 rounded-xl border max-w-3xl"><div className="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
          <SearchSelect label="เลือกรายการ" value={sel} onChange={v=>{setSel(v);const found=items.find(i=>i.id===v);if(found)setUnitPrice(found.lastPrice||found.price||0);}} required options={items.map(i=>({value:i.id,label:`[${i.id}] ${i.name} (คงเหลือ:${i.balance})`}))} placeholder="-- พิมพ์ค้นหาหรือเลือกรายการ --" cls="md:col-span-2"/>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">จำนวน</label><input required type="number" min="1" value={qty} onChange={e=>setQty(Number(e.target.value)||0)} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
          <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">ราคาซื้อ/หน่วย (฿)</label><input type="number" min="0" step="0.01" value={unitPrice} onChange={e=>setUnitPrice(Number(e.target.value)||0)} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none" placeholder="0"/></div>
        </div>
        {sel&&unitPrice>0&&(()=>{const it=items.find(i=>i.id===sel);if(!it)return null;const preview=calcAvg(it.balance,it.price,Number(qty)||1,unitPrice);return<div className="mt-3 bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-800 flex items-center gap-4"><span>ราคาเฉลี่ยปัจจุบัน: <b>{(it.price||0).toLocaleString()} ฿</b></span><span>→</span><span>ราคาเฉลี่ยใหม่: <b className="text-blue-600 text-sm">{preview.toLocaleString()} ฿</b></span><span className="text-blue-400">({it.balance} ชิ้น × {(it.price||0).toLocaleString()} + {qty} ชิ้น × {unitPrice.toLocaleString()}) ÷ {it.balance+Number(qty)}</span></div>})()}
        <div className="mt-4"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">หมายเหตุ (ถ้ามี)</label><input value={rcvNote} onChange={e=>setRcvNote(e.target.value)} placeholder="เช่น: รับจากผู้จำหน่าย / โอนย้ายจากสาขา" className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div className="mt-6 flex justify-end"><button type="submit" disabled={!sel} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-emerald-700"><I d={Ic.save} size={16}/>ยืนยันรับเข้า</button></div></form>

        {lastReceive&&<div className="mt-5 bg-emerald-50 border border-emerald-200 rounded-2xl p-5 max-w-3xl">
          <div className="flex items-center gap-3 mb-3"><div className="bg-emerald-100 p-2 rounded-xl"><I d={Ic.check2} size={22} cls="text-emerald-600"/></div><div><p className="font-bold text-emerald-800">รับเข้าสำเร็จ!</p><p className="text-xs text-emerald-600">{lastReceive.time} วันนี้</p></div></div>
          <div className="bg-white rounded-xl p-4 border border-emerald-100">
            <div className="text-sm font-bold text-slate-800 mb-3">[{lastReceive.id}] {lastReceive.name}</div>
            <div className="grid grid-cols-3 gap-3 text-center">
              <div className="bg-slate-50 rounded-lg p-3"><div className="text-[10px] font-bold text-slate-400 uppercase mb-1">ก่อนรับ</div><div className="text-lg font-black text-slate-500">{lastReceive.before}</div></div>
              <div className="bg-emerald-50 rounded-lg p-3"><div className="text-[10px] font-bold text-emerald-600 uppercase mb-1">รับเข้า</div><div className="text-lg font-black text-emerald-600">+{lastReceive.qty}</div></div>
              <div className="bg-emerald-100 rounded-lg p-3"><div className="text-[10px] font-bold text-emerald-700 uppercase mb-1">คงเหลือ</div><div className="text-lg font-black text-emerald-800">{lastReceive.after}</div></div>
            </div>
          </div>
          <div className="flex gap-2 mt-3"><button onClick={()=>setLastReceive(null)} className="flex-1 bg-white border text-slate-600 px-4 py-2 rounded-xl text-xs font-bold">ปิด</button><button onClick={()=>nav('items')} className="flex-1 bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-emerald-700">ดูในรายการวัสดุ</button></div>
        </div>}
      </div>}

      {/* Recent receive log (ทั้ง 2 tab) */}
      <div className="mt-6 max-w-4xl"><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.clock} size={18} cls="text-emerald-500"/>รายการรับเข้าล่าสุด <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full">{recentIn.length}</span></h3>
      {recentIn.length?<div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 font-bold">เลขที่</th><th className="p-3 font-bold">วันที่</th><th className="p-3 font-bold">รหัส</th><th className="p-3 font-bold">รายการ</th><th className="p-3 font-bold text-center">จำนวน</th><th className="p-3 font-bold">อ้างอิง PR</th><th className="p-3 font-bold">ผู้รับเข้า</th></tr></thead>
      <tbody className="divide-y">{recentIn.map((t,i)=><tr key={i} className="hover:bg-emerald-50/30"><td className="p-3 font-mono text-xs text-emerald-600">{t.id?.substring(0,16)}</td><td className="p-3 text-slate-600 text-xs">{t.date}</td><td className="p-3 font-mono text-xs">{t.itemCode}</td><td className="p-3 font-bold text-slate-800">{t.itemName}</td><td className="p-3 text-center"><span className="bg-emerald-100 text-emerald-700 px-2.5 py-0.5 rounded-lg font-black text-sm">+{t.qty}</span></td><td className="p-3 text-xs">{t.prRef?<span className="text-blue-600 font-bold cursor-pointer hover:underline" onClick={()=>nav('pr_list')}>{t.prRef.substring(0,16)}</span>:<span className="text-slate-400">-</span>}</td><td className="p-3 text-xs text-slate-500">{t.user}</td></tr>)}</tbody></table></div>
      :<div className="text-center py-8 text-slate-400 border rounded-xl bg-slate-50 text-sm">ยังไม่มีรายการรับเข้า</div>}
      </div>
    </Wrap>);
  };

  // ==================== CREATE REQUISITION ====================
  const ReqView=()=>{
    const [sel,setSel]=useState('');const [qty,setQty]=useState(1);const [dp,setDp]=useState(depts[0]?.id||'');const [jobRef,setJobRef]=useState('');const [needBy,setNeedBy]=useState('');
    const [shortageModal,setShortageModal]=useState(null);
    const selItem=items.find(i=>i.id===sel);
    const go=e=>{e.preventDefault();const it=selItem;if(!it)return;
      const nQty=Number(qty);
      if(!Number.isInteger(nQty)||nQty<=0){notify('จำนวนต้องเป็นจำนวนเต็มมากกว่า 0','err');return;}
      if(it.balance<=0){
        setShortageModal({item:it,requested:nQty,available:0,shortage:nQty});return;
      }
      if(it.balance<nQty){
        setShortageModal({item:it,requested:nQty,available:it.balance,shortage:nQty-it.balance});return;
      }
      setReqs([{id:`REQ-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),itemId:it.id,itemName:it.name,qty:nQty,department:deptName(dp),departmentId:dp,requestedBy:user.fullName,job:jobRef||'-',status:'รอดำเนินการ',approvedBy:null,approvedDate:null,rejectReason:null},...reqs]);
      notify(`สร้างรายการเบิก "${it.name}" × ${nQty} — รอดำเนินการ`);setSel('');setQty(1);setJobRef('');
    };
    const doPartial=()=>{
      if(!shortageModal)return;const{item,available,shortage}=shortageModal;
      if(available>0){
        setReqs(prev=>[{id:`REQ-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),itemId:item.id,itemName:item.name,qty:available,department:deptName(dp),departmentId:dp,requestedBy:user.fullName,job:jobRef||'-',status:'รอดำเนินการ',approvedBy:null,approvedDate:null,rejectReason:null},...prev]);
      }
      setPrs(prev=>[{id:`PR-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),items:[{name:item.name,qty:shortage,unit:item.unit||'ชิ้น',cat:'อะไหล่',note:`ขาด — เบิก ${available} จากสต๊อก`}],totalQty:shortage,department:deptName(dp),departmentId:dp,requestedBy:user.fullName,needBy:needBy||'โดยเร็ว',reason:`สต๊อกไม่พอ ขาด ${shortage} ${item.unit||'ชิ้น'}`,status:'รอ Store ตรวจสอบ',storeNote:'',receivedDate:''},...prev]);
      addNotif('',['Admin','Store'],`PR อัตโนมัติ: ${item.name}`,`สต๊อกไม่พอ — ${user.fullName} ขอเบิก ${available+shortage} แต่มี ${available} → สร้าง PR ขอซื้อเพิ่ม ${shortage} ${item.unit||'ชิ้น'} อัตโนมัติ`,'pr_list','');
      notify(available>0?`เบิก ${item.name} × ${available} + สร้าง PR ขอซื้อเพิ่ม ${shortage}`:`สร้าง PR ขอซื้อ "${item.name}" × ${shortage} สำเร็จ`);
      setShortageModal(null);setSel('');setQty(1);
    };
    // สร้าง PR อย่างเดียว (ไม่เบิก)
    const doPROnly=()=>{
      if(!shortageModal)return;const{item,requested}=shortageModal;
      setPrs(prev=>[{id:`PR-${Date.now()}`,date:new Date().toLocaleDateString('th-TH'),items:[{name:item.name,qty:requested,unit:item.unit||'ชิ้น',cat:'อะไหล่',note:''}],totalQty:requested,department:deptName(dp),departmentId:dp,requestedBy:user.fullName,needBy:needBy||'โดยเร็ว',reason:'ขอซื้อทั้งจำนวน',status:'รอ Store ตรวจสอบ',storeNote:'',receivedDate:''},...prev]);
      addNotif('',['Admin','Store'],`PR ใหม่: ${item.name}`,`${user.fullName} ขอซื้อ ${item.name} × ${requested} ${item.unit||'ชิ้น'}`,'pr_list','');
      notify(`สร้าง PR ขอซื้อ "${item.name}" × ${requested} สำเร็จ`);
      setShortageModal(null);setSel('');setQty(1);
    };
    return(<Wrap title="สร้างรายการขอเบิกวัสดุ" icon={Ic.cart}>
      <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 mb-5 flex items-center gap-2 text-sm text-indigo-700"><I d={Ic.info} size={16}/>รายการจะเข้าสถานะ "รอดำเนินการ" รอผู้อนุมัติตรวจสอบก่อนตัดสต๊อก • ถ้าสต๊อกไม่พอระบบจะแนะนำสร้าง PR ให้อัตโนมัติ</div>
      <form onSubmit={go} className="bg-slate-50 p-6 rounded-xl border max-w-4xl"><div className="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
        <SearchSelect label="เลือกรายการ" value={sel} onChange={v=>setSel(v)} required options={items.filter(i=>i.status==='เบิกได้').map(i=>({value:i.id,label:`[${i.id}] ${i.name} (คงเหลือ:${i.balance})`}))} placeholder="-- พิมพ์ค้นหาหรือเลือกรายการ --" cls="md:col-span-2"/>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">จำนวน</label><input required type="number" min="1" value={qty} onChange={e=>setQty(Number(e.target.value)||0)} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
        <div><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">แผนก</label><select value={dp} onChange={e=>setDp(e.target.value)} className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none">{depts.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>
      </div>
      <div className="mt-4"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Job / เหตุผลการใช้งาน</label><input value={jobRef} onChange={e=>setJobRef(e.target.value)} placeholder="เช่น: Job #2568-045 / ซ่อมเครื่อง Laser #2 / งานติดตั้ง ABC" className="w-full border rounded-lg p-2.5 text-sm bg-white outline-none"/></div>
      {/* Stock info preview */}
      {selItem&&<div className={`mt-3 rounded-xl p-3 text-xs flex items-center gap-3 ${selItem.balance>=Number(qty)?'bg-emerald-50 border border-emerald-200 text-emerald-800':'bg-amber-50 border border-amber-200 text-amber-800'}`}>
        <span>คงเหลือ: <b className="text-sm">{selItem.balance}</b> {selItem.unit}</span>
        <span>ขอเบิก: <b className="text-sm">{qty}</b></span>
        {selItem.balance<Number(qty)&&<span className="bg-amber-200 text-amber-900 px-2 py-0.5 rounded font-bold">ไม่พอ! ขาด {Number(qty)-selItem.balance} {selItem.unit}</span>}
      </div>}
      <div className="mt-6 flex justify-end"><button type="submit" disabled={!sel} className="bg-emerald-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-emerald-700"><I d={Ic.save} size={16}/>ส่งรายการขอเบิก</button></div></form>

      {/* Shortage Modal */}
      {shortageModal&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg anim-zoom">
        <div className="p-5 border-b flex items-center gap-2"><div className="bg-amber-50 p-1.5 rounded-lg"><I d={Ic.alert} size={18} cls="text-amber-600"/></div><h3 className="font-bold text-lg">สต๊อกไม่เพียงพอ</h3></div>
        <div className="p-5">
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
            <div className="font-bold text-slate-800 mb-2">{shortageModal.item.name}</div>
            <div className="grid grid-cols-3 gap-3 text-center text-sm">
              <div><div className="text-xs text-slate-500">ขอเบิก</div><div className="font-black text-lg">{shortageModal.requested}</div></div>
              <div><div className="text-xs text-slate-500">มีในสต๊อก</div><div className="font-black text-lg text-emerald-600">{shortageModal.available}</div></div>
              <div><div className="text-xs text-slate-500">ขาด</div><div className="font-black text-lg text-rose-600">{shortageModal.shortage}</div></div>
            </div>
          </div>
          <div className="space-y-2">
            {shortageModal.available>0&&<button onClick={doPartial} className="w-full bg-blue-600 text-white p-3 rounded-xl text-sm font-bold hover:bg-blue-700 text-left">
              <div>เบิก {shortageModal.available} ที่มี + สร้าง PR ขอซื้อเพิ่ม {shortageModal.shortage}</div>
              <div className="text-xs text-blue-200 mt-1">เบิกส่วนที่มีไปใช้ก่อน แล้วขอซื้อส่วนที่ขาดเพิ่ม</div>
            </button>}
            <button onClick={doPROnly} className="w-full bg-amber-600 text-white p-3 rounded-xl text-sm font-bold hover:bg-amber-700 text-left">
              <div>สร้าง PR ขอซื้อ {shortageModal.available>0?'ทั้ง '+shortageModal.requested+' ชิ้น':'× '+shortageModal.requested}</div>
              <div className="text-xs text-amber-200 mt-1">{shortageModal.available>0?'ไม่เบิกตอนนี้ รอซื้อมาทั้งจำนวน':'ไม่มีในสต๊อก — ส่ง PR ให้ Store จัดซื้อ'}</div>
            </button>
            <button onClick={()=>setShortageModal(null)} className="w-full bg-white border text-slate-600 p-3 rounded-xl text-sm font-bold">ยกเลิก</button>
          </div>
        </div>
      </div></div>}
    </Wrap>);
  };

  // ==================== APPROVALS ====================
  const ApprovalView=()=>{
    const [rejId,setRejId]=useState(null);const [rejR,setRejR]=useState('');
    const pend=reqs.filter(r=>r.status==='รอดำเนินการ');
    const waitPickup=reqs.filter(r=>r.status==='อนุมัติ — รอรับของ');
    const hist=reqs.filter(r=>r.status!=='รอดำเนินการ'&&r.status!=='อนุมัติ — รอรับของ');

    // MD/GM approve — reserve stock (deduct balance) so parallel approvals can't overcommit
    const approve=r=>{
      const it=items.find(i=>i.id===r.itemId);
      if(!it||it.balance<r.qty){notify('สต๊อกไม่พอสำหรับอนุมัติรายการนี้','err');return;}
      setItems(items.map(i=>i.id===r.itemId?{...i,balance:i.balance-r.qty,reserved:(i.reserved||0)+r.qty}:i));
      setReqs(reqs.map(x=>x.id===r.id?{...x,status:'อนุมัติ — รอรับของ',approvedBy:user.fullName,approvedDate:new Date().toLocaleDateString('th-TH')}:x));
      addNotif(r.requestedBy,[],'ใบเบิกอนุมัติแล้ว!',`"${r.itemName}" จำนวน ${r.qty} — อนุมัติโดย ${user.fullName} กรุณามารับของที่ Store (คลังวัสดุหลัก)`,'requisition',r.id);
      addNotif('',['Admin','Store'],'มีรายการรอจ่ายของ',`"${r.itemName}" จำนวน ${r.qty} สำหรับ ${r.requestedBy} (${r.department}) — อนุมัติโดย ${user.fullName}`,'requisition',r.id);
      notify(`อนุมัติ "${r.itemName}" สำเร็จ — รอพนักงานมารับของที่ Store`);
    };

    // Store dispatch — record transaction (stock already reserved on approve)
    const dispatch=r=>{
      const it=items.find(i=>i.id===r.itemId);
      if(!it){notify('ไม่พบรายการวัสดุ','err');return;}
      setItems(items.map(i=>i.id===r.itemId?{...i,pay:i.pay+r.qty,reserved:Math.max((i.reserved||0)-r.qty,0)}:i));
      setReqs(reqs.map(x=>x.id===r.id?{...x,status:'จ่ายของแล้ว',dispatchedBy:user.fullName,dispatchedDate:new Date().toLocaleDateString('th-TH')}:x));
      setTxns([{id:r.id,date:new Date().toLocaleDateString('th-TH'),type:'OUT',itemCode:r.itemId,itemName:r.itemName,qty:r.qty,department:r.department,user:r.requestedBy,job:r.job||'-',note:`จ่ายโดย ${user.fullName}${r.job&&r.job!=='-'?' | Job: '+r.job:''}`},...txns]);
      addNotif(r.requestedBy,[],'รับของเรียบร้อย',`"${r.itemName}" จำนวน ${r.qty} — Store จ่ายของแล้ว ตัดสต๊อกเรียบร้อย`,'requisition',r.id);
      notify(`จ่ายของ "${r.itemName}" × ${r.qty} ให้ ${r.requestedBy} — ตัดสต๊อกแล้ว`);
    };

    const reject=()=>{if(!rejId)return;const rj=reqs.find(x=>x.id===rejId);
      if(rj&&rj.status==='อนุมัติ — รอรับของ'){setItems(items.map(i=>i.id===rj.itemId?{...i,balance:i.balance+rj.qty,reserved:Math.max((i.reserved||0)-rj.qty,0)}:i));}
      setReqs(reqs.map(r=>r.id===rejId?{...r,status:'ไม่อนุมัติ',approvedBy:user.fullName,approvedDate:new Date().toLocaleDateString('th-TH'),rejectReason:rejR||'ไม่ระบุ'}:r));
      if(rj)addNotif(rj.requestedBy,[],'ใบเบิกไม่อนุมัติ',`"${rj.itemName}" จำนวน ${rj.qty} — ไม่อนุมัติโดย ${user.fullName} เหตุผล: ${rejR||'ไม่ระบุ'}`,'requisition',rejId);
      notify('ไม่อนุมัติรายการเรียบร้อย');setRejId(null);setRejR('');};

    return(<Wrap title="รายการรออนุมัติ / จ่ายของ" icon={Ic.clock}>
      {/* Section 1: รออนุมัติ (MD/GM/Admin) */}
      <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.clock} size={18} cls="text-indigo-500"/>รอดำเนินการ <span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full">{pend.length}</span></h3>
      {pend.length===0?<div className="text-center py-10 text-slate-400 border rounded-xl bg-slate-50 mb-6"><I d={Ic.check2} size={40} cls="mx-auto mb-3 text-emerald-200"/>ไม่มีรายการรออนุมัติ</div>:
      <div className="overflow-x-auto border rounded-xl mb-6"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 font-bold">เลขที่</th><th className="p-3 font-bold">วันที่</th><th className="p-3 font-bold">รายการ</th><th className="p-3 font-bold text-center">จำนวน</th><th className="p-3 font-bold">แผนก</th><th className="p-3 font-bold">ผู้ขอ</th><th className="p-3 font-bold">Job/เหตุผล</th><th className="p-3 font-bold text-center">ดำเนินการ</th></tr></thead>
      <tbody className="divide-y">{pend.map(r=><tr key={r.id} className="hover:bg-indigo-50/30"><td className="p-3 font-mono text-xs text-indigo-600">{r.id}</td><td className="p-3 text-slate-600 text-xs">{r.date}</td><td className="p-3 font-bold text-slate-800">[{r.itemId}] {r.itemName}</td><td className="p-3 text-center font-black">{r.qty}</td><td className="p-3 text-xs">{r.department}</td><td className="p-3 text-xs">{r.requestedBy}</td><td className="p-3 text-xs font-bold text-blue-700">{r.job||'-'}</td><td className="p-3 text-center">{canApprove?<div className="flex justify-center gap-2"><button onClick={()=>approve(r)} className="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><I d={Ic.thumbUp} size={13}/>อนุมัติ</button><button onClick={()=>setRejId(r.id)} className="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><I d={Ic.thumbDn} size={13}/>ไม่อนุมัติ</button></div>:<span className="text-xs text-slate-400">ไม่มีสิทธิ์อนุมัติ</span>}</td></tr>)}</tbody></table></div>}

      {/* Section 2: รอจ่ายของ (Store/Admin) */}
      {waitPickup.length>0&&<><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.pkg} size={18} cls="text-amber-500"/>อนุมัติแล้ว — รอจ่ายของ <span className="bg-amber-100 text-amber-700 text-xs px-2 py-0.5 rounded-full">{waitPickup.length}</span></h3>
      {(isAdmin||isStore)?<div className="overflow-x-auto border rounded-xl mb-6 border-amber-200"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-amber-50 text-amber-700"><tr><th className="p-3 font-bold">เลขที่</th><th className="p-3 font-bold">วันที่</th><th className="p-3 font-bold">รายการ</th><th className="p-3 font-bold text-center">จำนวน</th><th className="p-3 font-bold">ผู้ขอ</th><th className="p-3 font-bold">แผนก</th><th className="p-3 font-bold">Job/เหตุผล</th><th className="p-3 font-bold">อนุมัติโดย</th><th className="p-3 font-bold text-center">จ่ายของ</th></tr></thead>
      <tbody className="divide-y">{waitPickup.map(r=><tr key={r.id} className="hover:bg-amber-50/30"><td className="p-3 font-mono text-xs text-indigo-600">{r.id}</td><td className="p-3 text-xs text-slate-600">{r.date}</td><td className="p-3 font-bold text-slate-800">[{r.itemId}] {r.itemName}</td><td className="p-3 text-center font-black">{r.qty}</td><td className="p-3 text-xs font-bold">{r.requestedBy}</td><td className="p-3 text-xs">{r.department}</td><td className="p-3 text-xs font-bold text-blue-700">{r.job||'-'}</td><td className="p-3 text-xs text-emerald-600 font-bold">{r.approvedBy}</td><td className="p-3 text-center"><button onClick={()=>dispatch(r)} className="bg-amber-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-amber-700 flex items-center gap-1 mx-auto"><I d={Ic.check2} size={14}/>จ่ายของ + ตัดสต๊อก</button></td></tr>)}</tbody></table></div>
      :<div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-sm text-amber-800 flex items-center gap-2"><I d={Ic.clock} size={18}/>มีรายการรอจ่ายของ {waitPickup.length} รายการ — รอ Store ดำเนินการ</div>}</>}

      {/* Section 3: ประวัติ */}
      {hist.length>0&&<><h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><I d={Ic.file} size={18} cls="text-slate-400"/>ประวัติ</h3><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 font-bold">เลขที่</th><th className="p-3 font-bold">รายการ</th><th className="p-3 font-bold text-center">จำนวน</th><th className="p-3 font-bold">ผู้ขอ</th><th className="p-3 font-bold text-center">สถานะ</th><th className="p-3 font-bold">อนุมัติ/จ่ายโดย</th></tr></thead><tbody className="divide-y">{hist.map(r=><tr key={r.id}><td className="p-3 font-mono text-xs text-slate-500">{r.id}</td><td className="p-3 text-slate-700">{r.itemName}</td><td className="p-3 text-center font-bold">{r.qty}</td><td className="p-3 text-xs">{r.requestedBy}</td><td className="p-3 text-center"><Badge s={r.status}/></td><td className="p-3 text-xs text-slate-500">{r.approvedBy||'-'}{r.dispatchedBy?' → '+r.dispatchedBy:''}</td></tr>)}</tbody></table></div></>}

      {/* Reject Modal */}
      {rejId&&<div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow-2xl w-full max-w-md anim-zoom"><div className="p-5 border-b flex items-center gap-2"><div className="bg-rose-50 p-1.5 rounded-lg"><I d={Ic.thumbDn} size={18} cls="text-rose-500"/></div><h3 className="font-bold text-lg">ไม่อนุมัติ {rejId}</h3></div><div className="p-6"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">เหตุผล</label><textarea value={rejR} onChange={e=>setRejR(e.target.value)} rows={3} className="w-full border rounded-lg p-3 text-sm outline-none focus:ring-1 focus:ring-rose-500" placeholder="ระบุเหตุผล..."/></div><div className="flex justify-end gap-3 p-4 border-t bg-slate-50/50 rounded-b-2xl"><button onClick={()=>{setRejId(null);setRejR('');}} className="px-5 py-2 text-sm font-bold text-slate-600 bg-white border rounded-xl">ยกเลิก</button><button onClick={reject} className="px-5 py-2 text-sm font-bold text-white bg-rose-500 rounded-xl hover:bg-rose-600">ยืนยัน ไม่อนุมัติ</button></div></div></div>}
    </Wrap>);
  };

  // ==================== REPORTS ====================
  const RptSummary=()=>{const [fil,setFil]=useState({cat:'',dept:'',month:'',start:'',end:''});const filtered=items.filter(it=>{if(fil.cat&&it.category!==fil.cat)return false;return true;});return(<Wrap title="สรุปยอดคงเหลือ" icon={Ic.bar} onExport={()=>toExcel(['#','รหัส','รายการ','หมวดหมู่','ยกมา','รับเข้า','เบิก','คงเหลือ','หน่วย'],filtered.map((it,i)=>[i+1,it.id,it.name,catName(it.category),it.prevBalance,it.receive,it.pay,it.balance,it.unit]),'สรุปยอดคงเหลือ')}><Fil cat month onFilter={setFil}/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">รหัส</th><th className="p-3">รายการ</th><th className="p-3 text-center">ยกมา</th><th className="p-3 text-center">รับเข้า</th><th className="p-3 text-center">เบิก</th><th className="p-3 text-center font-bold text-emerald-700">คงเหลือ</th><th className="p-3 text-center">หน่วย</th></tr></thead><tbody className="divide-y">{filtered.map((it,i)=><tr key={it.id} className="hover:bg-slate-50/50"><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3 font-mono text-slate-500">{it.id}</td><td className="p-3"><div className="font-bold text-slate-800">{it.name}</div><div className="text-xs text-slate-400">{catName(it.category)}</div></td><td className="p-3 text-center">{it.prevBalance}</td><td className="p-3 text-center text-emerald-600 font-bold bg-emerald-50/30">+{it.receive}</td><td className="p-3 text-center text-rose-500 font-bold bg-rose-50/30">-{it.pay}</td><td className="p-3 text-center font-black text-slate-800 bg-slate-50">{it.balance}</td><td className="p-3 text-center text-slate-500">{it.unit}</td></tr>)}</tbody></table></div></Wrap>)};

  const RptReceive=()=>{const rx=txns.filter(t=>t.type==='IN');return(<Wrap title="รายงานรับเข้า" icon={Ic.download} onExport={()=>toExcel(['#','วันที่','อ้างอิง','รหัสรายการ','ชื่อรายการ','จำนวน','ผู้ทำ'],rx.map((t,i)=>[i+1,t.date,t.id,t.itemCode,t.itemName,t.qty,t.user]),'รายงานรับเข้า')}><Fil date/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">วันที่</th><th className="p-3">อ้างอิง</th><th className="p-3">รายการ</th><th className="p-3 text-center">จำนวน</th><th className="p-3 text-center">ผู้ทำ</th></tr></thead><tbody className="divide-y">{rx.length?rx.map((t,i)=><tr key={i} className="hover:bg-slate-50/50"><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3">{t.date}</td><td className="p-3 font-mono text-xs">{t.id}</td><td className="p-3 font-bold">[{t.itemCode}] {t.itemName}</td><td className="p-3 text-center text-emerald-600 font-bold">+{t.qty}</td><td className="p-3 text-center">{t.user}</td></tr>):<tr><td colSpan="6" className="p-10 text-center text-slate-400">ไม่พบประวัติ</td></tr>}</tbody></table></div></Wrap>);};

  const RptPay=()=>{const px=txns.filter(t=>t.type==='OUT');return(<Wrap title="รายงานเบิก" icon={Ic.cart} onExport={()=>toExcel(['#','วันที่','ใบเบิก','รหัส','รายการ','จำนวน','แผนก','ผู้เบิก'],px.map((t,i)=>[i+1,t.date,t.id,t.itemCode,t.itemName,t.qty,t.department,t.user]),'รายงานเบิก')}><Fil dept month/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">วันที่</th><th className="p-3">ใบเบิก</th><th className="p-3">รายการ</th><th className="p-3 text-center">จำนวน</th><th className="p-3">แผนก</th><th className="p-3 text-center">ผู้เบิก</th></tr></thead><tbody className="divide-y">{px.length?px.map((t,i)=><tr key={i} className="hover:bg-slate-50/50"><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3">{t.date}</td><td className="p-3 font-mono text-xs text-indigo-600">{t.id}</td><td className="p-3 font-bold">[{t.itemCode}] {t.itemName}</td><td className="p-3 text-center text-rose-500 font-bold">-{t.qty}</td><td className="p-3"><span className="bg-slate-100 px-2 py-0.5 rounded text-xs">{t.department}</span></td><td className="p-3 text-center">{t.user}</td></tr>):<tr><td colSpan="7" className="p-10 text-center text-slate-400">ไม่พบประวัติ</td></tr>}</tbody></table></div></Wrap>);};

  const RptInOut=()=>{const [fil,setFil]=useState({cat:'',dept:'',month:'',start:'',end:''});const filtered=items.filter(it=>{if(fil.cat&&it.category!==fil.cat)return false;return true;});return(<Wrap title="สรุปรวม รับเข้า - เบิก" icon={Ic.bar} onExport={()=>toExcel(['#','รหัส','รายการ','รวมรับ','รวมเบิก','ผลต่าง'],filtered.map((it,i)=>[i+1,it.id,it.name,it.receive,it.pay,it.receive-it.pay]),'สรุปรับเบิก')}><Fil cat month onFilter={setFil}/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left whitespace-nowrap"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">รหัส</th><th className="p-3">รายการ</th><th className="p-3 text-center">รวมรับ</th><th className="p-3 text-center">รวมเบิก</th><th className="p-3 text-center">ผลต่าง</th></tr></thead><tbody className="divide-y">{filtered.map((it,i)=>{const d=it.receive-it.pay;return<tr key={it.id}><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3 font-mono">{it.id}</td><td className="p-3 font-bold">{it.name}</td><td className="p-3 text-center text-emerald-600 font-bold">+{it.receive}</td><td className="p-3 text-center text-rose-500 font-bold">-{it.pay}</td><td className={`p-3 text-center font-black ${d>=0?'text-emerald-600':'text-rose-500'}`}>{d>=0?'+':''}{d}</td></tr>})}</tbody></table></div></Wrap>)};

  const RptByDept=()=>{const px=txns.filter(t=>t.type==='OUT');const g={};px.forEach(t=>{const d=t.department||'-';if(!g[d])g[d]={total:0,items:[]};g[d].total+=t.qty;g[d].items.push(t);});const dl=Object.entries(g);return(<Wrap title="สรุปจำนวนเบิก ตามหน่วยงาน" icon={Ic.users} onExport={()=>toExcel(['#','แผนก','วันที่','รายการ','จำนวน'],px.map((t,i)=>[i+1,t.department,t.date,t.itemName,t.qty]),'เบิกตามหน่วยงาน')}><Fil month/>{dl.length?dl.map(([d,data])=><div key={d} className="mb-6"><div className="flex items-center gap-2 mb-2"><span className="bg-indigo-100 text-indigo-700 px-2.5 py-0.5 rounded-lg text-sm font-bold">{d}</span><span className="text-slate-500 text-sm">รวม: <b>{data.total}</b></span></div><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-2.5">วันที่</th><th className="p-2.5">รายการ</th><th className="p-2.5 text-center">จำนวน</th></tr></thead><tbody className="divide-y">{data.items.map((t,i)=><tr key={i}><td className="p-2.5">{t.date}</td><td className="p-2.5">{t.itemName}</td><td className="p-2.5 text-center font-bold text-rose-500">{t.qty}</td></tr>)}</tbody></table></div></div>):<div className="p-12 text-center text-slate-400 border rounded-xl bg-slate-50">ไม่พบข้อมูล</div>}</Wrap>);};

  const RptValDept=()=>{const px=txns.filter(t=>t.type==='OUT');const g={};px.forEach(t=>{const d=t.department||'-';const it=items.find(i=>i.id===t.itemCode);const v=t.qty*(it?.price||0);g[d]=(g[d]||0)+v;});const dl=Object.entries(g).sort((a,b)=>b[1]-a[1]);const tot=dl.reduce((s,[,v])=>s+v,0);return(<Wrap title="มูลค่าเบิก แยกตามแผนก" icon={Ic.brief} onExport={()=>toExcel(['#','แผนก','มูลค่า (บาท)'],dl.map(([d,v],i)=>[i+1,d,v.toFixed(2)]),'มูลค่าเบิกตามแผนก')}><Fil month/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">แผนก</th><th className="p-3 text-right">มูลค่า (บาท)</th></tr></thead><tbody className="divide-y">{dl.length?dl.map(([d,v],i)=><tr key={d}><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3 font-bold">{d}</td><td className="p-3 text-right font-bold">{v.toLocaleString('th-TH',{minimumFractionDigits:2})}</td></tr>):<tr><td colSpan="3" className="p-10 text-center text-slate-400">ไม่พบข้อมูล</td></tr>}{dl.length>0&&<tr className="bg-emerald-50 font-bold"><td className="p-3"></td><td className="p-3 text-emerald-800">รวม</td><td className="p-3 text-right text-emerald-700">{tot.toLocaleString('th-TH',{minimumFractionDigits:2})}</td></tr>}</tbody></table></div></Wrap>);};

  const RptValCat=()=>{const px=txns.filter(t=>t.type==='OUT');const g={};px.forEach(t=>{const it=items.find(i=>i.id===t.itemCode);const c=it?catName(it.category):'-';const v=t.qty*(it?.price||0);g[c]=(g[c]||0)+v;});const cl=Object.entries(g).sort((a,b)=>b[1]-a[1]);const tot=cl.reduce((s,[,v])=>s+v,0);return(<Wrap title="มูลค่าเบิก แยกตามหมวดหมู่" icon={Ic.tag} onExport={()=>toExcel(['#','หมวดหมู่','มูลค่า (บาท)'],cl.map(([c,v],i)=>[i+1,c,v.toFixed(2)]),'มูลค่าเบิกตามหมวด')}><Fil month/><div className="overflow-x-auto border rounded-xl"><table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-500"><tr><th className="p-3 text-center w-12">#</th><th className="p-3">หมวดหมู่</th><th className="p-3 text-right">มูลค่า (บาท)</th></tr></thead><tbody className="divide-y">{cl.length?cl.map(([c,v],i)=><tr key={c}><td className="p-3 text-center text-slate-400">{i+1}</td><td className="p-3 font-bold">{c}</td><td className="p-3 text-right font-bold">{v.toLocaleString('th-TH',{minimumFractionDigits:2})}</td></tr>):<tr><td colSpan="3" className="p-10 text-center text-slate-400">ไม่พบข้อมูล</td></tr>}{cl.length>0&&<tr className="bg-emerald-50 font-bold"><td className="p-3"></td><td className="p-3 text-emerald-800">รวม</td><td className="p-3 text-right text-emerald-700">{tot.toLocaleString('th-TH',{minimumFractionDigits:2})}</td></tr>}</tbody></table></div></Wrap>);};
